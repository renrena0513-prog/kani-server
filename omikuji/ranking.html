<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>御神籤ランキング - かに鯖</title>
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Kosugi+Maru&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(80,20,120,.55) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 20% 80%, rgba(139,0,0,.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139,0,0,.12) 0%, transparent 60%),
                #06040f;
            min-height: 100vh;
            font-family: 'Noto Serif JP', serif;
            color: #f5e6c8;
        }

        .jp-wrap { max-width: 760px; margin: 0 auto; padding: 80px 16px 60px; position: relative; z-index: 2; }

        .jp-title {
            font-weight: 900;
            font-size: clamp(1.8rem, 6vw, 2.6rem);
            letter-spacing: .18em;
            text-align: center;
            color: #f5e6c8;
            text-shadow: 0 0 24px rgba(212,168,83,.4);
        }
        .jp-subtitle {
            text-align: center;
            color: rgba(245,230,200,.5);
            font-size: .9rem;
            letter-spacing: .1em;
            margin-top: 8px;
            margin-bottom: 28px;
        }

        /* ── 期間切り替えタブ ── */
        .jp-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
        }
        .jp-tab {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 20px;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(245,230,200,.18);
            border-radius: 22px;
            color: rgba(245,230,200,.6);
            font-family: 'Noto Serif JP', serif;
            font-size: .9rem;
            letter-spacing: .04em;
            cursor: pointer;
            transition: all .2s;
        }
        .jp-tab:hover { background: rgba(255,255,255,.08); color: rgba(245,230,200,.85); }
        .jp-tab.active {
            background: linear-gradient(135deg, rgba(212,168,83,.28), rgba(60,20,90,.4));
            border-color: rgba(212,168,83,.6);
            color: #f5e6c8;
            box-shadow: 0 4px 16px rgba(212,168,83,.25);
        }
        .jp-tab-sub { font-size: .72rem; opacity: .7; }

        /* ── 全体合計カード ── */
        .jp-total-card {
            display: flex;
            gap: 14px;
            margin-bottom: 30px;
        }
        .jp-total-box {
            flex: 1;
            background: linear-gradient(160deg, rgba(212,168,83,.12), rgba(255,255,255,.03));
            border: 1px solid rgba(212,168,83,.35);
            border-radius: 16px;
            padding: 20px 14px;
            text-align: center;
            box-shadow: 0 6px 26px rgba(0,0,0,.4);
        }
        .jp-total-label {
            font-size: .78rem;
            color: rgba(245,230,200,.55);
            letter-spacing: .08em;
            margin-bottom: 8px;
        }
        .jp-total-value {
            font-size: clamp(1.3rem, 5vw, 1.9rem);
            font-weight: 900;
            color: #f0d089;
            text-shadow: 0 0 18px rgba(212,168,83,.35);
            line-height: 1.1;
        }
        .jp-total-unit { font-size: .8rem; color: rgba(245,230,200,.5); margin-left: 3px; }

        /* ── ランキングリスト ── */
        .jp-rank-list { display: flex; flex-direction: column; gap: 10px; }

        .jp-rank-row {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(245,230,200,.1);
            border-radius: 14px;
            padding: 12px 16px;
            transition: background .2s;
        }
        .jp-rank-row:hover { background: rgba(255,255,255,.07); }

        .jp-rank-num {
            flex-shrink: 0;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.05rem;
            background: rgba(255,255,255,.07);
            color: rgba(245,230,200,.7);
            border: 1px solid rgba(245,230,200,.15);
        }
        .jp-rank-row.top1 .jp-rank-num { background: linear-gradient(135deg,#ffd700,#e0a800); color:#3a2c00; border:none; box-shadow:0 0 16px rgba(255,215,0,.5); }
        .jp-rank-row.top2 .jp-rank-num { background: linear-gradient(135deg,#d8d8d8,#a8a8a8); color:#2a2a2a; border:none; }
        .jp-rank-row.top3 .jp-rank-num { background: linear-gradient(135deg,#e0995a,#b87333); color:#301c00; border:none; }

        .jp-avatar {
            width: 46px; height: 46px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid rgba(212,168,83,.3);
        }
        .jp-badge-img { width: 24px; height: 24px; object-fit: contain; flex-shrink: 0; }

        .jp-user-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
        .jp-user-name {
            font-weight: 700;
            color: #f5e6c8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .jp-user-name:hover { color: #f0d089; }
        .jp-user-draws { font-size: .78rem; color: rgba(245,230,200,.5); }

        .jp-user-money {
            flex-shrink: 0;
            text-align: right;
            font-weight: 900;
            font-size: 1.15rem;
            color: #f0d089;
            white-space: nowrap;
        }
        .jp-user-money .jp-total-unit { font-weight: 400; }

        .jp-loading, .jp-empty { text-align: center; padding: 50px 0; color: rgba(245,230,200,.5); }

        /* ── 戻るボタン ── */
        .jp-back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(245,230,200,.2);
            color: rgba(245,230,200,.8);
            padding: 8px 18px;
            border-radius: 22px;
            font-family: 'Noto Serif JP', serif;
            font-size: .85rem;
            text-decoration: none;
            transition: all .2s;
        }
        .jp-back-btn:hover { background: rgba(255,255,255,.12); color: #f5e6c8; }

        @media (max-width: 560px) {
            .jp-rank-row { gap: 10px; padding: 10px 12px; }
            .jp-avatar { width: 40px; height: 40px; }
            .jp-user-money { font-size: 1rem; }
            .jp-total-card { gap: 10px; }
        }
    </style>
</head>

<body>
    <a href="./index.html" class="jp-back-btn">← おみくじに戻る</a>

    <div class="jp-wrap">
        <h1 class="jp-title">御神籤ランキング</h1>
        <p class="jp-subtitle">おみくじで得たマネーの総額くらべ</p>

        <!-- 期間切り替えタブ -->
        <div class="jp-tabs">
            <button class="jp-tab active" data-mode="all" onclick="switchMode('all')">📜 今までの全部</button>
            <button class="jp-tab" data-mode="new" onclick="switchMode('new')">🎋 新おみくじ<span class="jp-tab-sub">6/21〜</span></button>
        </div>

        <!-- 全体合計 -->
        <div class="jp-total-card">
            <div class="jp-total-box">
                <div class="jp-total-label">🎋 みんなの総回数</div>
                <div class="jp-total-value"><span id="total-draws">-</span><span class="jp-total-unit">回</span></div>
            </div>
            <div class="jp-total-box">
                <div class="jp-total-label">💰 総排出マネー</div>
                <div class="jp-total-value"><span id="total-money">-</span><span class="jp-total-unit">マネー</span></div>
            </div>
        </div>

        <!-- ランキング -->
        <div id="rank-list" class="jp-rank-list">
            <div class="jp-loading">
                <div class="spinner-border text-warning" role="status"></div>
                <div style="margin-top:10px;">読み込み中...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script>
        const AVATAR_FALLBACK = 'https://ui-avatars.com/api/?name=?&background=3a1a5c&color=fff&size=48';
        const EXCLUDED_RANKING_USERS = new Set(['1184908452959621233']);
        // 新おみくじ開始: 2026年6月21日 00:00 JST（= 前日15:00 UTC）
        const NEW_OMIKUJI_START = new Date('2026-06-20T15:00:00Z').getTime();

        let allLogs = [];        // { user_id, amount, created_at } 全期間分をキャッシュ
        let profileMap = {};     // discord_user_id -> profile
        let currentMode = 'all'; // 'all' | 'new'

        // activity_logs はデフォルト1000件上限のためページ送りで全件取得
        async function fetchAllOmikujiLogs() {
            const batchSize = 1000;
            let all = [];
            let from = 0;
            while (true) {
                const { data, error } = await supabaseClient
                    .from('activity_logs')
                    .select('user_id, amount, created_at')
                    .eq('action_type', 'omikuji')
                    .order('created_at', { ascending: true })
                    .range(from, from + batchSize - 1);
                if (error) throw error;
                all = all.concat(data || []);
                if (!data || data.length < batchSize) break;
                from += batchSize;
            }
            return all;
        }

        async function loadRanking() {
            const listEl = document.getElementById('rank-list');
            try {
                allLogs = await fetchAllOmikujiLogs();

                // 全期間の登場ユーザーぶんのプロフィールをまとめて取得（両タブで使い回す）
                const allIds = [...new Set(allLogs.map(l => l.user_id).filter(Boolean))]
                    .filter(id => !EXCLUDED_RANKING_USERS.has(id));

                if (allIds.length > 0) {
                    const { data: profiles } = await supabaseClient
                        .from('profiles')
                        .select('discord_user_id, account_name, avatar_url, is_hidden, equipped_badge_id, equipped_badge_id_right, badges!equipped_badge_id(image_url, name), badges_right:badges!equipped_badge_id_right(image_url, name)')
                        .in('discord_user_id', allIds);
                    profileMap = {};
                    (profiles || []).forEach(p => { profileMap[p.discord_user_id] = p; });
                }

                renderRanking(currentMode);
            } catch (err) {
                console.error('おみくじランキング取得エラー:', err);
                listEl.innerHTML = '<div class="jp-empty" style="color:#e08;">読み込みエラーが発生しました</div>';
            }
        }

        function switchMode(mode) {
            if (mode === currentMode) return;
            currentMode = mode;
            document.querySelectorAll('.jp-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
            renderRanking(mode);
        }

        function renderRanking(mode) {
            const listEl = document.getElementById('rank-list');

            // 選択期間でログを絞り込み
            const logs = mode === 'new'
                ? allLogs.filter(l => new Date(l.created_at).getTime() >= NEW_OMIKUJI_START)
                : allLogs;

            // 全体合計（全ユーザー分）＋ ユーザー別集計
            let grandDraws = 0;
            let grandMoney = 0;
            const stats = {}; // user_id -> { money, draws }
            logs.forEach(l => {
                grandDraws++;
                grandMoney += l.amount || 0;
                if (!l.user_id) return;
                if (!stats[l.user_id]) stats[l.user_id] = { money: 0, draws: 0 };
                stats[l.user_id].money += l.amount || 0;
                stats[l.user_id].draws++;
            });

            document.getElementById('total-draws').textContent = grandDraws.toLocaleString();
            document.getElementById('total-money').textContent = grandMoney.toLocaleString();

            const ranking = Object.keys(stats)
                .filter(id => !EXCLUDED_RANKING_USERS.has(id))
                .filter(id => {
                    const p = profileMap[id];
                    return p && !p.is_hidden; // プロフィール無し・非表示ユーザーは除外
                })
                .map(id => ({ id, ...stats[id], profile: profileMap[id] }))
                .sort((a, b) => b.money - a.money || b.draws - a.draws);

            if (ranking.length === 0) {
                listEl.innerHTML = '<div class="jp-empty">この期間のデータがありません</div>';
                return;
            }

            listEl.innerHTML = ranking.map((item, i) => {
                const rank = i + 1;
                const topClass = rank <= 3 ? `top${rank}` : '';
                const p = item.profile || {};
                const name = p.account_name || item.id;
                const avatar = p.avatar_url || AVATAR_FALLBACK;
                const badgeL = p.badges ? `<img class="jp-badge-img" src="${p.badges.image_url}" title="${p.badges.name || ''}">` : '';
                const badgeR = p.badges_right ? `<img class="jp-badge-img" src="${p.badges_right.image_url}" title="${p.badges_right.name || ''}">` : '';

                return `
                    <div class="jp-rank-row ${topClass}">
                        <div class="jp-rank-num">${rank}</div>
                        <img class="jp-avatar" src="${avatar}" onerror="this.src='${AVATAR_FALLBACK}'">
                        <div class="jp-user-info">
                            <a href="../mypage/index.html?user=${item.id}" class="jp-user-name">
                                ${badgeL}<span style="overflow:hidden;text-overflow:ellipsis;">${name}</span>${badgeR}
                            </a>
                            <span class="jp-user-draws">🎋 ${item.draws.toLocaleString()} 回</span>
                        </div>
                        <div class="jp-user-money">${item.money.toLocaleString()}<span class="jp-total-unit">マネー</span></div>
                    </div>
                `;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', loadRanking);
    </script>
</body>

</html>
