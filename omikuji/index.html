<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>御神籤 - かに鯖</title>
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Kosugi+Maru&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #06040f;
            min-height: 100vh;
            font-family: 'Noto Serif JP', serif;
            overflow-x: hidden;
        }

        /* ── Canvas layers ── */
        #bg-canvas, #fx-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        #fx-canvas { z-index: 20; }

        /* ── Background atmosphere ── */
        .jp-atmosphere {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(80,20,120,.55) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 20% 80%, rgba(139,0,0,.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139,0,0,.12) 0%, transparent 60%),
                #06040f;
            z-index: 1;
        }

        /* ── Moon ── */
        .jp-moon {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: radial-gradient(circle at 38% 38%, #fffef5, #fef3c7 40%, #fde68a);
            box-shadow:
                0 0 30px rgba(253,230,138,.5),
                0 0 80px rgba(253,230,138,.25),
                0 0 160px rgba(253,230,138,.1);
            z-index: 2;
        }
        .jp-moon-halo {
            position: fixed;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: transparent;
            box-shadow: 0 0 60px 30px rgba(253,230,138,.08);
            z-index: 2;
        }

        /* ── Torii ── */
        .jp-torii {
            position: fixed;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            opacity: .07;
            z-index: 2;
            pointer-events: none;
        }

        /* ── Japanese lattice overlay ── */
        .jp-grid {
            position: fixed;
            inset: 0;
            opacity: .015;
            background-image:
                linear-gradient(rgba(255,200,100,.8) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,200,100,.8) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 2;
            pointer-events: none;
        }

        /* ── Nav (preserved) ── */
        .nav-dropdown { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .record-button {
            background: linear-gradient(135deg, #b8892d, #d4a853);
            color: white;
            padding: 10px 22px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(212,168,83,.4);
        }
        .nav-dropdown-menu {
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,.3);
            min-width: 200px;
            border: none;
        }
        .dropdown-item { padding: 10px 18px; color: #333; }

        /* ── Main scene ── */
        .jp-scene {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 120px;
        }

        /* ── Title ── */
        .jp-title {
            font-family: 'Noto Serif JP', serif;
            font-weight: 900;
            font-size: 2.8rem;
            color: #f5e6c8;
            letter-spacing: .3em;
            text-shadow:
                0 0 20px rgba(212,168,83,.9),
                0 0 50px rgba(212,168,83,.4),
                0 2px 8px rgba(0,0,0,.8);
            margin-bottom: 6px;
        }
        .jp-subtitle {
            font-size: .85rem;
            color: rgba(245,230,200,.4);
            letter-spacing: .25em;
            margin-bottom: 50px;
        }

        /* ── Cylinder (omikuji box) ── */
        .jp-cylinder-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 36px;
            transition: opacity .5s, transform .5s;
        }
        .jp-cylinder-wrap.hide {
            opacity: 0;
            transform: scale(.8) translateY(20px);
            pointer-events: none;
        }

        .jp-cylinder {
            position: relative;
            width: 80px;
            cursor: default;
            filter: drop-shadow(0 12px 30px rgba(139,0,0,.6));
        }

        /* Top oval */
        .jp-cyl-top {
            width: 80px;
            height: 22px;
            background: radial-gradient(ellipse at 50% 40%, #d43030, #8b0000);
            border-radius: 50%;
            position: relative;
            z-index: 3;
            box-shadow: 0 4px 8px rgba(0,0,0,.4);
        }
        /* Body */
        .jp-cyl-body {
            width: 80px;
            height: 160px;
            background: linear-gradient(90deg,
                #5c0000 0%, #8b0000 15%, #cc2020 40%,
                #dd3333 50%, #cc2020 60%, #8b0000 85%, #5c0000 100%);
            margin-top: -11px;
            position: relative;
            overflow: hidden;
            box-shadow:
                inset 3px 0 8px rgba(255,255,255,.08),
                inset -3px 0 8px rgba(0,0,0,.4);
        }
        /* Gold character 御 on front */
        .jp-cyl-body::after {
            content: '御';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.6rem;
            font-weight: 900;
            color: rgba(212,168,83,.7);
            text-shadow: 0 0 10px rgba(212,168,83,.5);
            letter-spacing: 0;
        }
        /* Gold bands */
        .jp-cyl-band {
            position: absolute;
            left: -4px;
            right: -4px;
            height: 10px;
            background: linear-gradient(90deg, #8b6914, #f0d060, #d4a853, #f0d060, #8b6914);
            border-radius: 5px;
            z-index: 4;
        }
        .jp-cyl-band.top { top: 22px; }
        .jp-cyl-band.bottom { bottom: 0; }

        /* Bottom oval */
        .jp-cyl-bottom {
            width: 80px;
            height: 20px;
            background: radial-gradient(ellipse at 50% 60%, #8b0000, #5c0000);
            border-radius: 50%;
            margin-top: -10px;
            position: relative;
            z-index: 3;
            box-shadow: 0 6px 16px rgba(0,0,0,.5);
        }

        /* Sticks */
        .jp-sticks {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            z-index: 5;
        }
        .jp-stick {
            width: 7px;
            border-radius: 4px;
            background: linear-gradient(180deg, #f5deb3 0%, #d2b48c 60%, #a0785a 100%);
            box-shadow: 1px 0 3px rgba(0,0,0,.4);
        }
        .jp-stick:nth-child(1) { height: 70px; }
        .jp-stick:nth-child(2) { height: 60px; margin-top: 10px; }
        .jp-stick:nth-child(3) { height: 65px; margin-top: 5px; }
        .jp-stick:nth-child(4) { height: 55px; margin-top: 15px; }

        /* Cylinder glow (ambient) */
        .jp-cylinder::before {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 20px;
            background: radial-gradient(ellipse, rgba(139,0,0,.5), transparent);
            border-radius: 50%;
        }

        /* ── Shake animation ── */
        @keyframes jpShake {
            0%,100% { transform: rotate(0) translateX(0); }
            8%  { transform: rotate(-7deg) translateX(-10px); }
            16% { transform: rotate(6deg)  translateX(12px); }
            24% { transform: rotate(-8deg) translateX(-14px); }
            32% { transform: rotate(7deg)  translateX(14px); }
            40% { transform: rotate(-6deg) translateX(-12px); }
            48% { transform: rotate(8deg)  translateX(16px); }
            56% { transform: rotate(-7deg) translateX(-14px); }
            64% { transform: rotate(6deg)  translateX(12px); }
            72% { transform: rotate(-5deg) translateX(-10px); }
            80% { transform: rotate(4deg)  translateX(8px); }
            90% { transform: rotate(-2deg) translateX(-4px); }
        }
        .jp-cylinder.shaking { animation: jpShake 1.8s cubic-bezier(.36,.07,.19,.97); }

        /* ── Draw button ── */
        .jp-draw-btn {
            background: linear-gradient(135deg, #7a0000, #aa0000);
            color: #f5e6c8;
            border: 2px solid rgba(212,168,83,.7);
            padding: 15px 48px;
            font-size: 1.1rem;
            font-family: 'Noto Serif JP', serif;
            font-weight: 700;
            letter-spacing: .12em;
            border-radius: 50px;
            cursor: pointer;
            box-shadow:
                0 6px 20px rgba(139,0,0,.5),
                0 0 30px rgba(212,168,83,.15),
                inset 0 1px 0 rgba(255,255,255,.1);
            transition: all .3s;
        }
        .jp-draw-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(139,0,0,.6), 0 0 40px rgba(212,168,83,.25);
            border-color: rgba(212,168,83,1);
        }
        .jp-draw-btn:disabled {
            background: rgba(255,255,255,.05);
            border-color: rgba(255,255,255,.1);
            color: rgba(255,255,255,.3);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* ── Scroll result ── */
        .jp-scroll-outer {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(30px) scale(.95);
            transition: opacity .6s ease, transform .6s ease;
        }
        .jp-scroll-outer.revealed {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Scroll rods */
        .jp-rod {
            width: 260px;
            height: 18px;
            background: linear-gradient(90deg, #3d1f0a, #7b4a1e, #a0652a, #7b4a1e, #3d1f0a);
            border-radius: 9px;
            box-shadow: 0 4px 12px rgba(0,0,0,.6), inset 0 2px 3px rgba(255,255,255,.1);
            position: relative;
            z-index: 2;
        }
        /* Round knobs at ends */
        .jp-rod::before, .jp-rod::after {
            content: '';
            position: absolute;
            top: -3px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #c4813a, #5c2d0a);
            box-shadow: 0 3px 8px rgba(0,0,0,.5);
        }
        .jp-rod::before { left: -6px; }
        .jp-rod::after  { right: -6px; }

        /* Scroll paper body */
        .jp-scroll-paper {
            width: 260px;
            background: linear-gradient(180deg,
                #fdf8ee 0%, #faf0d8 30%, #f8ead0 50%, #faf0d8 70%, #fdf8ee 100%);
            box-shadow:
                4px 0 12px rgba(0,0,0,.25),
                -4px 0 12px rgba(0,0,0,.25),
                inset 0 0 40px rgba(180,130,60,.08);
            padding: 28px 28px 32px;
            text-align: center;
            overflow: hidden;
            clip-path: inset(0 0 100% 0);
            transition: clip-path .8s cubic-bezier(.4,0,.2,1) .1s;
        }
        .jp-scroll-paper.unrolled {
            clip-path: inset(0 0 0% 0);
        }

        /* Paper texture lines */
        .jp-scroll-paper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                180deg,
                transparent 0px, transparent 28px,
                rgba(180,130,60,.06) 28px, rgba(180,130,60,.06) 29px
            );
            pointer-events: none;
        }

        /* Rank text */
        .jp-rank-text {
            font-family: 'Noto Serif JP', serif;
            font-weight: 900;
            font-size: 3rem;
            letter-spacing: .15em;
            color: #5a1a1a;
            opacity: 0;
            transform: scale(.7);
            transition: opacity .5s ease .7s, transform .5s cubic-bezier(.175,.885,.32,1.275) .7s;
            display: block;
            margin-bottom: 8px;
            text-shadow: 1px 1px 0 rgba(212,168,83,.2);
            white-space: nowrap;
        }
        .jp-scroll-paper.unrolled .jp-rank-text {
            opacity: 1;
            transform: scale(1);
        }

        /* 役名（ポーカー/麻雀）サブ行 */
        .jp-rank-sub {
            font-family: 'Noto Serif JP', serif;
            font-size: .95rem;
            font-weight: 700;
            letter-spacing: .1em;
            color: #8a5a2a;
            margin-bottom: 4px;
            opacity: 0;
            transition: opacity .5s ease .6s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }
        .jp-scroll-paper.unrolled .jp-rank-sub { opacity: 1; }
        .jp-rank-sub .suit-dark { color: #3a3a3a; }
        .jp-rank-sub .suit-red  { color: #c02030; }

        /* Rank color overrides */
        .rank-god      .jp-rank-text { background: linear-gradient(135deg,#FFD700,#FF8C00,#FFD700); -webkit-background-clip:text; background-clip:text; color:transparent; font-size:3.4rem; }
        .rank-super    .jp-rank-text { color: #7a5a00; text-shadow: 0 0 8px rgba(212,168,83,.4); }
        .rank-moon     .jp-rank-text { background: linear-gradient(135deg,#c8d8f0,#8fa8d8,#e8f0ff,#a0b8e0); -webkit-background-clip:text; background-clip:text; color:transparent; font-size:3.4rem; text-shadow: 0 0 16px rgba(160,190,255,.4); }
        .rank-daikichi .jp-rank-text { color: #7a3a00; }
        .rank-kichi    .jp-rank-text { color: #2a5a3a; }
        .rank-suekichi .jp-rank-text { color: #4a3a6a; }
        .rank-kyo      .jp-rank-text { color: #5a5a5a; }
        .rank-daikyo   .jp-rank-text { color: #3a3a3a; font-size: 2.6rem; }

        /* 月読命の紙面は月光の静けさ */
        .rank-moon .jp-scroll-paper {
            background: linear-gradient(180deg, #f5f8ff, #e8eefc, #dde8fa, #e8eefc, #f5f8ff);
            box-shadow: 4px 0 12px rgba(140,170,255,.35), -4px 0 12px rgba(140,170,255,.35),
                        0 0 40px rgba(160,190,255,.2);
        }

        /* God rank glow on scroll */
        .rank-god .jp-scroll-paper {
            background: linear-gradient(180deg, #fffef5, #fff8dc, #fef3c7, #fff8dc, #fffef5);
            box-shadow: 4px 0 12px rgba(212,168,83,.4), -4px 0 12px rgba(212,168,83,.4),
                        0 0 40px rgba(212,168,83,.2);
        }

        /* Reward */
        .jp-reward-text {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 6px 0 12px;
            opacity: 0;
            transition: opacity .4s ease 1.1s;
            font-family: 'Noto Serif JP', serif;
        }
        .jp-scroll-paper.unrolled .jp-reward-text { opacity: 1; }

        /* Divider */
        .jp-scroll-divider {
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(90,26,26,.25), transparent);
            margin: 10px auto;
        }

        /* Message */
        .jp-msg-text {
            font-size: .9rem;
            line-height: 1.9;
            color: #5a3a1a;
            opacity: 0;
            transition: opacity .4s ease 1.3s;
        }
        .jp-scroll-paper.unrolled .jp-msg-text { opacity: 1; }

        /* Seal */
        .jp-seal {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #aa0000, #600000);
            border: 2px solid rgba(180,60,60,.6);
            margin: 14px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,200,160,.9);
            font-size: 1rem;
            font-weight: 900;
            box-shadow: 0 4px 12px rgba(139,0,0,.5), inset 0 1px 2px rgba(255,255,255,.1);
            opacity: 0;
            transition: opacity .4s ease 1.5s;
        }
        .jp-scroll-paper.unrolled .jp-seal { opacity: 1; }

        /* Action buttons */
        .jp-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            opacity: 0;
            transition: opacity .4s ease 1.8s;
        }
        .jp-actions.visible { opacity: 1; }

        .jp-action-btn {
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(245,230,200,.2);
            color: rgba(245,230,200,.7);
            padding: 10px 32px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Noto Serif JP', serif;
            font-size: .9rem;
            letter-spacing: .08em;
            transition: all .2s;
        }
        .jp-action-btn:hover { background: rgba(255,255,255,.1); color: rgba(245,230,200,.9); }

        /* おみくじランキングへのリンクボタン（右上固定） */
        .jp-ranking-link {
            position: fixed;
            top: 68px;
            right: 16px;
            z-index: 1500;
            display: inline-block;
            padding: 9px 22px;
            background: linear-gradient(135deg, rgba(212,168,83,.22), rgba(60,20,90,.5));
            border: 1px solid rgba(212,168,83,.5);
            border-radius: 25px;
            color: #f0d089;
            text-decoration: none;
            font-family: 'Noto Serif JP', serif;
            font-size: .9rem;
            letter-spacing: .06em;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 16px rgba(0,0,0,.4);
            transition: all .2s;
        }
        .jp-ranking-link:hover {
            background: linear-gradient(135deg, rgba(212,168,83,.3), rgba(212,168,83,.12));
            color: #f5e6c8;
            box-shadow: 0 4px 18px rgba(212,168,83,.3);
        }
        .jp-pay-btn {
            background: linear-gradient(135deg, #7a0000, #aa0000);
            border-color: rgba(212,168,83,.5);
            color: #f5e6c8;
        }
        .jp-pay-btn:hover { background: linear-gradient(135deg,#9a0000,#cc0000); }

        /* ── Streak badge ── */
        .jp-streak-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,140,0,.12);
            border: 1px solid rgba(255,140,0,.3);
            border-radius: 20px;
            padding: 6px 18px;
            color: #ffd080;
            font-size: .88rem;
            font-family: 'Noto Serif JP', serif;
            letter-spacing: .06em;
            margin-bottom: 24px;
        }
        .jp-streak-badge .streak-flame { font-size: 1.1rem; }
        .jp-streak-badge .streak-count { font-weight: 700; font-size: 1.05rem; color: #ffb030; }
        .jp-streak-max {
            color: #FFD700;
            border-color: rgba(255,215,0,.5);
            background: rgba(255,215,0,.1);
            animation: streakGlow 2s ease-in-out infinite;
        }
        @keyframes streakGlow {
            0%,100% { box-shadow: 0 0 8px rgba(255,215,0,.2); }
            50%      { box-shadow: 0 0 20px rgba(255,215,0,.5); }
        }

        /* ── Already drawn ── */
        .jp-already-card {
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(245,230,200,.12);
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            color: rgba(245,230,200,.6);
        }
        .jp-already-icon { font-size: 3rem; margin-bottom: 16px; }
        .jp-already-main { font-size: 1.1rem; margin-bottom: 8px; }
        .jp-already-sub { font-size: .85rem; opacity: .5; margin-bottom: 20px; }
        .jp-already-link { color: rgba(212,168,83,.7); font-size: .9rem; text-decoration: none; }
        .jp-already-link:hover { color: rgba(212,168,83,1); }

        /* ── Login prompt ── */
        .jp-login-card {
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(245,230,200,.12);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: rgba(245,230,200,.7);
        }

        /* ── Admin settings (unchanged from before) ── */
        .admin-settings-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5a4a7a, #3d2f5a);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(90,74,122,.5);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform .2s;
        }
        .admin-settings-btn:hover { transform: scale(1.1); }

        .admin-panel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.7);
            z-index: 3000;
            overflow-y: auto;
            padding: 20px;
        }
        .admin-panel-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

        .admin-panel {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 700px;
            margin: 40px auto;
        }
        .admin-panel h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; color: #333; font-family: sans-serif; }

        .entry-row {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: sans-serif;
        }
        .entry-rank { font-weight: 700; font-size: 1rem; min-width: 80px; }
        .entry-details { flex: 1; font-size: .85rem; color: #555; }
        .entry-actions { display: flex; gap: 6px; }

        .entry-form {
            background: #f0f4ff;
            border-radius: 14px;
            padding: 20px;
            margin-top: 16px;
            font-family: sans-serif;
        }
        .entry-form .form-label { font-weight: 600; font-size: .85rem; color: #444; }

    <!-- ── Background canvas (sakura petals) ── -->
    <script>
    (function() {
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, petals = [];

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Petal colors
        const COLORS = ['#ffb7c5','#ffc0cb','#ffd1dc','#ffe4e8','#fff0f3'];
        // ポーカー・麻雀モチーフ（薄く混ぜる）
        const MOTIFS = ['♠','♥','♦','♣','🀄'];

        function createPetal() {
            const isMotif = Math.random() < 0.12;
            return {
                type: isMotif ? 'motif' : 'petal',
                char: isMotif ? MOTIFS[Math.floor(Math.random() * MOTIFS.length)] : null,
                x: Math.random() * W,
                y: -20 - Math.random() * 100,
                size: isMotif ? 12 + Math.random() * 10 : 4 + Math.random() * 7,
                speed: 0.6 + Math.random() * 1.2,
                drift: (Math.random() - .5) * .4,
                rot: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - .5) * .04,
                sway: Math.random() * Math.PI * 2,
                swayAmp: 0.5 + Math.random() * 1.0,
                swaySpeed: 0.008 + Math.random() * 0.015,
                alpha: isMotif ? 0.08 + Math.random() * 0.12 : 0.3 + Math.random() * 0.5,
                color: COLORS[Math.floor(Math.random() * COLORS.length)]
            };
        }

        for (let i = 0; i < 70; i++) {
            const p = createPetal();
            p.y = Math.random() * H; // start scattered
            petals.push(p);
        }

        function drawPetal(p) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.globalAlpha = p.alpha;
            if (p.type === 'motif') {
                ctx.font = `${Math.round(p.size)}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = p.char === '♥' || p.char === '♦' ? '#ff8090' : '#d4c8a0';
                ctx.fillText(p.char, 0, 0);
                ctx.restore();
                return;
            }
            ctx.fillStyle = p.color;
            // 5-petal flower shape
            for (let i = 0; i < 5; i++) {
                ctx.save();
                ctx.rotate(i * Math.PI * 2 / 5);
                ctx.beginPath();
                ctx.ellipse(0, -p.size * .55, p.size * .28, p.size * .55, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            // Center
            ctx.fillStyle = '#fff5f7';
            ctx.beginPath();
            ctx.arc(0, 0, p.size * .18, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function loop() {
            ctx.clearRect(0, 0, W, H);
            petals.forEach(p => {
                p.y += p.speed;
                p.sway += p.swaySpeed;
                p.x += Math.sin(p.sway) * p.swayAmp + p.drift;
                p.rot += p.rotSpeed;
                if (p.y > H + 30) { Object.assign(p, createPetal()); }
                drawPetal(p);
            });
            requestAnimationFrame(loop);
        }
        loop();
    })();
    </script>

    <!-- ── Effect canvas (result particles) ── -->
    <script>
    (function() {
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, particles = [], animId = null;

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.launchParticles = function(rankClass, theme) {
            if (animId) cancelAnimationFrame(animId);
            particles = [];

            const cx = W / 2;
            const cy = H / 2;

            let count, colors, sizeRange;
            if (rankClass === 'rank-god') {
                count = 300;
                colors = ['#FFD700','#FFA500','#FF6347','#FF1493','#00BFFF','#7FFF00','#FFD700','#FFD700'];
                sizeRange = [3, 9];
            } else if (rankClass === 'rank-super') {
                count = 180;
                colors = ['#FFD700','#FFC200','#FFD700','#fffacd','#f5e6c8'];
                sizeRange = [2, 7];
            } else if (rankClass === 'rank-moon') {
                count = 280;
                colors = ['#e8f0ff','#c8d8f0','#a0b8e0','#ffffff','#d0e0ff','#8fa8d8'];
                sizeRange = [2, 8];
            } else if (rankClass === 'rank-daikichi') {
                count = 120;
                colors = ['#FFD700','#d4a853','#ffb7c5','#ffd1dc','#f5e6c8'];
                sizeRange = [2, 6];
            } else if (rankClass === 'rank-kichi') {
                count = 80;
                colors = ['#d4a853','#c8e6c9','#a5d6a7','#fff9c4'];
                sizeRange = [2, 5];
            } else if (rankClass === 'rank-suekichi') {
                count = 50;
                colors = ['#ce93d8','#ba68c8','#9575cd','#ffe0b2'];
                sizeRange = [2, 4];
            } else {
                count = 30;
                colors = ['#aaa','#ccc','#888'];
                sizeRange = [1, 4];
            }

            // テーマ文字（ポーカー: スート / 麻雀: 牌）を混ぜる
            const themeChars = theme === 'poker' ? ['♠','♥','♦','♣']
                             : theme === 'mahjong' ? ['🀄','🎴']
                             : null;

            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 3 + Math.random() * (rankClass === 'rank-god' || rankClass === 'rank-moon' ? 12 : 8);
                const isChar = themeChars && Math.random() < 0.22;
                const char = isChar ? themeChars[Math.floor(Math.random() * themeChars.length)] : null;
                particles.push({
                    x: cx, y: cy,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - (Math.random() * 4),
                    size: isChar ? 7 + Math.random() * 7 : sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]),
                    color: char === '♥' || char === '♦' ? '#ff5060'
                         : char === '♠' || char === '♣' ? '#e8e8f0'
                         : colors[Math.floor(Math.random() * colors.length)],
                    alpha: 1,
                    gravity: 0.15 + Math.random() * 0.1,
                    rot: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - .5) * .15,
                    shape: isChar ? 'char' : (Math.random() < .4 ? 'circle' : 'rect'),
                    char
                });
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                particles = particles.filter(p => p.alpha > .02);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += p.gravity;
                    p.vx *= 0.99;
                    p.rot += p.rotSpeed;
                    p.alpha -= 0.012;

                    ctx.save();
                    ctx.globalAlpha = Math.max(0, p.alpha);
                    ctx.fillStyle = p.color;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot);
                    if (p.shape === 'char') {
                        ctx.font = `${Math.round(p.size * 2.4)}px serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(p.char, 0, 0);
                    } else if (p.shape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(0, 0, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillRect(-p.size, -p.size * .4, p.size * 2, p.size * .8);
                    }
                    ctx.restore();
                });
                if (particles.length > 0) {
                    animId = requestAnimationFrame(draw);
                } else {
                    ctx.clearRect(0, 0, W, H);
                }
            }
            draw();
        };
    })();
    </script>

    <!-- ── Omikuji logic ── -->
    <script>
        let currentUserId = null;
        let omikujiSettings = [];
        let selectedRankClass = '';

        // 活動ログからJST日付ベースで連続日数を計算
        async function calcStreakFromLogs(userId) {
            const { data: logs } = await supabaseClient
                .from('activity_logs')
                .select('created_at')
                .eq('user_id', userId)
                .eq('action_type', 'omikuji')
                .order('created_at', { ascending: false })
                .limit(15);

            if (!logs || logs.length === 0) return { prevStreak: 0, isConsecutive: false };

            const todayMidnight = getJSTMidnight();
            const todayStr = todayMidnight.toLocaleDateString('en-CA', { timeZone: 'Asia/Tokyo' });

            // JST日付に変換・今日より前の日だけ・ユニーク化・新しい順
            const pastDays = [...new Set(
                logs
                    .map(l => new Date(l.created_at).toLocaleDateString('en-CA', { timeZone: 'Asia/Tokyo' }))
                    .filter(d => d < todayStr)
            )].sort().reverse();

            if (pastDays.length === 0) return { prevStreak: 0, isConsecutive: false };

            const yesterdayStr = new Date(todayMidnight.getTime() - 86400000)
                .toLocaleDateString('en-CA', { timeZone: 'Asia/Tokyo' });

            if (pastDays[0] !== yesterdayStr) return { prevStreak: 0, isConsecutive: false };

            // 連続日数カウント（昨日から遡る）
            let streak = 1;
            for (let i = 1; i < pastDays.length; i++) {
                const expected = new Date(todayMidnight.getTime() - (i + 1) * 86400000)
                    .toLocaleDateString('en-CA', { timeZone: 'Asia/Tokyo' });
                if (pastDays[i] === expected) streak++;
                else break;
            }

            return { prevStreak: streak, isConsecutive: true };
        }

        function renderStreakBadge(streak, isMax) {
            if (!streak || streak < 1) return '';
            const cls = isMax ? 'jp-streak-badge jp-streak-max' : 'jp-streak-badge';
            // 今日引いたときのボーナス = prevStreak * 500
            const todayBonus = Math.min(streak, 10) * 500;
            const todayDay = streak + 1;
            const label = isMax
                ? `🔥 連続<span class="streak-count">11日</span>達成！ 今回 +5,000マネー（MAX）`
                : `🔥 連続<span class="streak-count">${todayDay}日目</span> 今回 +${todayBonus.toLocaleString()}マネー`;
            return `<div class="${cls}">${label}</div>`;
        }

        function getRankClass(rank) {
            // 「ハイカード（大凶）」のようなテーマ名付きにも部分一致で対応。判定順序に注意（超大吉→大吉→吉 等）
            if (rank === '天照大御神')       return 'rank-god';
            if (rank === '月読命')           return 'rank-moon';
            if (rank.includes('超大吉'))     return 'rank-super';
            if (rank.includes('大吉') || rank.includes('ねむ吉') || rank.includes('かに吉')) return 'rank-daikichi';
            if (rank.includes('中吉'))       return 'rank-kichi';
            if (rank.includes('末吉'))       return 'rank-suekichi';
            if (rank.includes('小吉'))       return 'rank-kichi';
            if (rank.includes('大凶'))       return 'rank-daikyo';
            if (rank.includes('凶'))         return 'rank-kyo';
            if (rank.includes('吉'))         return 'rank-kichi';
            return 'rank-kichi';
        }

        async function initOmikuji() {
            const user = await getCurrentUser();
            currentUserId = await getEffectiveUserId();

            if (!user && !currentUserId) {
                document.getElementById('login-prompt').style.display = 'block';
                return;
            }

            const { data: settings, error: settingsError } = await supabaseClient
                .from('omikuji_settings').select('*');

            if (settingsError || !settings || settings.length === 0) {
                document.getElementById('omikuji-ui').style.display = 'block';
                document.getElementById('before-draw').innerHTML = '<p style="color:#f87171;">おみくじの設定が見つかりません。</p>';
                return;
            }

            omikujiSettings = settings;

            const { data: profile } = await supabaseClient
                .from('profiles').select('last_omikuji_at,consecutive_omikuji_days')
                .eq('discord_user_id', currentUserId).single();

            document.getElementById('omikuji-ui').style.display = 'block';

            if (profile?.last_omikuji_at && hasDrawnOmikujiToday(profile.last_omikuji_at)) {
                document.getElementById('before-draw').style.display = 'none';
                document.getElementById('already-drawn').style.display = 'block';
            } else {
                const { prevStreak, isConsecutive } = await calcStreakFromLogs(currentUserId);
                if (isConsecutive && prevStreak > 0) {
                    document.getElementById('streak-info').innerHTML =
                        renderStreakBadge(prevStreak, prevStreak >= 10);
                    document.getElementById('streak-hint').style.display = 'none';
                }
            }
        }

        let baseRewardHtml = '';
        async function drawOmikuji() {
            const button = document.getElementById('draw-button');
            button.disabled = true;
            button.textContent = '占い中…';

            const cyl = document.getElementById('jp-cylinder');
            cyl.classList.add('shaking');

            let selected, message, coinReward, ticketReward, manganReward,
                newCoins, newTotalAssets, newTickets, newManganTickets;

            try {
                const totalWeight = omikujiSettings.reduce((s, x) => s + x.weight, 0);
                let rand = Math.random() * totalWeight;
                selected = omikujiSettings[0];
                for (const s of omikujiSettings) { rand -= s.weight; if (rand <= 0) { selected = s; break; } }

                const messages = selected.messages || ['今日も良い一日を！'];
                message = messages[Math.floor(Math.random() * messages.length)];

                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles').select('coins,total_assets,gacha_tickets,mangan_tickets,last_omikuji_at,consecutive_omikuji_days')
                    .eq('discord_user_id', currentUserId).single();
                if (profileError) throw profileError;

                coinReward    = selected.reward || 0;
                ticketReward  = selected.ticket_reward || 0;
                manganReward  = selected.mangan_ticket_reward || 0;

                // 連続ボーナス：活動ログから計算（管理者リセットの影響を受けない）
                const { prevStreak, isConsecutive } = await calcStreakFromLogs(currentUserId);
                const newStreak = Math.min(isConsecutive ? prevStreak + 1 : 1, 11);
                const streakBonus = isConsecutive ? (newStreak - 1) * 500 : 0;

                newCoins        = Math.max(0, (profile.coins || 0) + coinReward + streakBonus);
                newTotalAssets  = profile.total_assets || 0;
                newTickets      = Math.max(0, (profile.gacha_tickets || 0) + ticketReward);
                newManganTickets = Math.max(0, (profile.mangan_tickets || 0) + manganReward);
                if (coinReward > 0) newTotalAssets += coinReward;
                newTotalAssets += streakBonus;

                const { error } = await supabaseClient.from('profiles').update({
                    coins: newCoins, total_assets: newTotalAssets,
                    gacha_tickets: newTickets, mangan_tickets: newManganTickets,
                    last_omikuji_at: new Date().toISOString(),
                    consecutive_omikuji_days: newStreak
                }).eq('discord_user_id', currentUserId);
                if (error) throw error;

                // Badge grant
                if (selected.badge_id) {
                    const { data: has } = await supabaseClient.from('user_badges_new')
                        .select('id').eq('user_id', currentUserId).eq('badge_id', selected.badge_id).maybeSingle();
                    if (!has) {
                        await supabaseClient.from('user_badges_new')
                            .insert([{ user_id: currentUserId, badge_id: selected.badge_id, purchased_price: 0 }]);
                    }
                }

                if (typeof logActivity === 'function') {
                    await logActivity(currentUserId, 'omikuji', {
                        amount: coinReward + streakBonus,
                        details: { rank: selected.rank, message, ticket_reward: ticketReward, mangan_ticket_reward: manganReward, badge_id: selected.badge_id || null, streak_bonus: streakBonus, streak_days: newStreak }
                    });
                }

                await new Promise(r => setTimeout(r, 1800));

                document.getElementById('jp-cylinder-wrap').classList.add('hide');
                await new Promise(r => setTimeout(r, 400));

                selectedRankClass = getRankClass(selected.rank);
                const scrollPaper = document.getElementById('jp-scroll-paper');
                scrollPaper.className = `jp-scroll-paper ${selectedRankClass}`;

                // 「役名（運勢）」形式は2行に分離：役名は小さく上に、運勢は大きく
                const POKER_HANDS = ['ロイヤル','フラッシュ','フォーカード','フルハウス','ストレート','スリーカード','ツーペア','ワンペア','ハイカード'];
                const rankEl = document.getElementById('fortune-rank');
                const subEl = document.getElementById('fortune-rank-sub');
                const rankMatch = selected.rank.match(/^(.+?)（(.+?)）$/);
                let rankTheme = null;
                if (rankMatch) {
                    const handName = rankMatch[1];
                    rankTheme = POKER_HANDS.some(h => handName.includes(h)) ? 'poker' : 'mahjong';
                    const decoL = rankTheme === 'poker' ? '<span class="suit-dark">♠</span><span class="suit-red">♥</span>' : '🀄';
                    const decoR = rankTheme === 'poker' ? '<span class="suit-red">♦</span><span class="suit-dark">♣</span>' : '🀄';
                    subEl.innerHTML = `<span>${decoL}</span>${handName}<span>${decoR}</span>`;
                    subEl.style.fontSize = handName.length >= 9 ? '.8rem' : '';
                    subEl.style.display = 'flex';
                    rankEl.textContent = rankMatch[2];
                } else {
                    subEl.style.display = 'none';
                    rankEl.textContent = selected.rank;
                }

                // Fetch badge info if needed
                let badgeInfo = null;
                if (selected.badge_id) {
                    const { data: bd } = await supabaseClient.from('badges')
                        .select('name,image_url').eq('id', selected.badge_id).single();
                    badgeInfo = bd;
                }

                let rewardHtml = '';
                if (coinReward !== 0) rewardHtml += `<span style="color:${coinReward>0?'#27ae60':'#e74c3c'}">💵 ${coinReward>=0?'+':''}${coinReward.toLocaleString()}</span>`;
                if (ticketReward !== 0) rewardHtml += ` <span style="color:#d4a574">🎫 ${ticketReward>=0?'+':''}${ticketReward}枚</span>`;
                if (manganReward !== 0) rewardHtml += ` <span style="color:#d4a574">🧧 ${manganReward>=0?'+':''}${manganReward}枚</span>`;
                if (badgeInfo) rewardHtml += ` <span style="color:#d4a853">🎖 隠しバッジ「${badgeInfo.name}」獲得！</span>`;

                document.getElementById('fortune-reward').innerHTML = rewardHtml || '<span style="color:#999">報酬なし</span>';

                // Streak bonus line
                const streakBonusEl = document.getElementById('streak-bonus-line');
                if (streakBonus > 0) {
                    const streakLabel = newStreak >= 11
                        ? `🔥 連続11日達成！ ＋${streakBonus.toLocaleString()}マネー（MAX）`
                        : `🔥 連続${newStreak}日ボーナス ＋${streakBonus.toLocaleString()}マネー`;
                    streakBonusEl.innerHTML = `<span style="color:#ffb030;font-weight:700;">${streakLabel}</span>`;
                    streakBonusEl.style.display = 'block';
                } else {
                    streakBonusEl.innerHTML = '';
                    streakBonusEl.style.display = 'none';
                }

                // Show badge image
                const badgeWrap = document.getElementById('fortune-badge-wrap');
                if (badgeInfo?.image_url) {
                    document.getElementById('fortune-badge-img').src = badgeInfo.image_url;
                    badgeWrap.style.display = 'block';
                    requestAnimationFrame(() => { badgeWrap.style.opacity = '1'; });
                } else {
                    badgeWrap.style.display = 'none';
                }
                document.getElementById('fortune-message').textContent = message;

                document.getElementById('mypage-confirm-btn').style.display = 'inline-block';

                document.getElementById('before-draw').style.display = 'none';
                document.getElementById('after-draw').style.display = 'flex';

                await new Promise(r => setTimeout(r, 50));
                document.getElementById('jp-scroll-outer').classList.add('revealed');
                await new Promise(r => setTimeout(r, 200));
                scrollPaper.classList.add('unrolled');

                await new Promise(r => setTimeout(r, 1600));
                document.getElementById('jp-actions').classList.add('visible');

                await new Promise(r => setTimeout(r, 200));
                launchParticles(selectedRankClass, rankTheme);

            } catch (err) {
                console.error('Omikuji error:', err);
                alert('エラーが発生しました: ' + err.message);
                button.disabled = false;
                button.textContent = '🎋 おみくじを引く';
            } finally {
                cyl.classList.remove('shaking');
            }
        }

        document.addEventListener('DOMContentLoaded', initOmikuji);

        // ── 管理パネル ──────────────────────────────
        let allBadges = [];
        let selectedBadgeId = '';

        function toggleAdminPanel() {
            const overlay = document.getElementById('admin-panel-overlay');
            const isOpen = overlay.classList.toggle('open');
            if (isOpen) loadAdminPanel();
        }
        function overlayClose(e) {
            if (e.target === document.getElementById('admin-panel-overlay')) toggleAdminPanel();
        }
        async function loadAdminPanel() {
            if (allBadges.length === 0) {
                const { data } = await supabaseClient.from('badges').select('id,name,image_url').order('name');
                allBadges = data || [];
                document.getElementById('badge-select-list').innerHTML = allBadges.map(b =>
                    `<div class="badge-select-item" data-badge-id="${b.id}" data-name="${b.name}" onclick="selectBadge(this)">
                        <img src="${b.image_url}" onerror="this.style.display='none'">
                        <span>${b.name}</span>
                    </div>`).join('');
            }
            const { data: settings } = await supabaseClient.from('omikuji_settings').select('*').order('weight', { ascending: false });
            renderAdminList(settings || []);
        }
        function renderAdminList(settings) {
            const total = settings.reduce((s,r) => s + Number(r.weight), 0);
            document.getElementById('admin-entry-list').innerHTML = settings.map(s => {
                const pct = total > 0 ? (Number(s.weight)/total*100).toFixed(1) : 0;
                const badge = allBadges.find(b => b.id === s.badge_id);
                return `<div class="entry-row">
                    <div class="entry-rank">${s.rank}</div>
                    <div class="entry-details">
                        💵 ${(s.reward||0).toLocaleString()}　確率 ${pct}%${badge ? `　🎖 ${badge.name}` : ''}
                        <div style="color:#888;font-size:.78rem;">${(s.messages||[]).join(' / ')}</div>
                    </div>
                    <div class="entry-actions">
                        <button class="btn btn-sm btn-outline-primary" onclick="openEntryForm('${s.id}')">編集</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteEntry('${s.id}','${s.rank}')">削除</button>
                    </div>
                </div>`;
            }).join('') || '<p class="text-muted text-center">設定がありません</p>';
        }
        function openEntryForm(id = null) {
            closeEntryForm();
            const form = document.getElementById('entry-form');
            form.style.display = 'block';
            ['ef-id','ef-rank','ef-reward','ef-weight','ef-messages'].forEach(i => document.getElementById(i).value = '');
            selectBadge(document.querySelector('.badge-select-item[data-badge-id=""]'));
            if (id) {
                supabaseClient.from('omikuji_settings').select('*').eq('id',id).single().then(({data:s}) => {
                    if (!s) return;
                    document.getElementById('ef-id').value       = s.id;
                    document.getElementById('ef-rank').value     = s.rank;
                    document.getElementById('ef-reward').value   = s.reward || 0;
                    document.getElementById('ef-weight').value   = s.weight;
                    document.getElementById('ef-messages').value = (s.messages||[]).join('\n');
                    if (s.badge_id) {
                        const el = document.querySelector(`.badge-select-item[data-badge-id="${s.badge_id}"]`);
                        if (el) selectBadge(el);
                    }
                });
            }
            form.scrollIntoView({ behavior: 'smooth' });
        }
        function closeEntryForm() {
            document.getElementById('entry-form').style.display = 'none';
            document.getElementById('badge-search').value = '';
            filterBadges('');
        }
        function filterBadges(q) {
            const lower = q.toLowerCase();
            document.getElementById('badge-none-item').style.display = lower ? 'none' : '';
            document.querySelectorAll('#badge-select-list .badge-select-item').forEach(el => {
                const name = (el.querySelector('span')?.textContent || '').toLowerCase();
                el.style.display = name.includes(lower) ? '' : 'none';
            });
        }
        function selectBadge(el) {
            document.querySelectorAll('.badge-select-item').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedBadgeId = el.dataset.badgeId || '';
            document.getElementById('ef-badge-id').value = selectedBadgeId;
        }
        async function saveEntry() {
            const id       = document.getElementById('ef-id').value;
            const rank     = document.getElementById('ef-rank').value.trim();
            const reward   = Number(document.getElementById('ef-reward').value) || 0;
            const weight   = Number(document.getElementById('ef-weight').value) || 1;
            const messages = document.getElementById('ef-messages').value.split('\n').map(s=>s.trim()).filter(Boolean);
            const badge_id = selectedBadgeId || null;
            if (!rank)            { alert('運勢名を入力してください'); return; }
            if (!messages.length) { alert('コメントを1つ以上入力してください'); return; }
            const payload = { rank, reward, weight, messages, badge_id };
            const { error } = id
                ? await supabaseClient.from('omikuji_settings').update(payload).eq('id',id)
                : await supabaseClient.from('omikuji_settings').insert([payload]);
            if (error) { alert('保存エラー: '+error.message); return; }
            closeEntryForm();
            await loadAdminPanel();
        }
        async function deleteEntry(id, rank) {
            if (!confirm(`「${rank}」を削除しますか？`)) return;
            const { error } = await supabaseClient.from('omikuji_settings').delete().eq('id',id);
            if (error) { alert('削除エラー: '+error.message); return; }
            await loadAdminPanel();
        }
    </script>
</body>
</html>
