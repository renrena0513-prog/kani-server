<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おみくじ - かに鯖</title>
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        :root {
            --deep-purple: #5a4a7a;
            --gold: #d4a574;
            --font-title: 'Kosugi Maru', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
        }

        .page-header {
            color: #fff;
            font-family: var(--font-title);
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .omikuji-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
        }

        .fortune-box {
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .fortune-rank {
            font-size: 3rem;
            font-weight: bold;
            font-family: var(--font-title);
            color: var(--deep-purple);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .fortune-reward {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .fortune-reward.positive {
            color: #27ae60;
        }

        .fortune-reward.negative {
            color: #e74c3c;
        }

        .fortune-message {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #555;
            line-height: 1.8;
        }

        .draw-button {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }

        .draw-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.5);
        }

        .draw-button:disabled {
            background: #aaa;
            cursor: not-allowed;
            box-shadow: none;
        }

        .already-drawn {
            color: #999;
            font-size: 1.1rem;
        }

        .access-denied {
            color: #e74c3c;
            font-size: 1.2rem;
        }

        /* アニメーション */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-5px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(5px);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .shaking {
            animation: shake 0.8s ease-in-out;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        /* ナビゲーションドロップダウン */
        .nav-dropdown {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        /* 管理設定パネル */
        .admin-settings-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5a4a7a, #3d2f5a);
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(90,74,122,.5);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform .2s;
        }
        .admin-settings-btn:hover { transform: scale(1.1); }

        .admin-panel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            z-index: 3000;
            overflow-y: auto;
            padding: 20px;
        }
        .admin-panel-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

        .admin-panel {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 700px;
            margin: 40px auto;
        }
        .admin-panel h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; color: #333; }
        .entry-row {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .entry-rank { font-weight: 700; font-size: 1rem; min-width: 80px; }
        .entry-details { flex: 1; font-size: .85rem; color: #555; }
        .entry-actions { display: flex; gap: 6px; }

        .entry-form {
            background: #f0f4ff;
            border-radius: 14px;
            padding: 20px;
            margin-top: 16px;
        }
        .entry-form .form-label { font-weight: 600; font-size: .85rem; color: #444; }
        .badge-select-item {
            display: flex; align-items: center; gap: 8px; padding: 6px 10px;
            border-radius: 8px; cursor: pointer; transition: background .15s;
        }
        .badge-select-item:hover { background: #e8eeff; }
        .badge-select-item.selected { background: #d0daff; }
        .badge-select-item img { width: 28px; height: 28px; object-fit: contain; border-radius: 4px; }

        .record-button {
            background: linear-gradient(135deg, var(--gold) 0%, #b8892d 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 6px 20px rgba(212, 168, 83, 0.5);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
        }

        .record-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 168, 83, 0.6);
            color: white;
        }

        .nav-dropdown-menu {
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            min-width: 200px;
            overflow: hidden;
            border: none;
        }

        .dropdown-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #333;
            transition: background 0.2s;
        }
    </style>
</head>

<body>
    <!-- 右上のナビゲーションドロップダウン -->

        <button class="record-button dropdown-toggle" type="button" id="navDropdown" data-bs-toggle="dropdown"

        </button>
        <ul class="dropdown-menu nav-dropdown-menu dropdown-menu-end" aria-labelledby="navDropdown">
            <li><a class="dropdown-item" href="../index.html">🏠 ホームに戻る</a></li>

            <li>
                <hr class="dropdown-divider">
            </li>
            <li><a class="dropdown-item" href="../mahjong/index.html">📊 ランキング</a></li>
            <li><a class="dropdown-item" href="../mahjong/record.html">📝 記録する</a></li>
            <li><a class="dropdown-item" href="../mahjong/users/index.html">👥 ユーザー一覧</a></li>
            <li><a class="dropdown-item" href="../mahjong/team/index.html">🏅 チーム管理</a></li>
            <li><a class="dropdown-item" href="../badge/list.html">📛 バッジ一覧</a></li>

                <hr class="dropdown-divider">
            </li>
            <li><a class="dropdown-item" href="./index.html">🎋 おみくじ</a></li>
            <li class="admin-only" style="display:none;">
                <hr class="dropdown-divider">
            </li>
            <li class="admin-only" style="display:none;">
                <a class="dropdown-item" href="../admin/index.html">⚙️ 管理画面</a>
            </li>
        </ul>
    </div>

    <div class="container py-5">
        <header class="text-center">
            <h1 class="page-header display-4 fw-bold">🎋 おみくじ</h1>
            <p class="text-white-50">1日1回の運試し！</p>
        </header>

        <div class="omikuji-card">
            <!-- アクセス拒否表示 -->
            <div id="access-denied" style="display: none;">
                <div class="access-denied mb-4">
                    <p>🚫 このページは管理者限定です</p>
                </div>
                <a href="../index.html" class="btn btn-outline-secondary">ホームに戻る</a>
            </div>

            <!-- ログイン促進 -->
            <div id="login-prompt" style="display: none;">
                <p class="mb-4">おみくじを引くにはログインしてください</p>
                <button onclick="loginWithDiscord()" class="btn btn-primary">Discordでログイン</button>
            </div>

            <!-- おみくじUI -->
            <div id="omikuji-ui" style="display: none;">
                <!-- 引く前 -->
                <div id="before-draw">
                    <p class="mb-4" style="font-size: 1.1rem;">今日の運勢を占いましょう！</p>
                    <button id="draw-button" class="draw-button" onclick="drawOmikuji()">
                        🎋 おみくじを引く
                    </button>
                </div>

                <!-- 引いた後 -->
                <div id="after-draw" style="display: none;">
                    <div id="result-box" class="fortune-box fade-in">
                        <div id="fortune-rank" class="fortune-rank"></div>
                        <div id="fortune-reward" class="fortune-reward"></div>
                    </div>
                    <div id="fortune-message" class="fortune-message"></div>
                    <button id="pay-penalty-btn" class="btn btn-danger mt-3" style="display: none;" onclick="payOmikujiPenalty()">
                        🪙 支払う
                    </button>
                    <button id="mypage-confirm-btn" class="btn btn-outline-secondary mt-4" onclick="location.href='../mypage/index.html'">
                        マイページで確認
                    </button>
                </div>

                <!-- 既に引いた -->
                <div id="already-drawn" style="display: none;">
                    <p class="already-drawn">🌙 本日は既におみくじを引いています</p>
                    <p class="text-muted mt-3">次のおみくじは明日の0時以降に引けます</p>
                    <a href="../mypage/index.html" class="btn btn-outline-primary mt-3">マイページへ</a>

    <!-- 管理設定ボタン（管理者のみ表示） -->
    <button class="admin-settings-btn admin-only" style="display:none;" onclick="toggleAdminPanel()" title="おみくじ設定">⚙️</button>

    <!-- 管理設定パネル -->
    <div class="admin-panel-overlay" id="admin-panel-overlay" onclick="overlayClose(event)">
        <div class="admin-panel">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="mb-0">⚙️ おみくじ設定</h2>
                <button class="btn btn-sm btn-outline-secondary" onclick="toggleAdminPanel()">✕ 閉じる</button>

            <div id="admin-entry-list"></div>
            <button class="btn btn-primary mt-3 w-100" onclick="openEntryForm()">＋ 新しい運勢を追加</button>

            <!-- 追加/編集フォーム -->
            <div class="entry-form" id="entry-form" style="display:none;">
                <input type="hidden" id="ef-id">
                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <label class="form-label">運勢名</label>
                        <input type="text" class="form-control form-control-sm" id="ef-rank" placeholder="大吉">
                    </div>
                    <div class="col-3">
                        <label class="form-label">コイン</label>
                        <input type="number" class="form-control form-control-sm" id="ef-reward" placeholder="1000">
                    </div>
                    <div class="col-3">
                        <label class="form-label">重み</label>
                        <input type="number" class="form-control form-control-sm" id="ef-weight" placeholder="10" step="0.1">
                    </div>
                </div>
                <div class="mb-2">
                    <label class="form-label">ランダムコメント（1行1メッセージ）</label>
                    <textarea class="form-control form-control-sm" id="ef-messages" rows="4" placeholder="良い一日になりそう！&#10;幸運が訪れます。"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">バッジ付与（任意）</label>
                    <div class="border rounded p-2 bg-white" style="max-height:180px;overflow-y:auto;">
                        <div class="badge-select-item" data-badge-id="" onclick="selectBadge(this)">
                            <span>🚫 なし</span>
                        </div>
                        <div id="badge-select-list"></div>
                    </div>
                    <input type="hidden" id="ef-badge-id">
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-success btn-sm flex-grow-1" onclick="saveEntry()">💾 保存</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="closeEntryForm()">キャンセル</button>
                </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/navigation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            initAccordionNav('../');
        });
    </script>
    <script>
        let currentUserId = null;
        let omikujiSettings = [];

        async function initOmikuji() {
            const user = await getCurrentUser();

            // なりすまし対応
            currentUserId = await getEffectiveUserId();

            if (!user && !currentUserId) {
                document.getElementById('login-prompt').style.display = 'block';
                return;
            }

            // おみくじ設定を取得
            const { data: settings, error: settingsError } = await supabaseClient
                .from('omikuji_settings')
                .select('*');

            if (settingsError || !settings || settings.length === 0) {
                document.getElementById('omikuji-ui').style.display = 'block';
                document.getElementById('before-draw').innerHTML = '<p class="text-danger">おみくじの設定が見つかりません。管理者にお問い合わせください。</p>';
                return;
            }

            omikujiSettings = settings;

            // 本日既に引いたかチェック
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('last_omikuji_at')
                .eq('discord_user_id', currentUserId)
                .single();

            document.getElementById('omikuji-ui').style.display = 'block';

            if (profile?.last_omikuji_at && hasDrawnOmikujiToday(profile.last_omikuji_at)) {
                document.getElementById('before-draw').style.display = 'none';
                document.getElementById('already-drawn').style.display = 'block';
            }
        }

        let baseRewardHtml = '';
        let pendingOmikuji = null;

        async function drawOmikuji() {
            const button = document.getElementById('draw-button');
            button.disabled = true;
            button.textContent = '占い中...';
            button.classList.add('shaking');

            try {
                // 重み付きランダム選択
                const totalWeight = omikujiSettings.reduce((sum, s) => sum + s.weight, 0);
                let random = Math.random() * totalWeight;
                let selected = omikujiSettings[0];

                for (const setting of omikujiSettings) {
                    random -= setting.weight;
                    if (random <= 0) {
                        selected = setting;
                        break;
                    }
                }

                // メッセージをランダムに選択
                const messages = selected.messages || ['今日も良い一日を！'];
                const message = messages[Math.floor(Math.random() * messages.length)];

                // 現在のプロフィールを取得
                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('coins, total_assets, gacha_tickets, mangan_tickets')
                    .eq('discord_user_id', currentUserId)
                    .single();

                if (profileError) throw profileError;

                let coinReward = selected.reward || 0;
                const ticketReward = selected.ticket_reward || 0;
                const manganReward = selected.mangan_ticket_reward || 0;
                const isMusumeKyo = selected.rank === 'むすめ凶';
                const displayPenalty = isMusumeKyo ? -999 : null;

                let newCoins = (profile.coins || 0) + coinReward;
                let newTotalAssets = profile.total_assets || 0;
                let newTickets = (profile.gacha_tickets || 0) + ticketReward;
                let newManganTickets = (profile.mangan_tickets || 0) + manganReward;

                // マイナスの場合は0以下にしない
                if (newCoins < 0) newCoins = 0;
                if (newTickets < 0) newTickets = 0;
                if (newManganTickets < 0) newManganTickets = 0;

                // コインプラス分を総資産に加算
                if (coinReward > 0) {
                    newTotalAssets += coinReward;
                }

                if (isMusumeKyo) {
                    // 日時だけ確定。報酬は支払いボタンを押すまで反映しない。
                    const { error: updateError } = await supabaseClient
                        .from('profiles')
                        .update({ last_omikuji_at: new Date().toISOString() })
                        .eq('discord_user_id', currentUserId);
                    if (updateError) throw updateError;
                    pendingOmikuji = { coinReward, ticketReward, manganReward, message, rank: selected.rank };
                } else {
                    // プロフィールを更新
                    const { error: updateError } = await supabaseClient
                        .from('profiles')
                        .update({
                            coins: newCoins,
                            total_assets: newTotalAssets,
                            gacha_tickets: newTickets,
                            mangan_tickets: newManganTickets,
                            last_omikuji_at: new Date().toISOString()
                        })
                        .eq('discord_user_id', currentUserId);
                    if (updateError) throw updateError;

                    // バッジ付与（設定されている場合）
                    if (selected.badge_id) {
                        const { data: alreadyHas } = await supabaseClient
                            .from('user_badges_new')
                            .select('id')
                            .eq('user_id', currentUserId)
                            .eq('badge_id', selected.badge_id)
                            .maybeSingle();
                        if (!alreadyHas) {
                            await supabaseClient.from('user_badges_new').insert([{
                                user_id: currentUserId,
                                badge_id: selected.badge_id,
                                purchased_price: 0
                            }]);
                        }
                    }

                    // 活動ログを記録
                    if (typeof logActivity === 'function') {
                        await logActivity(currentUserId, 'omikuji', {
                            amount: coinReward,
                            details: {
                                rank: selected.rank,
                                message: message,
                                ticket_reward: ticketReward,
                                mangan_ticket_reward: manganReward,
                                badge_id: selected.badge_id || null
                            }
                        });
                    }
                }

                // 少し待ってから結果を表示
                await new Promise(resolve => setTimeout(resolve, 1000));

                // 結果を表示
                document.getElementById('before-draw').style.display = 'none';
                document.getElementById('after-draw').style.display = 'block';

                document.getElementById('fortune-rank').textContent = selected.rank;

                const rewardEl = document.getElementById('fortune-reward');
                let rewardHtml = '';
                if (coinReward !== 0) {
                    rewardHtml += `<span class="${coinReward > 0 ? 'text-success' : 'text-danger'}">🪙 ${coinReward >= 0 ? '+' : ''}${coinReward.toLocaleString()}</span> `;
                }
                if (displayPenalty !== null) {
                    rewardHtml += `<span class="text-danger">🪙 ${displayPenalty.toLocaleString()}</span> `;
                }
                if (ticketReward !== 0) {
                    rewardHtml += `<span style="color: #d4a574;">🎫 ${ticketReward >= 0 ? '+' : ''}${ticketReward}枚</span>`;
                }
                if (manganReward !== 0) {
                    rewardHtml += ` <span style="color: #d4a574;">🧧 ${manganReward >= 0 ? '+' : ''}${manganReward}枚</span>`;
                }

                let baseHtml = '';
                if (coinReward !== 0) {
                    baseHtml += `<span class="${coinReward > 0 ? 'text-success' : 'text-danger'}">🪙 ${coinReward >= 0 ? '+' : ''}${coinReward.toLocaleString()}</span> `;
                }
                if (ticketReward !== 0) {
                    baseHtml += `<span style="color: #d4a574;">🎫 ${ticketReward >= 0 ? '+' : ''}${ticketReward}枚</span>`;
                }
                if (manganReward !== 0) {
                    baseHtml += ` <span style="color: #d4a574;">🧧 ${manganReward >= 0 ? '+' : ''}${manganReward}枚</span>`;
                }
                baseRewardHtml = baseHtml || '<span class="text-muted">報酬なし</span>';

                if (isMusumeKyo) {
                    rewardEl.innerHTML = `<span class="text-danger">🪙 ${displayPenalty.toLocaleString()}</span>`;
                } else {
                    rewardEl.innerHTML = rewardHtml || '<span class="text-muted">報酬なし</span>';
                }
                rewardEl.className = 'fortune-reward'; // 個別に色を指定するのでクラスはリセット

                document.getElementById('fortune-message').textContent = message;
                const payBtn = document.getElementById('pay-penalty-btn');
                const mypageBtn = document.getElementById('mypage-confirm-btn');
                if (payBtn) {
                    payBtn.style.display = isMusumeKyo ? 'inline-block' : 'none';
                    payBtn.disabled = false;
                }
                if (mypageBtn) {
                    mypageBtn.style.display = isMusumeKyo ? 'none' : 'inline-block';
                }

            } catch (err) {
                console.error('Omikuji error:', err);
                alert('エラーが発生しました: ' + err.message);
                button.disabled = false;
                button.textContent = '🎋 おみくじを引く';
            } finally {
                button.classList.remove('shaking');
            }
        }

        async function payOmikujiPenalty() {
            if (!pendingOmikuji) return;
            const payBtn = document.getElementById('pay-penalty-btn');
            if (payBtn) {
                payBtn.disabled = true;
                payBtn.textContent = 'マイページで確認';
                payBtn.classList.remove('btn-danger');
                payBtn.classList.add('btn-outline-secondary');
                payBtn.onclick = () => {
                    location.href = '../mypage/index.html';
                };
            }
            const rewardEl = document.getElementById('fortune-reward');
            if (rewardEl) {
                rewardEl.innerHTML = baseRewardHtml || '<span class="text-muted">報酬なし</span>';
            }
            try {
                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('coins, total_assets, gacha_tickets, mangan_tickets')
                    .eq('discord_user_id', currentUserId)
                    .single();
                if (profileError) throw profileError;

                const coinReward = pendingOmikuji.coinReward || 0;
                const ticketReward = pendingOmikuji.ticketReward || 0;
                const manganReward = pendingOmikuji.manganReward || 0;

                let newCoins = (profile.coins || 0) + coinReward;
                let newTotalAssets = profile.total_assets || 0;
                let newTickets = (profile.gacha_tickets || 0) + ticketReward;
                let newManganTickets = (profile.mangan_tickets || 0) + manganReward;

                if (newCoins < 0) newCoins = 0;
                if (newTickets < 0) newTickets = 0;
                if (newManganTickets < 0) newManganTickets = 0;
                if (coinReward > 0) {
                    newTotalAssets += coinReward;
                }

                const { error: updateError } = await supabaseClient
                    .from('profiles')
                    .update({
                        coins: newCoins,
                        total_assets: newTotalAssets,
                        gacha_tickets: newTickets,
                        mangan_tickets: newManganTickets
                    })
                    .eq('discord_user_id', currentUserId);
                if (updateError) throw updateError;

                if (typeof logActivity === 'function') {
                    await logActivity(currentUserId, 'omikuji', {
                        amount: coinReward,
                        details: {
                            rank: pendingOmikuji.rank,
                            message: pendingOmikuji.message,
                            ticket_reward: ticketReward,
                            mangan_ticket_reward: manganReward
                        }
                    });
                }
                pendingOmikuji = null;
            } catch (err) {
                console.error('Omikuji penalty apply error:', err);
            }
            document.getElementById('fortune-message').textContent = 'ちっ、持ってねーのかよ！しけてんなー。しゃーなしこれやるよ';
        }

        document.addEventListener('DOMContentLoaded', initOmikuji);

        // ── 管理パネル ──────────────────────────────
        let allBadges = [];
        let selectedBadgeId = '';

        function toggleAdminPanel() {
            const overlay = document.getElementById('admin-panel-overlay');
            const isOpen = overlay.classList.toggle('open');
            if (isOpen) loadAdminPanel();
        }

        function overlayClose(e) {
            if (e.target === document.getElementById('admin-panel-overlay')) toggleAdminPanel();
        }

        async function loadAdminPanel() {
            // バッジ一覧取得（初回のみ）
            if (allBadges.length === 0) {
                const { data } = await supabaseClient.from('badges').select('id,name,image_url').order('name');
                allBadges = data || [];
                const listEl = document.getElementById('badge-select-list');
                listEl.innerHTML = allBadges.map(b => `
                    <div class="badge-select-item" data-badge-id="${b.id}" onclick="selectBadge(this)">
                        <img src="${b.image_url}" onerror="this.style.display='none'">
                        <span>${b.name}</span>
                    </div>`).join('');
            }

            // 設定一覧取得
            const { data: settings } = await supabaseClient
                .from('omikuji_settings').select('*').order('weight', { ascending: false });
            renderAdminList(settings || []);
        }

        function renderAdminList(settings) {
            const totalWeight = settings.reduce((s, r) => s + Number(r.weight), 0);
            document.getElementById('admin-entry-list').innerHTML = settings.map(s => {
                const pct = totalWeight > 0 ? (Number(s.weight) / totalWeight * 100).toFixed(1) : 0;
                const badge = allBadges.find(b => b.id === s.badge_id);
                const badgeLabel = badge ? `🎖 ${badge.name}` : '';
                return `<div class="entry-row">
                    <div class="entry-rank">${s.rank}</div>
                    <div class="entry-details">
                        🪙 ${(s.reward || 0).toLocaleString()}　確率 ${pct}%　${badgeLabel}
                        <div class="text-muted" style="font-size:.78rem;">${(s.messages||[]).join(' / ')}</div>
                    </div>
                    <div class="entry-actions">
                        <button class="btn btn-sm btn-outline-primary" onclick="openEntryForm('${s.id}')">編集</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteEntry('${s.id}','${s.rank}')">削除</button>
                    </div>
                </div>`;
            }).join('') || '<p class="text-muted text-center">設定がありません</p>';
        }

        function openEntryForm(id = null) {
            closeEntryForm();
            document.getElementById('entry-form').style.display = 'block';
            document.getElementById('ef-id').value = '';
            document.getElementById('ef-rank').value = '';
            document.getElementById('ef-reward').value = '';
            document.getElementById('ef-weight').value = '';
            document.getElementById('ef-messages').value = '';
            selectBadge(document.querySelector('.badge-select-item[data-badge-id=""]'));

            if (id) {
                supabaseClient.from('omikuji_settings').select('*').eq('id', id).single().then(({ data: s }) => {
                    if (!s) return;
                    document.getElementById('ef-id').value = s.id;
                    document.getElementById('ef-rank').value = s.rank;
                    document.getElementById('ef-reward').value = s.reward || 0;
                    document.getElementById('ef-weight').value = s.weight;
                    document.getElementById('ef-messages').value = (s.messages || []).join('\n');
                    if (s.badge_id) {
                        const el = document.querySelector(`.badge-select-item[data-badge-id="${s.badge_id}"]`);
                        if (el) selectBadge(el);
                    }
                });
            }
            document.getElementById('entry-form').scrollIntoView({ behavior: 'smooth' });
        }

        function closeEntryForm() {
            document.getElementById('entry-form').style.display = 'none';
        }

        function selectBadge(el) {
            document.querySelectorAll('.badge-select-item').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedBadgeId = el.dataset.badgeId || '';
            document.getElementById('ef-badge-id').value = selectedBadgeId;
        }

        async function saveEntry() {
            const id = document.getElementById('ef-id').value;
            const rank = document.getElementById('ef-rank').value.trim();
            const reward = Number(document.getElementById('ef-reward').value) || 0;
            const weight = Number(document.getElementById('ef-weight').value) || 1;
            const messages = document.getElementById('ef-messages').value
                .split('\n').map(s => s.trim()).filter(Boolean);
            const badge_id = selectedBadgeId || null;

            if (!rank) { alert('運勢名を入力してください'); return; }
            if (messages.length === 0) { alert('コメントを1つ以上入力してください'); return; }

            const payload = { rank, reward, weight, messages, badge_id };
            let error;
            if (id) {
                ({ error } = await supabaseClient.from('omikuji_settings').update(payload).eq('id', id));
            } else {
                ({ error } = await supabaseClient.from('omikuji_settings').insert([payload]));
            }
            if (error) { alert('保存エラー: ' + error.message); return; }
            closeEntryForm();
            await loadAdminPanel();
        }

        async function deleteEntry(id, rank) {
            if (!confirm(`「${rank}」を削除しますか？`)) return;
            const { error } = await supabaseClient.from('omikuji_settings').delete().eq('id', id);
            if (error) { alert('削除エラー: ' + error.message); return; }
            await loadAdminPanel();
        }
    </script>
</body>

</html>
