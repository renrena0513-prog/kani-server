<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マーケット | かにサーバー</title>
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      background: linear-gradient(180deg, #0d2f5c 0%, #1a1a2e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .mkt-wrap { max-width: 1000px; margin: 0 auto; padding: 80px 16px 60px; }

    /* ヘッダー */
    .mkt-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
    }
    .mkt-title { font-size: 1.5rem; font-weight: 800; letter-spacing: .04em; }
    .mkt-gold {
      background: rgba(212,168,83,.18); border: 1px solid rgba(212,168,83,.4);
      border-radius: 10px; padding: 8px 16px; font-size: .95rem;
      color: #f0c060; font-weight: 700;
    }

    /* タブ */
    .mkt-tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .mkt-tab {
      padding: 7px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.07); color: rgba(255,255,255,.7);
      cursor: pointer; font-size: .9rem; transition: all .15s;
    }
    .mkt-tab.active {
      background: rgba(212,168,83,.5); border-color: rgba(212,168,83,.7);
      color: #fff; font-weight: 700;
    }

    /* 出品ボタン */
    .btn-list {
      padding: 9px 22px; background: rgba(107,222,155,.5);
      border: 1px solid rgba(107,222,155,.7); border-radius: 10px;
      color: #fff; font-weight: 700; cursor: pointer; font-size: .9rem;
      transition: background .15s;
    }
    .btn-list:hover { background: rgba(107,222,155,.75); }
    .btn-list:disabled { opacity: .4; cursor: not-allowed; }

    /* カードグリッド */
    .mkt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    /* 出品カード */
    .mkt-card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      transition: border-color .15s;
    }
    .mkt-card:hover { border-color: rgba(212,168,83,.4); }
    .mkt-card.own { border-color: rgba(107,222,155,.35); }

    .mkt-card-item {
      display: flex; align-items: center; gap: 10px;
    }
    .mkt-card-icon {
      font-size: 2rem; line-height: 1; flex-shrink: 0;
    }
    /* カード出品専用のビジュアル（トレーディングカード風） */
    .mkt-card-visual {
      position: relative; width: 64px; height: 90px; flex-shrink: 0;
      border-radius: 8px; overflow: hidden;
      background: linear-gradient(160deg,#1e3f72 0%,#0d2040 100%);
      border: 1px solid rgba(212,168,83,.4);
    }
    .mkt-card-visual img { width: 100%; height: 100%; object-fit: cover; }
    .mkt-card-visual .mkt-card-icon {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    }
    .mkt-card-visual .mkt-rank-badge {
      position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: .62rem; font-weight: 900; color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,.6); z-index: 3;
    }
    .mkt-card-visual .mkt-ap-badge {
      position: absolute; top: 3px; right: 3px;
      background: rgba(0,20,90,.88); color: #60b4ff;
      font-size: .58rem; font-weight: 900; border-radius: 4px;
      padding: 1px 4px; z-index: 3;
    }
    .mkt-card-name { font-size: 1rem; font-weight: 700; }
    .mkt-card-qty { font-size: .78rem; color: rgba(255,255,255,.55); margin-top: 2px; }

    .mkt-card-price {
      background: rgba(240,192,96,.12); border: 1px solid rgba(240,192,96,.3);
      border-radius: 8px; padding: 8px 12px; text-align: center;
    }
    .mkt-price-unit { font-size: 1.25rem; font-weight: 800; color: #f0c060; }
    .mkt-price-label { font-size: .72rem; color: rgba(255,255,255,.5); }

    .mkt-seller {
      display: flex; align-items: center; gap: 7px;
      font-size: .78rem; color: rgba(255,255,255,.55);
    }
    .mkt-seller img { width: 22px; height: 22px; border-radius: 50%; }

    .btn-buy {
      width: 100%; padding: 8px; border-radius: 8px;
      background: rgba(212,168,83,.45); border: 1px solid rgba(212,168,83,.65);
      color: #fff; font-weight: 700; cursor: pointer; font-size: .9rem;
      transition: background .15s;
    }
    .btn-buy:hover { background: rgba(212,168,83,.7); }

    .btn-cancel {
      width: 100%; padding: 8px; border-radius: 8px;
      background: rgba(200,60,60,.35); border: 1px solid rgba(200,60,60,.55);
      color: #fff; font-weight: 700; cursor: pointer; font-size: .9rem;
      transition: background .15s;
    }
    .btn-cancel:hover { background: rgba(200,60,60,.6); }

    .badge-soldout {
      display: inline-block; background: rgba(255,255,255,.12);
      border-radius: 6px; padding: 2px 8px; font-size: .72rem;
      color: rgba(255,255,255,.45);
    }

    /* モーダル */
    .mkt-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.72); z-index: 9999;
      align-items: center; justify-content: center; padding: 20px;
    }
    .mkt-modal-overlay.open { display: flex; }
    .mkt-modal {
      background: #0d2447; border: 1px solid rgba(255,255,255,.15);
      border-radius: 16px; padding: 24px;
      width: min(94vw, 420px); color: #fff;
      max-height: 88vh; overflow-y: auto;
    }
    .mkt-modal.wide { width: min(94vw, 680px); }
    .mkt-modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px;
      padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,.15); }

    .mkt-field { margin-bottom: 14px; }
    .mkt-field label { display: block; font-size: .8rem; opacity: .65; margin-bottom: 5px; }
    .mkt-input {
      width: 100%; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px; color: #fff; padding: 8px 12px; font-size: .95rem;
    }
    .mkt-input:focus { outline: 1px solid rgba(212,168,83,.7); background: rgba(255,255,255,.15); }
    select.mkt-input option { background: #0d2447; color: #fff; }

    .mkt-preview {
      background: rgba(255,255,255,.06); border-radius: 10px;
      padding: 12px 14px; font-size: .85rem; margin-bottom: 16px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .mkt-preview-row { display: flex; justify-content: space-between; align-items: center; }
    .mkt-preview-row span:last-child { font-weight: 700; color: #f0c060; }
    .mkt-fee-note { font-size: .74rem; color: rgba(255,255,255,.45); text-align: right; }

    .btn-mkt-confirm {
      width: 100%; padding: 10px; border-radius: 10px;
      background: rgba(107,222,155,.5); border: 1px solid rgba(107,222,155,.7);
      color: #fff; font-weight: 700; cursor: pointer; font-size: .95rem;
      margin-bottom: 8px; transition: background .15s;
    }
    .btn-mkt-confirm:hover { background: rgba(107,222,155,.75); }
    .btn-mkt-confirm.danger {
      background: rgba(212,168,83,.45); border-color: rgba(212,168,83,.65);
    }
    .btn-mkt-confirm.danger:hover { background: rgba(212,168,83,.7); }
    .btn-mkt-close {
      width: 100%; padding: 8px; border-radius: 8px;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.7); cursor: pointer; font-size: .88rem;
    }

    .lm-item-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      cursor: pointer; transition: background .12s, border-color .12s;
    }
    .lm-item-row:hover { background: rgba(255,255,255,.12); }
    .lm-item-row.selected {
      background: rgba(212,168,83,.25);
      border-color: rgba(212,168,83,.6);
    }

    /* カード出品時のフィルター・ソートバー */
    .lm-card-filters {
      display: none; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
    }
    .lm-card-filters select {
      flex: 1 1 auto; min-width: 84px;
      background: rgba(255,255,255,.1); color: #fff;
      border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
      padding: 6px 8px; font-size: .78rem; font-weight: 600; cursor: pointer;
    }
    .lm-card-filters select option { background: #0d2447; color: #fff; }
    .lm-dir-btn {
      flex: 0 0 auto; min-width: 56px;
      background: rgba(212,168,83,.25); color: #fff;
      border: 1px solid rgba(212,168,83,.5); border-radius: 8px;
      padding: 6px 10px; font-size: .78rem; font-weight: 700; cursor: pointer;
    }

    /* カード出品ピッカー：グリッド表示 */
    .lm-card-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(74px, 1fr));
      gap: 8px;
    }
    .lm-mini-card {
      aspect-ratio: 3/4; background: #0d2040;
      border: 2px solid rgba(255,255,255,.15); border-radius: 9px;
      position: relative; overflow: hidden; cursor: pointer;
      display: flex; flex-direction: column;
      transition: border-color .12s, transform .12s;
    }
    .lm-mini-card:hover { border-color: rgba(255,255,255,.4); }
    .lm-mini-card.selected {
      border-color: rgba(212,168,83,.9);
      box-shadow: 0 0 0 2px rgba(212,168,83,.4);
    }
    .lm-mini-img {
      flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center;
      overflow: hidden; background: linear-gradient(160deg,#1e3f72 0%,#0d2040 100%);
    }
    .lm-mini-img img { width: 100%; height: 100%; object-fit: cover; }
    .lm-mini-name {
      flex-shrink: 0; background: rgba(0,0,0,.65);
      font-size: .5rem; font-weight: 700; color: #fff; text-align: center;
      padding: 2px 3px; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lm-mini-rank {
      position: absolute; top: 3px; left: 3px; width: 18px; height: 18px;
      border-radius: 4px; display: flex; align-items: center; justify-content: center;
      font-size: .6rem; font-weight: 900; color: #fff; z-index: 3;
      text-shadow: 0 1px 2px rgba(0,0,0,.6);
    }
    .lm-mini-ap {
      position: absolute; top: 3px; right: 3px;
      background: rgba(0,20,90,.88); color: #60b4ff;
      font-size: .56rem; font-weight: 900; border-radius: 4px;
      padding: 1px 4px; z-index: 3;
    }
    .lm-mini-qty {
      position: absolute; bottom: 18px; right: 3px;
      background: rgba(212,168,83,.92); color: #1a1a2e;
      font-size: .52rem; font-weight: 900; border-radius: 4px;
      padding: 0 4px; z-index: 3;
    }

    .mkt-empty {
      grid-column: 1 / -1; text-align: center;
      padding: 48px 20px; color: rgba(255,255,255,.35); font-size: .95rem;
    }

    .mkt-status-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
    }
    .mkt-count { font-size: .82rem; color: rgba(255,255,255,.45); }
  </style>
</head>
<body>
<div class="mkt-wrap">

  <!-- ヘッダー -->
  <div class="mkt-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="../drill/index.html" style="color:rgba(255,255,255,.55);text-decoration:none;font-size:.85rem;display:flex;align-items:center;gap:4px;transition:color .15s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,.55)'">← ドリルに戻る</a>
      <div class="mkt-title">🏪 マーケット</div>
    </div>
    <div class="mkt-gold" id="gold-display">💰 読み込み中...</div>
  </div>

  <!-- タブ＋出品ボタン -->
  <div class="mkt-status-bar">
    <div class="mkt-tabs" id="main-tabs">
      <button class="mkt-tab active" onclick="showTab('all',this)">📋 出品一覧</button>
      <button class="mkt-tab" onclick="showTab('mine',this)">🏷️ マイ出品</button>
    </div>
    <button class="btn-list" id="btn-list-new" onclick="openListModal()" disabled>
      ＋ 出品する (<span id="my-count">0</span>/3)
    </button>
  </div>
  <!-- フィルター -->
  <div class="mkt-tabs" id="filter-tabs" style="margin-bottom:12px;">
    <button class="mkt-tab active" onclick="showFilter('all',this)">すべて</button>
    <button class="mkt-tab" onclick="showFilter('mats',this)">📦 素材</button>
    <button class="mkt-tab" onclick="showFilter('items',this)">💊 アイテム</button>
    <button class="mkt-tab" onclick="showFilter('drills',this)">⛏️ ドリル</button>
    <button class="mkt-tab" onclick="showFilter('cards',this)">🃏 カード</button>
  </div>
  <div class="mkt-tabs" style="margin-bottom:16px;flex-wrap:wrap;">
    <select id="mat-filter-select" class="mkt-input" style="display:none;width:auto;padding:6px 10px;font-size:.85rem;" onchange="renderGrid()">
      <option value="">素材: すべて</option>
      <option value="dirt">土</option>
      <option value="stone">石</option>
      <option value="copper">銅</option>
      <option value="iron">鉄</option>
      <option value="silver">銀</option>
      <option value="gold">金</option>
    </select>
    <select id="sort-select" class="mkt-input" style="width:auto;padding:6px 10px;font-size:.85rem;margin-left:auto;" onchange="renderGrid()">
      <option value="new">新着順</option>
      <option value="price_asc">単価が安い順</option>
    </select>
  </div>

  <!-- カードグリッド -->
  <div class="mkt-grid" id="mkt-grid">
    <div class="mkt-empty">読み込み中...</div>
  </div>
</div>

<!-- 購入モーダル -->
<div class="mkt-modal-overlay" id="buy-modal">
  <div class="mkt-modal">
    <div class="mkt-modal-title">🛒 購入する</div>
    <div id="buy-modal-item" style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <div id="bm-icon" style="font-size:2rem;"></div>
      <div>
        <div id="bm-name" style="font-weight:700;font-size:1rem;"></div>
        <div id="bm-seller" style="font-size:.78rem;color:rgba(255,255,255,.5);margin-top:2px;"></div>
      </div>
    </div>
    <div class="mkt-preview" id="buy-preview">
      <div class="mkt-preview-row"><span>個数</span><span id="bp-qty">-</span></div>
      <div class="mkt-preview-row"><span>単価</span><span id="bp-unit">-</span></div>
      <div class="mkt-preview-row"><span>合計</span><span id="bp-total">-</span></div>
    </div>
    <div class="mkt-fee-note" style="margin-bottom:12px;">※ まとめ買いのみ（一部数量のみの購入は不可）／手数料20%（出品者には80%が入ります）</div>
    <button class="btn-mkt-confirm danger" id="btn-buy-confirm" onclick="confirmBuy()">購入する</button>
    <button class="btn-mkt-close" onclick="closeBuyModal()">キャンセル</button>
  </div>
</div>

<!-- 出品モーダル -->
<div class="mkt-modal-overlay" id="list-modal">
  <div class="mkt-modal wide">
    <div class="mkt-modal-title">🏷️ 出品する</div>
    <div class="mkt-field">
      <div style="display:flex;gap:5px;flex-wrap:wrap;" id="lm-cat-tabs">
        <button class="mkt-tab active" style="padding:4px 12px;font-size:.8rem;" onclick="setListCat('all',this)">すべて</button>
        <button class="mkt-tab" style="padding:4px 12px;font-size:.8rem;" onclick="setListCat('mats',this)">📦 素材</button>
        <button class="mkt-tab" style="padding:4px 12px;font-size:.8rem;" onclick="setListCat('items',this)">💊 アイテム</button>
        <button class="mkt-tab" style="padding:4px 12px;font-size:.8rem;" onclick="setListCat('drills',this)">⛏️ ドリル</button>
        <button class="mkt-tab" style="padding:4px 12px;font-size:.8rem;" onclick="setListCat('cards',this)">🃏 カード</button>
      </div>
    </div>
    <div class="lm-card-filters" id="lm-card-filters">
      <select id="lm-card-rank" onchange="updateCardListFilter()">
        <option value="">ランク: すべて</option>
        <option value="s">S</option><option value="a">A</option><option value="b">B</option>
        <option value="c">C</option><option value="d">D</option>
      </select>
      <select id="lm-card-weapon" onchange="updateCardListFilter()">
        <option value="">武器種: すべて</option>
        <option value="剣">剣</option><option value="短剣">短剣</option><option value="斧">斧</option>
        <option value="ハンマー">ハンマー</option><option value="ブーメラン">ブーメラン</option>
        <option value="槍">槍</option><option value="杖">杖</option><option value="鎌">鎌</option>
      </select>
      <select id="lm-card-sort" onchange="updateCardListFilter()">
        <option value="rank">ランク順</option>
        <option value="attack">攻撃力順</option>
        <option value="ap">APコスト順</option>
      </select>
      <button type="button" class="lm-dir-btn" id="lm-card-dir-btn" onclick="toggleCardListDir()">▼ 降順</button>
    </div>
    <div class="mkt-field" style="margin-bottom:10px;">
      <div id="lm-item-list" style="max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;"></div>
    </div>
    <div class="mkt-field" id="lm-qty-field" style="display:none;">
      <label>個数（最大 <span id="lm-max">0</span> 個）</label>
      <input class="mkt-input" type="number" id="lm-qty" min="1" value="1" oninput="updateListPreview()">
    </div>
    <div class="mkt-field">
      <label>1個あたりの値段（G）</label>
      <input class="mkt-input" type="number" id="lm-price" min="1" value="10" oninput="updateListPreview()">
    </div>
    <div class="mkt-preview" id="list-preview">
      <div class="mkt-preview-row"><span>個数</span><span id="lp-qty">-</span></div>
      <div class="mkt-preview-row"><span>単価</span><span id="lp-price">-</span></div>
      <div class="mkt-preview-row"><span>総額（購入者負担）</span><span id="lp-total">-</span></div>
      <div class="mkt-preview-row"><span>受け取り（手数料20%後）</span><span id="lp-earn">-</span></div>
    </div>
    <button class="btn-mkt-confirm" id="btn-list-confirm" onclick="confirmList()">出品する</button>
    <button class="btn-mkt-close" onclick="closeListModal()">キャンセル</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/navigation.js"></script>
<script>
// ============================================================
// アイテム定義（drill/game.js と同期）
// ============================================================
const ITEM_INFO = {
  // 素材
  dirt:          { name: '土',             icon: '🟫' },
  stone:         { name: '石',             icon: '🪨' },
  copper:        { name: '銅',             icon: '🔶' },
  iron:          { name: '鉄',             icon: '⚙️' },
  silver:        { name: '銀',             icon: '🥈' },
  gold:          { name: '金',             icon: '🥇' },
  // アイテム
  return_stone:  { name: '帰還石',         icon: '💎' },
  potion:        { name: 'ポーション',     icon: '🧪' },
  // ドリル
  beginner:      { name: '初心者ドリル',   icon: '⛏️', maxDur: null },
  apprentice:    { name: '見習いのドリル', icon: '⛏️', maxDur: 300  },
  stone_drill:   { name: '石ドリル',       icon: '⛏️', maxDur: 1000 },
  copper_drill:  { name: '銅ドリル',       icon: '⛏️', maxDur: 2000 },
  journeyman:    { name: '一人前のドリル', icon: '⛏️', maxDur: 3000 },
  iron_drill:    { name: '鉄ドリル',       icon: '⛏️', maxDur: 4000 },
  mass_drill:    { name: '量産型ドリル',   icon: '⛏️', maxDur: 3000 },
  veteran:       { name: '熟練のドリル',   icon: '⛏️', maxDur: 10000},
  silver_drill:  { name: '銀のドリル',     icon: '⛏️', maxDur: 20000},
  allpurpose:    { name: '万能ドリル',     icon: '⛏️', maxDur: 50000},
};

// カード定義（drill_cards + game_config.cards から動的に読み込む。ドリル/game.jsと同じ二層構造）
let CARD_INFO = {}; // card_id -> {name, icon, imageUrl, rarity}

function itemName(id) { return ITEM_INFO[id]?.name ?? CARD_INFO[id]?.name ?? id; }
function itemIcon(id) { return ITEM_INFO[id]?.icon ?? CARD_INFO[id]?.icon ?? '📦'; }
function isDrill(id)  { return ITEM_INFO[id]?.maxDur !== undefined; }
function isCardId(id) { return Object.prototype.hasOwnProperty.call(CARD_INFO, id); }

async function loadCardDefs() {
  const [settingsRes, dbCardsRes] = await Promise.all([
    supabaseClient.from('drill_page_settings').select('setting_value').eq('setting_key', 'game_config').maybeSingle(),
    supabaseClient.from('drill_cards').select('id,name,icon,rarity,weapon_type,ap_cost,base_attack').order('no'),
  ]);
  const cfg = settingsRes.data?.setting_value ? JSON.parse(settingsRes.data.setting_value) : {};
  (dbCardsRes.data || []).forEach(r => {
    const id = r.id === 'fist' ? 'fist_d' : r.id;
    CARD_INFO[id] = {
      name: r.name || id, icon: r.icon || '🃏', rarity: (r.rarity || '').toLowerCase(), imageUrl: null,
      weapon_type: r.weapon_type || null, ap_cost: r.ap_cost ?? null, base_attack: r.base_attack ?? null,
    };
  });
  // drill_cards（上でCARD_INFOに読み込み済み）が正データ。cfg.cardsはimageUrlの上書き専用で、
  // drill_cards未登録のカードにのみ他フィールドのフォールバックとして使う
  if (cfg.cards) {
    for (const [id, v] of Object.entries(cfg.cards)) {
      const ex = CARD_INFO[id];
      CARD_INFO[id] = {
        name: ex?.name ?? v.name ?? id,
        icon: ex?.icon ?? v.icon ?? '🃏',
        imageUrl: v.imageUrl ?? ex?.imageUrl ?? null,
        rarity: (ex?.rarity ?? v.rarity ?? '').toLowerCase(),
        weapon_type: ex?.weapon_type ?? v.weapon_type ?? null,
        ap_cost: ex?.ap_cost ?? v.ap_cost ?? null,
        base_attack: ex?.base_attack ?? v.base_attack ?? null,
      };
    }
  }
}

// 状態
// ============================================================
let _userId = null;
let _discordId = null;
let _myGold = 0;
let _myInventory = []; // { item_id, quantity, source }
let _myDrills = [];    // { item_id, quantity:1, source:'drill', drill_row_id, durability, max_dur }
let _myCards = [];     // { item_id, quantity, source:'card' }
let _listings = [];
let _currentTab = 'all';
let _filterType  = 'all'; // 'all' | 'mats' | 'items' | 'drills' | 'cards'
let _buyTarget = null;    // { listing }
let _listCat = 'all';     // 出品モーダルのカテゴリフィルター
let _listSelected = null; // 選択中アイテムのJSON文字列
let _cardListFilter = { rank: '', weapon: '', sort: 'rank', dir: 'desc' }; // 出品ピッカーのカードフィルター・ソート
const CARD_RANK_ORDER = { d: 0, c: 1, b: 2, a: 3, s: 4 };

const MAT_IDS = new Set(['dirt','stone','copper','iron','silver','gold']);
function listingCategory(l) {
  if (l.source === 'drill' || isDrill(l.item_id)) return 'drills';
  if (l.source === 'card' || isCardId(l.item_id)) return 'cards';
  if (MAT_IDS.has(l.item_id)) return 'mats';
  return 'items';
}

// ============================================================
// 初期化
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  initAccordionNav('../');

  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) { window.location.href = '../login/index.html'; return; }
  _userId    = user.id;
  _discordId = user.user_metadata?.provider_id;

  await Promise.all([loadMyGold(), loadCardDefs(), loadInventory(), loadListings()]);
  renderGrid();
  setupRealtime();
});

// ============================================================
// データ取得
// ============================================================
async function loadMyGold() {
  const { data } = await supabaseClient
    .from('profiles').select('drill_gold')
    .eq('discord_user_id', _discordId).maybeSingle();
  _myGold = data?.drill_gold ?? 0;
  document.getElementById('gold-display').textContent = `💰 ${_myGold.toLocaleString()} G`;
}

async function loadInventory() {
  const [invRes, bpRes, drillRes, cardRes] = await Promise.all([
    supabaseClient.from('drill_inventory').select('item_id,quantity').eq('user_id', _userId),
    supabaseClient.from('drill_backpack').select('item_id,quantity').eq('user_id', _userId),
    // 探索中に拾った未確定の戦利品ドリル（is_loot=true）は帰還して確定するまで出品不可
    supabaseClient.from('drill_player_drills').select('id,drill_id,durability,equipped').eq('user_id', _userId).eq('equipped', false).eq('is_loot', false),
    supabaseClient.from('drill_player_cards').select('card_id,quantity').eq('user_id', _userId),
  ]);
  const merged = {};
  for (const r of invRes.data || []) {
    merged[r.item_id] = { item_id: r.item_id, quantity: (merged[r.item_id]?.quantity || 0) + r.quantity, source: 'inventory' };
  }
  for (const r of bpRes.data || []) {
    if (merged[r.item_id]) {
      merged[r.item_id].quantity += r.quantity;
    } else {
      merged[r.item_id] = { item_id: r.item_id, quantity: r.quantity, source: 'backpack' };
    }
  }
  _myInventory = Object.values(merged).filter(i => i.quantity > 0)
    .sort((a,b) => (itemName(a.item_id) < itemName(b.item_id) ? -1 : 1));

  // ドリルを1個ずつ個別エントリとして追加
  _myDrills = (drillRes.data || []).map(d => ({
    item_id: d.drill_id,
    quantity: 1,
    source: 'drill',
    drill_row_id: d.id,
    durability: d.durability,
    max_dur: ITEM_INFO[d.drill_id]?.maxDur ?? null,
  }));

  // カード
  _myCards = (cardRes.data || []).filter(r => r.quantity > 0).map(r => ({
    item_id: r.card_id,
    quantity: r.quantity,
    source: 'card',
  })).sort((a,b) => (itemName(a.item_id) < itemName(b.item_id) ? -1 : 1));
}

async function loadListings() {
  const { data } = await supabaseClient
    .from('market_listings')
    .select('*')
    .in('status', ['active', 'sold_out'])
    .order('created_at', { ascending: false });
  _listings = data || [];
}

// ============================================================
// 表示
// ============================================================
function showTab(tab, el) {
  _currentTab = tab;
  document.querySelectorAll('#main-tabs .mkt-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

function showFilter(type, el) {
  _filterType = type;
  document.querySelectorAll('#filter-tabs .mkt-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('mat-filter-select').style.display = type === 'mats' ? '' : 'none';
  if (type !== 'mats') document.getElementById('mat-filter-select').value = '';
  renderGrid();
}

function renderGrid() {
  const myActive = _listings.filter(l => l.seller_user_id === _userId && l.status === 'active');
  const myCount  = myActive.length;
  document.getElementById('my-count').textContent = myCount;

  const btnList = document.getElementById('btn-list-new');
  btnList.disabled = (myCount >= 3);

  let items;
  if (_currentTab === 'mine') {
    items = _listings.filter(l => l.seller_user_id === _userId);
  } else {
    items = _listings.filter(l => l.status === 'active');
  }
  if (_filterType !== 'all') {
    items = items.filter(l => listingCategory(l) === _filterType);
  }
  const matFilter = document.getElementById('mat-filter-select')?.value;
  if (_filterType === 'mats' && matFilter) {
    items = items.filter(l => l.item_id === matFilter);
  }

  const sortBy = document.getElementById('sort-select')?.value || 'new';
  items = items.slice();
  if (sortBy === 'price_asc') {
    items.sort((a, b) => a.price_per_unit - b.price_per_unit);
  } else {
    items.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  }

  const grid = document.getElementById('mkt-grid');
  if (items.length === 0) {
    grid.innerHTML = `<div class="mkt-empty">${_currentTab === 'mine' ? '出品中のアイテムはありません' : '出品中のアイテムはありません'}</div>`;
    return;
  }

  grid.innerHTML = items.map(l => buildCard(l)).join('');
}

function buildCard(l) {
  const isOwn    = l.seller_user_id === _userId;
  const isSoldOut = l.status === 'sold_out';
  const icon     = l.item_icon || itemIcon(l.item_id);
  const av       = l.seller_avatar
    ? `<img src="${escHtml(l.seller_avatar)}" style="width:18px;height:18px;border-radius:50%;flex-shrink:0;">`
    : '👤';

  const actionBtn = isOwn
    ? `<button class="btn-cancel" onclick="cancelListing('${l.id}')">取り下げ</button>`
    : isSoldOut
      ? `<div style="text-align:center;"><span class="badge-soldout">売り切れ</span></div>`
      : `<button class="btn-buy" onclick="openBuyModal('${l.id}')">購入する</button>`;

  const ownBadge = isOwn ? '<span style="font-size:.7rem;color:#6bde9b;margin-left:6px;">出品中</span>' : '';

  // ドリルの場合は耐久バー表示
  let drillDurBar = '';
  if (l.source === 'drill' && l.item_data) {
    const d = typeof l.item_data === 'string' ? JSON.parse(l.item_data) : l.item_data;
    if (d.durability !== null && d.max_dur) {
      const pct = Math.max(0, Math.round(d.durability / d.max_dur * 100));
      const col = pct > 50 ? '#4caf50' : pct > 20 ? '#ff9800' : '#f44336';
      drillDurBar = `<div style="margin-top:6px;">
        <div style="display:flex;justify-content:space-between;font-size:.72rem;color:rgba(255,255,255,.55);margin-bottom:3px;">
          <span>耐久</span><span>${d.durability.toLocaleString()} / ${d.max_dur.toLocaleString()}</span>
        </div>
        <div style="height:5px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${col};border-radius:3px;"></div>
        </div>
      </div>`;
    }
  }

  // カードの場合はトレーディングカード風のビジュアル（画像・ランクバッジ・APバッジ）を表示
  let cardIconHtml = `<div class="mkt-card-icon">${escHtml(icon)}</div>`;
  if (l.source === 'card' && l.item_data) {
    const d = typeof l.item_data === 'string' ? JSON.parse(l.item_data) : l.item_data;
    const rankColors = { d:'#60637a', c:'#2a9e5c', b:'#1870d4', a:'#8820e8', s:'#ff4000' };
    const rankBadgeInner = d.rarity ? `<div class="mkt-rank-badge" style="background:${rankColors[d.rarity] || '#666'};">${d.rarity.toUpperCase()}</div>` : '';
    const apBadgeInner = d.ap_cost != null ? `<div class="mkt-ap-badge">${d.ap_cost}</div>` : '';
    const imgInner = d.imageUrl
      ? `<img src="${escHtml(d.imageUrl)}" onerror="this.outerHTML='<div class=&quot;mkt-card-icon&quot;>${escHtml(icon)}</div>'">`
      : `<div class="mkt-card-icon">${escHtml(icon)}</div>`;
    cardIconHtml = `<div class="mkt-card-visual">${rankBadgeInner}${apBadgeInner}${imgInner}</div>`;
  }

  const qtyLine = l.source === 'drill'
    ? ''
    : `<div class="mkt-card-qty">残り ${l.remaining_qty.toLocaleString()} / ${l.total_qty.toLocaleString()} 個</div>`;

  return `
    <div class="mkt-card${isOwn ? ' own' : ''}">
      <div class="mkt-card-item">
        ${cardIconHtml}
        <div style="flex:1;min-width:0;">
          <div class="mkt-card-name">${escHtml(l.item_name)}${ownBadge}</div>
          ${qtyLine}
          ${drillDurBar}
        </div>
      </div>
      <div class="mkt-card-price">
        <div class="mkt-price-unit">${l.price_per_unit.toLocaleString()} G</div>
        <div class="mkt-price-label">/ 1個</div>
      </div>
      <div class="mkt-seller">${av} ${escHtml(l.seller_name || '名無し')}</div>
      ${actionBtn}
    </div>`;
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// 購入モーダル
// ============================================================
function openBuyModal(listingId) {
  const l = _listings.find(x => x.id === listingId);
  if (!l || l.status !== 'active') return;
  _buyTarget = l;

  const bmIcon = document.getElementById('bm-icon');
  const cardData = l.source === 'card' && l.item_data
    ? (typeof l.item_data === 'string' ? JSON.parse(l.item_data) : l.item_data)
    : null;
  if (cardData?.imageUrl) {
    bmIcon.innerHTML = `<img src="${escHtml(cardData.imageUrl)}" style="width:44px;height:58px;object-fit:cover;border-radius:6px;">`;
  } else {
    bmIcon.textContent = l.item_icon || itemIcon(l.item_id);
  }
  document.getElementById('bm-name').textContent   = l.item_name;
  document.getElementById('bm-seller').textContent = `出品者: ${l.seller_name || '名無し'}`;
  updateBuyPreview();
  document.getElementById('buy-modal').classList.add('open');
}

// 購入は常に「まとめ買い」＝残り数量すべてを一括購入（一部数量だけの購入は不可）
function updateBuyPreview() {
  if (!_buyTarget) return;
  const qty   = _buyTarget.remaining_qty;
  const total = qty * _buyTarget.price_per_unit;
  document.getElementById('bp-qty').textContent   = `${qty.toLocaleString()} 個`;
  document.getElementById('bp-unit').textContent  = `${_buyTarget.price_per_unit.toLocaleString()} G / 個`;
  document.getElementById('bp-total').textContent = `${total.toLocaleString()} G`;
}

function closeBuyModal() {
  document.getElementById('buy-modal').classList.remove('open');
  _buyTarget = null;
}

async function confirmBuy() {
  if (!_buyTarget) return;
  const qty = _buyTarget.remaining_qty;
  const total = qty * _buyTarget.price_per_unit;

  if (_myGold < total) { alert('所持金が足りません'); return; }

  const btn = document.getElementById('btn-buy-confirm');
  btn.disabled = true; btn.textContent = '処理中...';

  const { data, error } = await supabaseClient.rpc('market_buy', {
    p_listing_id:       _buyTarget.id,
    p_buyer_user_id:    _userId,
    p_buyer_discord_id: _discordId,
    p_quantity:         qty,
  });

  btn.disabled = false; btn.textContent = '購入する';

  if (error || !data?.ok) {
    const msg = { insufficient_gold:'所持金が足りません', insufficient_stock:'在庫が足りません',
                  not_active:'この出品は既に終了しています', cannot_buy_own:'自分の出品は買えません' };
    alert(msg[data?.error] || '購入に失敗しました');
    return;
  }

  closeBuyModal();
  await Promise.all([loadMyGold(), loadInventory(), loadListings()]);
  renderGrid();
  alert(`✅ 購入しました！ ${qty}個 × ${_buyTarget?.price_per_unit ?? ''}G = ${total.toLocaleString()}G`);
}

// 出品モーダル
// ============================================================
function openListModal() {
  const myActive = _listings.filter(l => l.seller_user_id === _userId && l.status === 'active');
  if (myActive.length >= 3) { alert('出品できるのは同時に3つまでです'); return; }

  _listSelected = null;
  _listCat = 'all';
  _cardListFilter = { rank: '', weapon: '', sort: 'rank', dir: 'desc' };
  document.getElementById('lm-card-rank').value = '';
  document.getElementById('lm-card-weapon').value = '';
  document.getElementById('lm-card-sort').value = 'rank';
  document.getElementById('lm-card-dir-btn').textContent = '▼ 降順';
  document.querySelectorAll('#lm-cat-tabs .mkt-tab').forEach((b, i) => b.classList.toggle('active', i === 0));
  document.getElementById('lm-qty').value = 1;
  document.getElementById('lm-qty').disabled = false;
  document.getElementById('lm-price').value = 10;
  renderListItems();
  updateListPreview();
  document.getElementById('list-modal').classList.add('open');
}

function setListCat(cat, el) {
  _listCat = cat;
  _listSelected = null;
  document.querySelectorAll('#lm-cat-tabs .mkt-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderListItems();
  updateListPreview();
}

function renderListItems() {
  const container = document.getElementById('lm-item-list');
  const filterBar = document.getElementById('lm-card-filters');

  if (_listCat === 'cards') {
    filterBar.style.display = 'flex';
    renderCardListPicker(container);
    return;
  }
  filterBar.style.display = 'none';

  const allItems = [
    ..._myInventory.map(inv => ({
      val: JSON.stringify({ item_id: inv.item_id, max: inv.quantity, source: inv.source }),
      icon: itemIcon(inv.item_id),
      label: itemName(inv.item_id),
      sub: 'x' + inv.quantity.toLocaleString(),
      cat: MAT_IDS.has(inv.item_id) ? 'mats' : 'items',
    })),
    ..._myDrills.filter(d => d.item_id !== 'beginner').map(d => {
      const durStr = d.durability !== null ? ('耐久' + d.durability + '/' + (d.max_dur ?? 'inf')) : '耐久inf';
      return {
        val: JSON.stringify({ item_id: d.item_id, max: 1, source: 'drill', drill_row_id: d.drill_row_id, durability: d.durability, max_dur: d.max_dur }),
        icon: itemIcon(d.item_id),
        label: itemName(d.item_id),
        sub: durStr,
        cat: 'drills',
      };
    }),
    ..._myCards.map(c => ({
      val: JSON.stringify({ item_id: c.item_id, max: c.quantity, source: 'card' }),
      icon: itemIcon(c.item_id),
      label: itemName(c.item_id),
      sub: 'x' + c.quantity.toLocaleString(),
      cat: 'cards',
    })),
  ];

  const filtered = _listCat === 'all' ? allItems : allItems.filter(i => i.cat === _listCat);

  if (filtered.length === 0) {
    container.innerHTML = '<div style="font-size:.82rem;color:rgba(255,255,255,.35);padding:10px;text-align:center;">該当アイテムなし</div>';
    return;
  }

  container.innerHTML = filtered.map(item => {
    const isSelected = _listSelected === item.val;
    return '<div class="lm-item-row' + (isSelected ? ' selected' : '') + '" onclick="selectListItem(\'' + encodeURIComponent(item.val) + '\')">'
      + '<span style="font-size:1.1rem;line-height:1;">' + item.icon + '</span>'
      + '<span style="flex:1;font-size:.88rem;font-weight:600;">' + escHtml(item.label) + '</span>'
      + '<span style="font-size:.78rem;color:rgba(255,255,255,.55);">' + escHtml(item.sub) + '</span>'
      + '</div>';
  }).join('');
}

// カード出品ピッカー：フィルター・ソート付きのカードグリッド表示
function renderCardListPicker(container) {
  let cards = _myCards.slice();
  if (_cardListFilter.rank)   cards = cards.filter(c => (CARD_INFO[c.item_id]?.rarity || '') === _cardListFilter.rank);
  if (_cardListFilter.weapon) cards = cards.filter(c => (CARD_INFO[c.item_id]?.weapon_type || '') === _cardListFilter.weapon);

  const dir = _cardListFilter.dir === 'asc' ? 1 : -1;
  cards.sort((a, b) => {
    const ca = CARD_INFO[a.item_id] || {}, cb = CARD_INFO[b.item_id] || {};
    let va, vb;
    if (_cardListFilter.sort === 'attack')    { va = Number(ca.base_attack ?? 0); vb = Number(cb.base_attack ?? 0); }
    else if (_cardListFilter.sort === 'ap')   { va = Number(ca.ap_cost ?? 0);     vb = Number(cb.ap_cost ?? 0); }
    else /* rank */                           { va = CARD_RANK_ORDER[ca.rarity] ?? -1; vb = CARD_RANK_ORDER[cb.rarity] ?? -1; }
    return (va - vb) * dir;
  });

  if (cards.length === 0) {
    container.innerHTML = '<div style="font-size:.82rem;color:rgba(255,255,255,.35);padding:10px;text-align:center;">該当カードなし</div>';
    return;
  }

  container.innerHTML = `<div class="lm-card-grid">${cards.map(c => cardPickHtml(c)).join('')}</div>`;
}

function cardPickHtml(c) {
  const def = CARD_INFO[c.item_id] || {};
  const val = JSON.stringify({ item_id: c.item_id, max: c.quantity, source: 'card' });
  const isSelected = _listSelected === val;
  const rank = def.rarity;
  const rankColors = { d:'#60637a', c:'#2a9e5c', b:'#1870d4', a:'#8820e8', s:'#ff4000' };
  const imgHtml = def.imageUrl
    ? `<img src="${escHtml(def.imageUrl)}" onerror="this.outerHTML='<div style=&quot;font-size:1.6rem;line-height:1;&quot;>${escHtml(def.icon || '🃏')}</div>'">`
    : `<div style="font-size:1.6rem;line-height:1;">${escHtml(def.icon || '🃏')}</div>`;
  return `<div class="lm-mini-card${isSelected ? ' selected' : ''}" onclick="selectListItem('${encodeURIComponent(val)}')">
    ${rank ? `<div class="lm-mini-rank" style="background:${rankColors[rank] || '#666'};">${rank.toUpperCase()}</div>` : ''}
    <div class="lm-mini-ap">${def.ap_cost ?? 0}</div>
    <div class="lm-mini-img">${imgHtml}</div>
    ${c.quantity > 1 ? `<div class="lm-mini-qty">×${c.quantity}</div>` : ''}
    <div class="lm-mini-name">${escHtml(def.name || c.item_id)}</div>
  </div>`;
}

function updateCardListFilter() {
  _cardListFilter.rank   = document.getElementById('lm-card-rank').value;
  _cardListFilter.weapon = document.getElementById('lm-card-weapon').value;
  _cardListFilter.sort   = document.getElementById('lm-card-sort').value;
  renderListItems();
}

function toggleCardListDir() {
  _cardListFilter.dir = _cardListFilter.dir === 'desc' ? 'asc' : 'desc';
  document.getElementById('lm-card-dir-btn').textContent = _cardListFilter.dir === 'desc' ? '▼ 降順' : '▲ 昇順';
  renderListItems();
}

function selectListItem(encoded) {
  _listSelected = decodeURIComponent(encoded);
  const parsed = JSON.parse(_listSelected);
  const qtyEl = document.getElementById('lm-qty');
  if (parsed.source === 'drill') {
    qtyEl.value = 1;
    qtyEl.disabled = true;
    document.getElementById('lm-qty-field').style.display = 'none';
  } else {
    qtyEl.disabled = false;
    qtyEl.value = 1;
    document.getElementById('lm-qty-field').style.display = '';
  }
  renderListItems();
  updateListPreview();
}

function updateListPreview() {
  if (!_listSelected) {
    ['lp-qty','lp-price','lp-total','lp-earn'].forEach(id => { document.getElementById(id).textContent = '-'; });
    return;
  }
  const parsed = JSON.parse(_listSelected);
  const { max, source } = parsed;
  document.getElementById('lm-max').textContent = max;

  const qtyEl = document.getElementById('lm-qty');
  const qty   = source === 'drill' ? 1 : Math.max(1, Math.min(parseInt(qtyEl.value) || 1, max));
  const price = Math.max(1, parseInt(document.getElementById('lm-price').value) || 1);
  const total = qty * price;
  const earn  = Math.floor(total * 0.8);

  document.getElementById('lp-qty').textContent   = qty.toLocaleString() + ' 個';
  document.getElementById('lp-price').textContent  = price.toLocaleString() + ' G / 個';
  document.getElementById('lp-total').textContent  = total.toLocaleString() + ' G';
  document.getElementById('lp-earn').textContent   = earn.toLocaleString() + ' G';
}

function closeListModal() {
  document.getElementById('list-modal').classList.remove('open');
  document.getElementById('lm-qty').disabled = false;
  document.getElementById('lm-qty-field').style.display = '';
  _listSelected = null;
}

async function confirmList() {
  if (!_listSelected) { alert('アイテムを選択してください'); return; }
  const parsed = JSON.parse(_listSelected);
  const { item_id, max, source, drill_row_id, durability, max_dur } = parsed;
  if (item_id === 'beginner') { alert('初心者ドリルは出品できません'); return; }
  const qty   = source === 'drill' ? 1 : Math.max(1, Math.min(parseInt(document.getElementById('lm-qty').value) || 1, max));
  const price = Math.max(1, parseInt(document.getElementById('lm-price').value) || 1);

  const itemData = source === 'drill'
    ? { drill_row_id, durability, max_dur }
    : source === 'card'
      ? { rarity: CARD_INFO[item_id]?.rarity ?? null, imageUrl: CARD_INFO[item_id]?.imageUrl ?? null, ap_cost: CARD_INFO[item_id]?.ap_cost ?? null }
      : {};

  // ドリルの場合は耐久値を名前に付加して表示
  const displayName = source === 'drill' && durability !== null
    ? `${itemName(item_id)} [耐久${durability}/${max_dur ?? '∞'}]`
    : itemName(item_id);

  const { data: userData } = await supabaseClient.auth.getUser();
  const sellerName   = userData?.user?.user_metadata?.name || userData?.user?.user_metadata?.full_name || '名無し';
  const sellerAvatar = userData?.user?.user_metadata?.avatar_url || null;

  const btn = document.getElementById('btn-list-confirm');
  btn.disabled = true; btn.textContent = '処理中...';

  const { data, error } = await supabaseClient.rpc('market_list', {
    p_seller_user_id:    _userId,
    p_seller_discord_id: _discordId,
    p_seller_name:       sellerName,
    p_seller_avatar:     sellerAvatar,
    p_item_id:           item_id,
    p_item_name:         displayName,
    p_item_icon:         itemIcon(item_id),
    p_quantity:          qty,
    p_price_per_unit:    price,
    p_source:            source,
    p_item_data:         itemData,
  });

  btn.disabled = false; btn.textContent = '出品する';

  if (error || !data?.ok) {
    const msg = { max_listings_reached:'出品上限（3つ）に達しています',
                  insufficient_items:'所持数が足りません' };
    alert(msg[data?.error] || '出品に失敗しました');
    return;
  }

  closeListModal();
  await Promise.all([loadInventory(), loadListings()]);
  renderGrid();
}

// ============================================================
// 取り下げ
// ============================================================
async function cancelListing(listingId) {
  if (!confirm('この出品を取り下げますか？\n残りの個数は倉庫に返却されます。')) return;

  const { data, error } = await supabaseClient.rpc('market_cancel', {
    p_listing_id: listingId,
    p_user_id:    _userId,
  });

  if (error || !data?.ok) { alert('取り下げに失敗しました'); return; }

  await Promise.all([loadInventory(), loadListings()]);
  renderGrid();
}

// ============================================================
// Realtime（他プレイヤーの操作をリアルタイム反映）
// ============================================================
function setupRealtime() {
  supabaseClient.channel('market_realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'market_listings' },
      async () => {
        await loadListings();
        renderGrid();
      })
    .subscribe();
}
</script>
