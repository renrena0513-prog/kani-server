<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>編成 | ほりほりドリル</title>
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="style.css">
  <style>
    html {
      height: auto;
      overflow-y: auto;
    }
    body {
      background: linear-gradient(180deg, #0d2f5c 0%, #1a1a2e 100%);
      min-height: 100dvh;
      height: auto;
      overflow-y: auto;
      color: #fff;
      padding-bottom: 40px;
    }
    .fm-wrap { max-width: 500px; margin: 0 auto; padding: 16px; }
    .fm-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,.6); text-decoration: none;
      font-size: .85rem; margin-bottom: 16px;
      transition: color .15s;
    }
    .fm-back:hover { color: #fff; }
    .fm-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 16px; }

    /* タブ */
    .fm-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .fm-tab {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      background: rgba(255,255,255,.08); color: rgba(255,255,255,.55);
      font-size: .88rem; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .fm-tab.active { background: rgba(212,168,83,.65); color: #fff; }

    /* セクション */
    .fm-section { margin-bottom: 24px; }
    .fm-section-title {
      font-size: .78rem; font-weight: 700; opacity: .5;
      letter-spacing: .05em; margin-bottom: 10px; text-transform: uppercase;
    }

    /* ドリル行 */
    .drill-row {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    }
    .drill-row-info { flex: 1; min-width: 0; }
    .drill-row-name { font-size: .9rem; font-weight: 600; }
    .drill-row-sub { font-size: .75rem; opacity: .55; margin-top: 2px; }
    .drill-dur-bar {
      height: 4px; background: rgba(255,255,255,.12);
      border-radius: 2px; overflow: hidden; margin-top: 5px;
    }
    .drill-dur-fill { height: 100%; border-radius: 2px; transition: width .3s; }
    .btn-fm {
      padding: 6px 14px; border: none; border-radius: 8px;
      background: rgba(212,168,83,.55); color: #fff;
      font-size: .8rem; font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: background .15s;
    }
    .btn-fm:hover { background: rgba(212,168,83,.85); }
    .btn-fm.equipped { background: rgba(80,180,120,.4); cursor: default; }
    .btn-fm.danger { background: rgba(200,60,60,.55); }
    .btn-fm.danger:hover { background: rgba(200,60,60,.85); }

    /* カード グリッド */
    .card-grid {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 8px; margin-bottom: 8px;
    }
    .card-slot {
      aspect-ratio: 3/4;
      background: rgba(255,255,255,.06);
      border: 2px dashed rgba(255,255,255,.18);
      border-radius: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: .65rem; gap: 4px; cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative; overflow: hidden;
      user-select: none;
    }
    .card-slot.has-card {
      border-style: solid;
      border-color: rgba(212,168,83,.5);
      background: rgba(212,168,83,.1);
    }
    .card-slot.has-card:hover { background: rgba(212,168,83,.2); }
    .card-slot.drag-over {
      border-color: #fff;
      background: rgba(255,255,255,.15);
    }
    .card-slot.dragging { opacity: .4; }
    /* 新カードデザイン：画像で埋める */
    .card-icon { font-size: 1.6rem; line-height: 1; }
    .card-img-area {
      position: absolute;
      inset: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .card-img-fill {
      width: 100%; height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
    }
    .card-name-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,.62);
      font-size: .52rem; font-weight: 700; color: #fff;
      text-align: center; padding: 3px 3px;
      line-height: 1.2;
      pointer-events: none;
    }
    .card-ap-badge {
      position: absolute; top: 4px; right: 4px;
      background: rgba(0,20,90,.88);
      color: #60b4ff; font-size: .68rem; font-weight: 900;
      border-radius: 5px; padding: 2px 6px; line-height: 1.5;
      z-index: 3; pointer-events: none;
    }
    .card-qty-badge {
      position: absolute; bottom: 22px; right: 4px;
      background: rgba(212,168,83,.92);
      color: #1a1a2e; font-size: .62rem; font-weight: 900;
      border-radius: 5px; padding: 1px 5px; line-height: 1.5;
      z-index: 3; pointer-events: none;
    }
    .card-slot-num {
      position: absolute; top: 3px; left: 5px;
      font-size: .55rem; opacity: .35; font-weight: 700;
    }

    /* 未装備カード */
    .unequipped-grid {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .unequipped-card {
      aspect-ratio: 3/4;
      background: rgba(255,255,255,.06);
      border: 2px solid rgba(255,255,255,.15);
      border-radius: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: .65rem; gap: 4px; cursor: grab;
      transition: border-color .15s, background .15s;
      user-select: none;
      position: relative; overflow: hidden;
    }
    .unequipped-card:hover { border-color: rgba(255,255,255,.4); background: rgba(255,255,255,.1); }
    .unequipped-card.dragging { opacity: .4; cursor: grabbing; }

    /* 未装備カード フィルター・ソートバー */
    .pool-filter-bar {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
    }
    .pool-filter-bar select {
      flex: 1 1 auto; min-width: 92px;
      background: rgba(255,255,255,.07); color: #fff;
      border: 1px solid rgba(255,255,255,.18); border-radius: 8px;
      padding: 6px 8px; font-size: .74rem; font-weight: 600;
      cursor: pointer;
    }
    .pool-filter-bar select:focus { outline: none; border-color: rgba(212,168,83,.6); }
    .pool-filter-bar select option { color: #222; background: #fff; }
    .pool-dir-btn {
      flex: 0 0 auto; min-width: 60px;
      background: rgba(212,168,83,.2); color: #fff;
      border: 1px solid rgba(212,168,83,.5); border-radius: 8px;
      padding: 6px 10px; font-size: .74rem; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .pool-dir-btn:hover { background: rgba(212,168,83,.4); }
    /* タップ選択 */
    .tap-selected {
      outline: 3px solid rgba(255, 210, 0, .95) !important;
      outline-offset: -2px;
      background: rgba(255, 210, 0, .18) !important;
      transform: scale(1.07);
      z-index: 2;
      animation: tapPulse .75s ease-in-out infinite alternate;
    }
    @keyframes tapPulse {
      from { box-shadow: 0 0 8px rgba(255,210,0,.35); }
      to   { box-shadow: 0 0 22px rgba(255,210,0,.75), 0 0 5px rgba(255,210,0,.9); }
    }
    /* 選択中ラベル */
    .sel-label {
      position: absolute; top: 50%; left: 0; right: 0;
      transform: translateY(-50%);
      text-align: center; font-size: .56rem; font-weight: 900;
      color: #ffe050; letter-spacing: .04em; pointer-events: none; z-index: 4;
      text-shadow: 0 1px 4px rgba(0,0,0,.9);
    }
    /* 配置ターゲットヒント */
    .slot-target {
      position: absolute; inset: 0; border-radius: 8px;
      background: rgba(60,180,120,.12);
      border: 2px solid rgba(60,200,130,.45) !important;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; pointer-events: none; z-index: 1;
      animation: targetPulse .9s ease-in-out infinite alternate;
    }
    @keyframes targetPulse {
      from { background: rgba(60,180,120,.08); }
      to   { background: rgba(60,180,120,.22); }
    }
    /* 配置完了フラッシュ */
    .just-placed {
      animation: placedFlash .55s ease-out forwards !important;
    }
    @keyframes placedFlash {
      0%   { outline: 3px solid rgba(80,220,120,.95) !important; background: rgba(80,220,120,.3); transform: scale(1.1); }
      100% { outline: none; background: rgba(212,168,83,.1); transform: scale(1); }
    }
    /* ヒントバー */
    #fm-hint {
      background: rgba(60,120,220,.13);
      border: 1px solid rgba(100,160,255,.22);
      border-radius: 10px; padding: 8px 12px;
      font-size: .78rem; color: rgba(200,220,255,.88);
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
      min-height: 38px; transition: background .2s;
    }
    #fm-hint.selecting { background: rgba(220,180,20,.13); border-color: rgba(255,210,0,.3); color: #ffe590; }
    #fm-hint .hint-text { flex: 1; }
    .hint-btn {
      padding: 4px 11px; border-radius: 7px; font-size: .72rem; font-weight: 700; cursor: pointer; border: none;
    }
    .hint-btn-cancel { background: rgba(255,255,255,.1); color: rgba(255,255,255,.6); }
    .hint-btn-return { background: rgba(200,80,80,.4); color: #ffb3b3; margin-right: 2px; }

    /* 保存ボタン */
    .btn-save {
      width: 100%; padding: 13px; border: none; border-radius: 12px;
      background: rgba(80,180,120,.7); color: #fff;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      margin-top: 8px; transition: background .15s;
    }
    .btn-save:hover { background: rgba(80,180,120,1); }
    .save-msg { text-align: center; font-size: .8rem; opacity: .6; margin-top: 8px; min-height: 20px; }

    /* タブ表示切り替え */
    #tab-drills, #tab-cards { display: none; }
    #tab-drills.active, #tab-cards.active { display: block; }

    /* トースト通知 */
    #fm-toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: rgba(30,30,40,.92); color: #fff; padding: .5rem 1.1rem;
      border-radius: 2rem; font-size: .85rem; pointer-events: none;
      opacity: 0; transition: opacity .25s; z-index: 9999; white-space: nowrap;
    }
    #fm-toast.show { opacity: 1; }

    /* ランクバッジ */
    .rank-badge {
      position: absolute; top: 4px; left: 4px;
      width: 22px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: .74rem; font-weight: 900; color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,.6);
      pointer-events: none; z-index: 3; letter-spacing: 0;
    }
    .rank-badge-d { background: #60637a; }
    .rank-badge-c { background: #2a9e5c; }
    .rank-badge-b { background: #1870d4; }
    .rank-badge-a { background: linear-gradient(135deg, #8820e8, #cc30b8); }
    .rank-badge-s { background: linear-gradient(135deg, #ff4000, #ffcc00); animation: rankSBadge 1.2s ease-in-out infinite alternate; }
    @keyframes rankSBadge { to { box-shadow: 0 0 7px rgba(255,160,0,.9); transform: scale(1.12); } }

    /* ランク枠色 */
    .rank-d { border-color: #6a6e88 !important; }
    .rank-c { border-color: #2a9e5c !important; box-shadow: 0 0 7px rgba(42,158,92,.25); }
    .rank-b { border-color: #1870d4 !important; box-shadow: 0 0 9px rgba(24,112,212,.3); }
    .rank-a { border-color: #9020e0 !important; box-shadow: 0 0 12px rgba(144,32,224,.35); }
    .rank-s { border-color: #ffd700 !important; border-width: 2px !important; animation: rankSGlow 2s linear infinite; }
    @keyframes rankSGlow {
      0%   { box-shadow: 0 0 8px #ff0060, 0 0 20px rgba(255,0,96,.2); }
      17%  { box-shadow: 0 0 8px #ff8800, 0 0 20px rgba(255,136,0,.2); }
      33%  { box-shadow: 0 0 8px #ffe000, 0 0 20px rgba(255,224,0,.2); }
      50%  { box-shadow: 0 0 8px #00e060, 0 0 20px rgba(0,224,96,.2); }
      67%  { box-shadow: 0 0 8px #0088ff, 0 0 20px rgba(0,136,255,.2); }
      83%  { box-shadow: 0 0 8px #cc00ff, 0 0 20px rgba(204,0,255,.2); }
      100% { box-shadow: 0 0 8px #ff0060, 0 0 20px rgba(255,0,96,.2); }
    }
  </style>
</head>
<body>

<div id="fm-toast"></div>
<div class="fm-wrap">
  <a href="index.html" class="fm-back">← ゲームに戻る</a>
  <div class="fm-title">⚔️ 編成</div>

  <div class="fm-tabs">
    <button class="fm-tab" onclick="switchTab('drills',this)">⛏️ ドリル</button>
    <button class="fm-tab active" onclick="switchTab('cards',this)">🃏 カード</button>
  </div>

  <div id="tab-drills">
    <div id="drills-content"><div style="opacity:.5;text-align:center;padding:40px 0;">読み込み中...</div></div>
  </div>

  <div id="tab-cards" class="active">
    <div class="fm-section">
      <div class="fm-section-title">装備中 (10枚)</div>
      <div id="fm-hint"></div>
      <div class="card-grid" id="equipped-grid"></div>
    </div>
    <div class="fm-section">
      <div class="fm-section-title">未装備</div>
      <div class="pool-filter-bar">
        <select id="pool-sort-select" onchange="renderUnequipped()">
          <option value="rank">ランク順</option>
          <option value="attack">攻撃力順</option>
          <option value="ap">APコスト順</option>
        </select>
        <button type="button" class="pool-dir-btn" id="pool-dir-btn" onclick="togglePoolSortDir()">▼ 降順</button>
        <select id="pool-rank-filter" onchange="renderUnequipped()">
          <option value="">ランク: すべて</option>
          <option value="s">S</option>
          <option value="a">A</option>
          <option value="b">B</option>
          <option value="c">C</option>
          <option value="d">D</option>
        </select>
        <select id="pool-weapon-filter" onchange="renderUnequipped()">
          <option value="">武器種: すべて</option>
          <option value="剣">剣</option>
          <option value="短剣">短剣</option>
          <option value="斧">斧</option>
          <option value="ハンマー">ハンマー</option>
          <option value="ブーメラン">ブーメラン</option>
          <option value="槍">槍</option>
          <option value="杖">杖</option>
          <option value="鎌">鎌</option>
        </select>
      </div>
      <div class="unequipped-grid" id="unequipped-grid"></div>
    </div>
    <button class="btn-save" onclick="saveDeck()">💾 デッキを保存</button>
    <div class="save-msg" id="save-msg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/navigation.js"></script>
<script>
function rankFromId(cardId) {
  return cardId?.match(/_([dcbas])$/)?.[1] ?? null;
}
function rankBadgeHtml(rank) {
  if (!rank) return '';
  return `<div class="rank-badge rank-badge-${rank}">${rank.toUpperCase()}</div>`;
}

// ============================================================
// カード詳細ポップアップ（長押し）
// ============================================================
const TARGET_LABELS = {
  SINGLE:'単体（敵）', ALL:'全体（敵）', RANDOM_ENEMY:'ランダム（敵）',
  RANDOM_ANY:'ランダム（敵味方）', ALLY_SINGLE:'味方単体', ALLY_ALL:'味方全体', SELF:'自分',
};
const _RANK_BG = {
  d:'#60637a', c:'#2a9e5c', b:'#1870d4',
  a:'linear-gradient(135deg,#8820e8,#cc30b8)',
  s:'linear-gradient(135deg,#ff4000,#ffcc00)',
};

function showCardDetail(cardId, def) {
  hideCardDetail();
  const rank = (def?.rarity ?? '').toLowerCase() || rankFromId(cardId);
  const imgHtml = def.imageUrl
    ? `<img src="${def.imageUrl}" style="width:100%;height:100%;object-fit:contain;">`
    : `<div class="cd-icon">${def.icon || '⚔️'}</div>`;
  const row = (label, val) =>
    `<div class="cd-stat-label">${label}</div><div class="cd-stat-val">${val}</div>`;
  const bd = document.createElement('div');
  bd.id = 'card-detail-backdrop';
  bd.addEventListener('click', hideCardDetail);
  const pop = document.createElement('div');
  pop.id = 'card-detail-popup';
  pop.innerHTML = `
    <div class="cd-img">${imgHtml}</div>
    <div class="cd-header">
      ${rank ? `<div class="cd-rank-badge" style="background:${_RANK_BG[rank]};">${rank.toUpperCase()}</div>` : ''}
      <div class="cd-name">${def.name || cardId}</div>
    </div>
    ${def.desc ? `<div class="cd-desc">${def.desc}</div>` : ''}
    <div class="cd-stats">
      ${row('APコスト', def.ap_cost ?? 0)}
      ${def.base_attack != null ? row('カード攻撃力', `+${def.base_attack}`) : ''}
      ${def.mult_min != null || def.mult_max != null
        ? row('倍率', `${def.mult_min ?? '?'} ～ ${def.mult_max ?? '?'}`) : ''}
      ${def.crit_rate_bonus != null ? row('クリ率補正', `+${def.crit_rate_bonus}%`) : ''}
      ${def.crit_dmg_bonus  != null ? row('クリダメ補正', `+${def.crit_dmg_bonus}`) : ''}
      ${row('攻撃回数', def.hit_count ?? 1)}
      ${row('対象', TARGET_LABELS[def.target ?? 'SINGLE'] ?? (def.target || '単体（敵）'))}
      ${def.heal != null ? row('回復力', def.heal) : ''}
    </div>
    <button class="cd-close" onclick="hideCardDetail()">閉じる</button>`;
  document.body.appendChild(bd);
  document.body.appendChild(pop);
}

function hideCardDetail() {
  document.getElementById('card-detail-backdrop')?.remove();
  document.getElementById('card-detail-popup')?.remove();
}

let _fmLpTimer = null;
let _fmMouseDown = false;

function attachLongPress(el, cardId, def) {
  let moved = false;
  let lpFired = false;
  // タッチ
  el.addEventListener('touchstart', () => {
    moved = false; lpFired = false;
    _fmLpTimer = setTimeout(() => {
      if (!moved) { lpFired = true; showCardDetail(cardId, def); }
    }, 500);
  }, { passive: true });
  el.addEventListener('touchmove', () => { moved = true; clearTimeout(_fmLpTimer); }, { passive: true });
  el.addEventListener('touchend', e => {
    clearTimeout(_fmLpTimer);
    if (lpFired) { e.preventDefault(); lpFired = false; }
  });
  // デスクトップ
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    _fmMouseDown = true;
    _fmLpTimer = setTimeout(() => {
      if (_fmMouseDown) showCardDetail(cardId, def);
      _fmMouseDown = false; _fmLpTimer = null;
    }, 500);
  });
  el.addEventListener('mousemove', () => {
    if (_fmMouseDown) { clearTimeout(_fmLpTimer); _fmMouseDown = false; }
  });
  el.addEventListener('mouseup', () => { clearTimeout(_fmLpTimer); _fmMouseDown = false; });
  el.addEventListener('dragstart', () => { clearTimeout(_fmLpTimer); _fmMouseDown = false; });
}

// ============================================================
// カード・ドリル定義（game.jsと同期が必要な場合はここで管理）
// ============================================================
let CARDS_DEF = {};  // admin設定から読み込む
let DRILLS_DEF = {}; // admin設定から読み込む

const DEFAULT_CARDS = {
  fist_d: { name:'拳で', desc:'基本攻撃', icon:'👊', ap_cost:10, base_attack:0, mult_min:0.9, mult_max:1.0 },
};

// 錬金窯で入手可能なカードのデフォルト定義
// admin設定で上書きされるが、未設定でも表示・ドラッグできるよう定義
const SHOP_CARD_DEFAULTS = {
  sword_dirt_d        : { name:'土の剣', icon:'⚔️' },
  sword_dirt_c        : { name:'土の剣', icon:'⚔️' },
  sword_dirt_b        : { name:'土の剣', icon:'⚔️' },
  sword_dirt_a        : { name:'土の剣', icon:'⚔️' },
  sword_dirt_s        : { name:'土の剣', icon:'⚔️' },
  sword_stone_d       : { name:'石の剣', icon:'⚔️' },
  sword_stone_c       : { name:'石の剣', icon:'⚔️' },
  sword_stone_b       : { name:'石の剣', icon:'⚔️' },
  sword_stone_a       : { name:'石の剣', icon:'⚔️' },
  sword_stone_s       : { name:'石の剣', icon:'⚔️' },
  sword_copper_d      : { name:'銅の剣', icon:'⚔️' },
  sword_copper_c      : { name:'銅の剣', icon:'⚔️' },
  sword_copper_b      : { name:'銅の剣', icon:'⚔️' },
  sword_copper_a      : { name:'銅の剣', icon:'⚔️' },
  sword_copper_s      : { name:'銅の剣', icon:'⚔️' },
  sword_silver_d      : { name:'銀の剣', icon:'⚔️' },
  sword_silver_c      : { name:'銀の剣', icon:'⚔️' },
  sword_silver_b      : { name:'銀の剣', icon:'⚔️' },

async function loadConfig() {
  const [settingsRes, dbCardsRes] = await Promise.all([
    supabaseClient.from('drill_page_settings').select('setting_value').eq('setting_key', 'game_config').maybeSingle(),
    supabaseClient.from('drill_cards').select('*').order('no'),
  ]);
  const cfg = settingsRes.data?.setting_value ? JSON.parse(settingsRes.data.setting_value) : {};

  // SHOP_CARD_DEFAULTS → DEFAULT_CARDS → DBカード定義 → admin設定 の順で上書き（後勝ち）
  CARDS_DEF = { ...SHOP_CARD_DEFAULTS, ...DEFAULT_CARDS };
  (dbCardsRes.data || []).forEach(r => {
    const id = r.id === 'fist' ? 'fist_d' : r.id;
    const rarity = (r.rarity && ['D','C','B','A','S'].includes(r.rarity)) ? r.rarity : null;
    CARDS_DEF[id] = {
      ...(CARDS_DEF[id] ?? {}),
      no: r.no,
      material: r.material,
      rarity,
      weapon_type: r.weapon_type,
      name: r.name || CARDS_DEF[id]?.name,
      icon: r.icon || CARDS_DEF[id]?.icon,
      ap_cost: r.ap_cost ?? CARDS_DEF[id]?.ap_cost,
      base_attack: r.base_attack ?? CARDS_DEF[id]?.base_attack,
      mult_min: r.mult_min != null ? Number(r.mult_min) : (CARDS_DEF[id]?.mult_min ?? null),
      mult_max: r.mult_max != null ? Number(r.mult_max) : (CARDS_DEF[id]?.mult_max ?? null),
      crit_rate_bonus: r.crit_rate_bonus != null ? Number(r.crit_rate_bonus) : (CARDS_DEF[id]?.crit_rate_bonus ?? null),
      crit_dmg_bonus: r.crit_dmg_bonus != null ? Number(r.crit_dmg_bonus) : (CARDS_DEF[id]?.crit_dmg_bonus ?? null),
      hit_count: r.hit_count ?? CARDS_DEF[id]?.hit_count,
      target: r.target ?? CARDS_DEF[id]?.target,
      heal: r.heal_power ?? CARDS_DEF[id]?.heal,
      special_id: r.special_id ?? CARDS_DEF[id]?.special_id,
    };
  });
  if (cfg.cards) {
    for (const [id, v] of Object.entries(cfg.cards)) {
      CARDS_DEF[id] = { ...(CARDS_DEF[id] ?? {}), ...v };
    }
  }
  DRILLS_DEF = { ...DEFAULT_DRILLS };
  if (cfg.drills) {
    for (const [id, v] of Object.entries(cfg.drills)) {
      DRILLS_DEF[id] = { ...(DEFAULT_DRILLS[id] ?? {}), ...v };
    }
  }
}

async function loadData() {
  const [drillRes, deckRes, cardsRes] = await Promise.all([
    supabaseClient.from('drill_player_drills').select('*').eq('user_id', userId),
    supabaseClient.from('drill_player_deck').select('slots').eq('user_id', userId).maybeSingle(),
    supabaseClient.from('drill_player_cards').select('card_id,quantity').eq('user_id', userId),
  ]);

  playerDrills = drillRes.data || [];
  const eq = playerDrills.find(d => d.equipped) || playerDrills[0];
  equippedDrillRowId = eq?.id || null;

  if (deckRes.data) {
    deckSlots = (deckRes.data.slots ?? deckSlots)
      .map(s => (s === 'attack' || s === 'fist') ? 'fist_d' : s);
  }
  ownedCards = {};
  (cardsRes.data || []).forEach(r => { if (r.quantity > 0) ownedCards[r.card_id] = r.quantity; });
  initPool();

}

function initPool() {
  const deckCounts = {};
  deckSlots.forEach(id => { if (id && id !== 'fist_d') deckCounts[id] = (deckCounts[id] || 0) + 1; });
  unequippedPool = [];
  for (const [id, count] of Object.entries(ownedCards)) {
    if (id === 'fist_d') continue;
    const remaining = Math.max(0, count - (deckCounts[id] || 0));
    for (let i = 0; i < remaining; i++) unequippedPool.push(id);
  }
  unequippedPool.sort((a, b) => (CARDS_DEF[a]?.no ?? 9999) - (CARDS_DEF[b]?.no ?? 9999));
}

function renderDrills() {
  const el = document.getElementById('drills-content');
  if (playerDrills.length === 0) {
    el.innerHTML = '<div style="opacity:.5;text-align:center;padding:30px 0;">ドリルがありません</div>';
    return;
  }

  el.innerHTML = playerDrills.map(d => {
    const def = DRILLS_DEF[d.drill_id] || {};
    const isEq = d.id === equippedDrillRowId;
    const durMax = def.dur ?? null;
    const durVal = d.durability ?? durMax;
    const durPct = durMax ? Math.max(0, Math.round((durVal / durMax) * 100)) : null;
    const durColor = durPct === null ? '#aaa' : durPct > 50 ? '#4caf50' : durPct > 20 ? '#ff9800' : '#f44336';
    const durDisp = durVal === null ? '∞' : `${durVal} / ${durMax}`;
    const durBar = durMax ? `
      <div class="drill-dur-bar">
        <div class="drill-dur-fill" style="width:${durPct}%;background:${durColor};"></div>
      </div>` : '';

    return `<div class="drill-row">
      <div class="drill-row-info">
        <div class="drill-row-name">${def.name || d.drill_id}${isEq ? ' <span style="font-size:.72rem;color:#d4a853;">装備中</span>' : ''}</div>
        <div class="drill-row-sub">威力 ${def.power ?? '?'} ／ 耐久 ${durDisp}</div>
        ${durBar}
      </div>
      ${isEq
        ? `<button class="btn-fm equipped" disabled>装備中</button>`
        : `<button class="btn-fm" onclick="equipDrill('${d.id}')">装備</button>`}
    </div>`;
  }).join('');
}

async function equipDrill(rowId) {
  await supabaseClient.from('drill_player_drills').update({ equipped: false }).eq('user_id', userId);
  await supabaseClient.from('drill_player_drills').update({ equipped: true }).eq('id', rowId);
  playerDrills.forEach(d => { d.equipped = (d.id === rowId); });
  equippedDrillRowId = rowId;
  renderDrills();
}

// ============================================================
// カードタブ
// ============================================================
function renderCards() {
  renderEquipped();
  renderUnequipped();
  updateHintBar();
}

function cardVisual(c) {
  if (c.imageUrl) {
    return `<img class="card-img-fill" src="${c.imageUrl}" onerror="this.outerHTML='<div class=&quot;card-icon&quot;>${c.icon || '⚔️'}</div>'">`;
  }
  return `<div class="card-icon">${c.icon || '⚔️'}</div>`;
}

function cardHTML(cardId, slotNum) {
  const c = CARDS_DEF[cardId];
  if (!c) return `<div class="card-slot-num">${slotNum}</div><span style="opacity:.3;">?</span>`;
  const rank = (c.rarity ?? '').toLowerCase() || rankFromId(cardId);
  return `
    ${rankBadgeHtml(rank)}
    <div class="card-ap-badge">${c.ap_cost ?? 0}</div>
    <div class="card-img-area">${cardVisual(c)}</div>
    <div class="card-name-bar">${c.name}</div>`;
}

function clearTapSelected() {
  tapSelected = null;
  dragSource = null;
}

function updateHintBar() {
  const el = document.getElementById('fm-hint');
  if (!el) return;
  if (!tapSelected) {
    el.className = '';
    el.innerHTML = '💡 カードをタップして選択 → スロットをタップして配置';
    return;
  }
  el.className = 'selecting';
  if (tapSelected.type === 'unequipped') {
    const c = CARDS_DEF[tapSelected.cardId] ?? {};
    el.innerHTML = `<span class="hint-text">🟡 <b>${c.name || tapSelected.cardId}</b> を選択中 — 配置先スロットをタップ</span>
      <button class="hint-btn hint-btn-cancel" onclick="cancelTap()">✕ キャンセル</button>`;
  } else {
    const c = CARDS_DEF[deckSlots[tapSelected.slotIndex]] ?? {};
    el.innerHTML = `<span class="hint-text">🟡 <b>${c.name || ''}</b>（${tapSelected.slotIndex+1}番）— 入替先または↩ボタンで戻す</span>
      <button class="hint-btn hint-btn-return" onclick="returnToPool()">↩ プールへ</button>
      <button class="hint-btn hint-btn-cancel" onclick="cancelTap()">✕</button>`;
  }
}

function cancelTap() {
  clearTapSelected();
  renderCards();
  updateHintBar();
}

function returnToPool() {
  // ボタン押下・背景タップ用: tapSelected を参照（dragSource は dragstart で上書きされる恐れがあるため使わない）
  if (!tapSelected || tapSelected.type !== 'slot') return;
  const cardId = deckSlots[tapSelected.slotIndex];
  if (!cardId || cardId === 'fist_d') { clearTapSelected(); return; }
  unequippedPool.push(cardId);
  deckSlots[tapSelected.slotIndex] = 'fist_d';
  clearTapSelected();
  renderCards();
  updateHintBar();
}

function renderEquipped() {
  const grid = document.getElementById('equipped-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const cardId = deckSlots[i];
    const rank = (CARDS_DEF[cardId]?.rarity ?? '').toLowerCase() || rankFromId(cardId);
    const isSelected = tapSelected?.type === 'slot' && tapSelected.slotIndex === i;
    const isTarget = !isSelected && !!tapSelected;

    const slot = document.createElement('div');
    const classes = ['card-slot'];
    if (cardId) classes.push('has-card');
    if (rank) classes.push(`rank-${rank}`);
    if (isSelected) classes.push('tap-selected');
    slot.className = classes.join(' ');
    slot.dataset.slotIndex = i;

    let inner = cardId
      ? cardHTML(cardId, i + 1)
      : `<div class="card-slot-num">${i+1}</div><span style="font-size:.7rem;opacity:.25;">空</span>`;
    if (isSelected) inner += `<div class="sel-label">選択中</div>`;
    if (isTarget)   inner += `<div class="slot-target">▼</div>`;
    slot.innerHTML = inner;

    // ── ドラッグ（デスクトップ / Firefox対応）──
    slot.draggable = true;
    slot.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', `slot:${i}`);
      dragSource = { type: 'slot', slotIndex: i };
      slot.classList.add('dragging');
    });
    slot.addEventListener('dragend', () => slot.classList.remove('dragging'));
    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('drag-over'); });
    slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
    slot.addEventListener('drop', e => {
      e.preventDefault();
      slot.classList.remove('drag-over');
      handleDrop(i);
    });

    // ── タップ選択（モバイル）──
    slot.addEventListener('click', () => {
      if (tapSelected?.type === 'unequipped') {
        handleDrop(i);
      } else if (tapSelected?.type === 'slot' && tapSelected.slotIndex === i) {
        cancelTap();
      } else if (tapSelected?.type === 'slot') {
        handleDrop(i);
      } else if (cardId && cardId !== 'fist_d') {
        tapSelected = { type: 'slot', slotIndex: i };
        dragSource = { type: 'slot', slotIndex: i };
        renderCards();
        updateHintBar();
      }
    });

    if (cardId) attachLongPress(slot, cardId, CARDS_DEF[cardId] ?? {});
    grid.appendChild(slot);
  }
}

function renderUnequipped() {
  const grid = document.getElementById('unequipped-grid');
  grid.innerHTML = '';
  grid.ondragover = e => e.preventDefault();
  grid.ondrop = e => { e.preventDefault(); handleDropToPool(); };
  // タップ: デッキスロットが選択中なら背景タップでプールへ戻す
  grid.onclick = e => {
    if (tapSelected?.type === 'slot' && e.target === grid) {
      returnToPool();
    }
  };

  if (unequippedPool.length === 0) {
    const hasAnyCards = Object.keys(ownedCards).length > 0;
    grid.innerHTML = hasAnyCards
      ? '<div style="opacity:.4;font-size:.8rem;grid-column:1/-1;padding:10px 0;">未装備のカードなし（スロットからドラッグまたは↩ボタンで戻せます）</div>'
      : '<div style="opacity:.55;font-size:.82rem;grid-column:1/-1;padding:14px 4px;line-height:1.6;">カードを所持していません。<br>ゲーム内の <b>ショップ</b> でカードを購入するとここに表示されます。</div>';
    return;
  }

  const counts = {};
  for (const id of unequippedPool) counts[id] = (counts[id] || 0) + 1;

  const rankFilter   = document.getElementById('pool-rank-filter')?.value || '';
  const weaponFilter = document.getElementById('pool-weapon-filter')?.value || '';
  const sortBy       = document.getElementById('pool-sort-select')?.value || 'rank';

  let entries = Object.entries(counts).filter(([cardId]) => {
    const c = CARDS_DEF[cardId] ?? {};
    const rank = (c.rarity ?? '').toLowerCase() || rankFromId(cardId) || '';
    if (rankFilter && rank !== rankFilter) return false;
    if (weaponFilter && c.weapon_type !== weaponFilter) return false;
    return true;
  });

  const dir = poolSortDir === 'asc' ? 1 : -1;
  entries.sort(([idA], [idB]) => {
    const cA = CARDS_DEF[idA] ?? {}, cB = CARDS_DEF[idB] ?? {};
    let vA, vB;
    if (sortBy === 'attack')      { vA = cardAttackPower(cA);            vB = cardAttackPower(cB); }
    else if (sortBy === 'ap')     { vA = Number(cA.ap_cost ?? 0);        vB = Number(cB.ap_cost ?? 0); }
    else /* rank */               { vA = RANK_ORDER[(cA.rarity ?? '').toLowerCase() || rankFromId(idA)] ?? -1;
                                     vB = RANK_ORDER[(cB.rarity ?? '').toLowerCase() || rankFromId(idB)] ?? -1; }
    return (vA - vB) * dir;
  });

  if (entries.length === 0) {
    grid.innerHTML = '<div style="opacity:.4;font-size:.8rem;grid-column:1/-1;padding:10px 0;">条件に一致するカードがありません</div>';
    return;
  }

  for (const [cardId, count] of entries) {
    const c = CARDS_DEF[cardId] ?? { name: cardId, icon: '⚔️' };
    const uRank = (c.rarity ?? '').toLowerCase() || rankFromId(cardId);
    const uSelected = tapSelected?.type === 'unequipped' && tapSelected.cardId === cardId;
    const card = document.createElement('div');
    const uClasses = ['unequipped-card'];
    if (uRank) uClasses.push(`rank-${uRank}`);
    if (uSelected) uClasses.push('tap-selected');
    card.className = uClasses.join(' ');
    card.dataset.cardId = cardId;
    card.innerHTML = `
      ${rankBadgeHtml(uRank)}
      ${uSelected ? '<div class="sel-label">選択中</div>' : ''}
      <div class="card-ap-badge">${c.ap_cost ?? 0}</div>
      <div class="card-img-area">${cardVisual(c)}</div>
      ${count > 1 ? `<div class="card-qty-badge">×${count}</div>` : ''}
      <div class="card-name-bar">${c.name}</div>`;

    // ── ドラッグ（デスクトップ）──
    card.draggable = true;
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', `unequipped:${cardId}`);
      dragSource = { type: 'unequipped', cardId };
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));

    // ── タップ選択（モバイル）──
    card.addEventListener('click', () => {
      if (tapSelected?.type === 'unequipped' && tapSelected.cardId === cardId) {
        cancelTap();
        return;
      }
      clearTapSelected();
      tapSelected = { type: 'unequipped', cardId };
      dragSource = { type: 'unequipped', cardId };
      renderCards();
      updateHintBar();
    });

    attachLongPress(card, cardId, c);
    grid.appendChild(card);
  }
}

let _toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('fm-toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function handleDrop(targetSlotIndex) {
  if (!dragSource) return;

  if (dragSource.type === 'unequipped') {
    const cardId = dragSource.cardId;
    const poolIdx = unequippedPool.indexOf(cardId);
    if (poolIdx === -1) { cancelTap(); return; }

    // 同カード最大2枚制限
    const deckCount = deckSlots.filter(s => s === cardId).length;
    if (deckCount >= 2) { showToast('⚠️ 同じカードは最大2枚までです'); return; } // 選択は維持

    const oldCard = deckSlots[targetSlotIndex];
    unequippedPool.splice(poolIdx, 1);
    deckSlots[targetSlotIndex] = cardId;
    // fist_d はデフォルトカードなのでプールには戻さない。購入カードのみプールへ
    if (oldCard && oldCard !== 'fist_d') unequippedPool.push(oldCard);

  } else if (dragSource.type === 'slot') {
    const from = dragSource.slotIndex;
    const tmp = deckSlots[from];
    deckSlots[from] = deckSlots[targetSlotIndex];
    deckSlots[targetSlotIndex] = tmp;
  }

  const flashIdx = targetSlotIndex;
  clearTapSelected();
  renderCards();
  updateHintBar();
  // 配置完了フラッシュ
  requestAnimationFrame(() => {
    const slots = document.querySelectorAll('#equipped-grid .card-slot');
    if (slots[flashIdx]) slots[flashIdx].classList.add('just-placed');
  });
}

function handleDropToPool() {
  if (!dragSource || dragSource.type !== 'slot') return;
  const cardId = deckSlots[dragSource.slotIndex];
  if (!cardId || cardId === 'fist_d') { clearTapSelected(); return; }
  unequippedPool.push(cardId);
  deckSlots[dragSource.slotIndex] = 'fist_d';
  clearTapSelected();
  renderCards();
  updateHintBar();
}

// ============================================================
// 保存
// ============================================================
async function saveDeck() {
  const btn = document.querySelector('.btn-save');
  btn.disabled = true;
  btn.textContent = '保存中...';
  const { error } = await supabaseClient.from('drill_player_deck')
    .upsert({ user_id: userId, slots: deckSlots });
  if (error) {
    btn.textContent = '💾 デッキを保存';
    btn.disabled = false;
    showToast('⚠️ 保存に失敗しました');
  } else {
    btn.textContent = '✅ 保存しました！';
    btn.style.background = 'rgba(50,200,100,1)';
    setTimeout(() => {
      btn.textContent = '💾 デッキを保存';
      btn.style.background = '';
      btn.disabled = false;
    }, 2000);
  }
}
