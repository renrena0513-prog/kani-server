<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドリル管理 | かにサーバー</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            background: linear-gradient(180deg, #0d2f5c 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .admin-card {
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
        }
        .admin-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,.15);
        }
        .drill-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .85rem;
        }
        .drill-table th {
            background: rgba(255,255,255,.08);
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            color: rgba(255,255,255,.7);
            font-size: .78rem;
            letter-spacing: .04em;
            white-space: nowrap;
        }
        .drill-table td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,.06);
            vertical-align: middle;
        }
        .drill-table tr:hover td { background: rgba(255,255,255,.04); }
        .gold-val  { color: #f0c060; font-weight: 700; }
        .inv-val   { color: #6bde9b; }
        .muted     { color: rgba(255,255,255,.4); }
        .badge-permit {
            display: inline-block;
            background: rgba(212,168,83,.3);
            border: 1px solid rgba(212,168,83,.5);
            border-radius: 6px;
            padding: 2px 8px;
            font-size: .72rem;
            margin: 1px;
        }
        .btn-refresh {
            padding: 7px 18px;
            background: rgba(212,168,83,.5);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: .85rem;
            transition: background .15s;
        }
        .btn-refresh:hover { background: rgba(212,168,83,.8); }
        .info-box {
            background: rgba(100,160,255,.1);
            border: 1px solid rgba(100,160,255,.25);
            border-radius: 10px;
            padding: 10px 16px;
            font-size: .8rem;
            color: rgba(255,255,255,.7);
            margin-bottom: 16px;
        }
        .back-link {
            color: rgba(255,255,255,.6);
            text-decoration: none;
            font-size: .85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            transition: color .15s;
        }
        .back-link:hover { color: #fff; }
        #access-denied {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,.5);
        }
    </style>
</head>
<body>

<div style="max-width:1100px;margin:0 auto;padding:80px 16px 40px;">

    <div id="access-denied">
        <div style="font-size:3rem;margin-bottom:16px;">🚫</div>
        <div style="font-size:1.1rem;">管理者のみアクセスできます</div>
        <a href="index.html" style="color:#d4a853;margin-top:16px;display:inline-block;">← ゲームに戻る</a>
    </div>

    <div id="admin-content" style="display:none;">
        <a href="index.html" class="back-link">← ほりほりドリルに戻る</a>

        <div class="admin-card">
            <div class="admin-title" style="display:flex;justify-content:space-between;align-items:center;">
                <span>⛏️ ほりほりドリル プレイヤー統計</span>
                <button class="btn-refresh" onclick="fetchDrillStats()">🔄 更新</button>
            </div>

            <div class="info-box">
                <strong>倉庫推定価値</strong> = 売却単価基準（土1・石3・銅15・鉄50・銀200・金500 G）。リュック内素材は含みません。
            </div>

            <div style="overflow-x:auto;">
                <table class="drill-table">
                    <thead>
                        <tr>
                            <th>アカウント名</th>
                            <th>所持金</th>
                            <th>現在位置</th>
                            <th>リュック</th>
                            <th>倉庫推定価値</th>
                            <th>装備ドリル</th>
                            <th>許可証</th>
                        </tr>
                    </thead>
                    <tbody id="drill-stats-body">
                        <tr><td colspan="7" class="muted" style="text-align:center;padding:32px;">読み込み中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/navigation.js"></script>
<script src="../js/admin-drill.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    initAccordionNav('../');

    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) { window.location.href = '../login/index.html'; return; }

    const discordId = user.user_metadata?.provider_id;
    const isAdmin = typeof ADMIN_DISCORD_IDS !== 'undefined' && ADMIN_DISCORD_IDS.includes(discordId);

    if (!isAdmin) {
        document.getElementById('access-denied').style.display = 'block';
        return;
    }

    document.getElementById('admin-content').style.display = 'block';
    fetchDrillStats();
});
</script>
</body>
</html>
