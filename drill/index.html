<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ほりほりドリル | かにサーバーイベント</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 地上ホーム画面（JS が内容を生成） -->
<div id="surface-home" style="display:none;"></div>

<div id="game-wrap" style="display:none;">
    <!-- PC: 左パネル -->
    <aside class="side-panel" id="panel-left">
        <div class="panel-box">
            <div class="panel-title">⛏️ ドリル</div>
            <div id="drill-info"></div>
        </div>
        <div class="panel-box">
            <div class="panel-title">📊 ステータス</div>
            <div id="status-info"></div>
        </div>
        <div class="panel-box pc-action-btns">
            <button class="act-btn" id="btn-drills-pc">⛏️ ドリル</button>
            <button class="act-btn" id="btn-bag-pc">🎒 リュック</button>
            <button class="act-btn" id="btn-return-pc">↩️ 帰還</button>
        </div>
    </aside>

    <!-- 中央：マップ＋操作 -->
    <main id="game-main">
        <div id="top-bar">
            <span id="coord-disp">📍 128, 0</span>
            <span id="layer-disp">第1層 (0m)</span>
            <span id="gold-disp">💰 0G</span>
            <a id="drill-admin-link" href="admin.html" style="display:none;font-size:.72rem;color:rgba(255,255,255,.5);text-decoration:none;padding:2px 6px;border:1px solid rgba(255,255,255,.2);border-radius:5px;" title="ドリル管理">⚙️</a>
        </div>
        <!-- モバイル用ドリル情報バー（PCはサイドパネルで表示） -->
        <div id="mob-drill-bar"></div>

        <div id="map-viewport">
            <div id="map-grid"></div>
        </div>

        <!-- アクションボタン（モバイル・地下専用） -->
        <div id="action-btns">
            <button class="act-btn" id="btn-drills">⛏️ ドリル</button>
            <button class="act-btn" id="btn-bag">🎒 リュック</button>
            <button class="act-btn" id="btn-return">↩️ 帰還</button>
        </div>
    </main>

    <!-- PC: 右パネル -->
    <aside class="side-panel" id="panel-right">
        <div class="panel-box">
            <div class="panel-title">🎒 リュック</div>
            <div id="backpack-disp"></div>
        </div>
        <div class="panel-box" style="flex:1;overflow:hidden;">
            <div class="panel-title">📜 ログ</div>
            <div id="log-disp"></div>
        </div>
    </aside>
</div>

<!-- モーダル共通ラッパー -->
<div id="modal-overlay" style="display:none;">
    <div id="modal-inner"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/navigation.js"></script>
<script src="game.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        initAccordionNav('../');
        initDrillGame();
    });
</script>
</body>
</html>
