<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バッジ詳細 - かに鯖</title>
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        :root {
            --deep-purple: #5a4a7a;
            --gold: #d4a574;
            --gold-light: #e8c89e;
            --soft-cream: #fef9f3;
            --font-title: 'Kosugi Maru', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .badge-detail-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .badge-header {
            background: linear-gradient(135deg, var(--deep-purple) 0%, #7c5a9a 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }

        /* ミュータントバッジ用スタイルは styles.css の .mutant-badge-container.large を使用 */
        .badge-image-large {
            width: 150px;
            height: 150px;
            object-fit: contain;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
        }

        .badge-name {
            font-family: var(--font-title);
            font-size: 1.8rem;
            margin-top: 20px;
            margin-bottom: 10px;
            text-transform: none !important;
        }

        .badge {
            text-transform: none !important;
        }

        .badge-description {
            font-size: 1rem;
            color: #ffffff;
            font-weight: 500;
        }

        .badge-requirements {
            font-size: 1rem;
            margin: 0;
            font-weight: 500;
        }

        .badge-extra-info {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 15px 25px;
            flex: 1;
            min-width: 250px;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: #5a4a4a;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            font-family: var(--font-title);
        }

        .stat-label {
            font-size: 1rem;
            font-weight: bold;
            color: #4a3a3a;
        }

        .meta-chip {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(0, 0, 0, 0.25);
            color: #fff;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .meta-label {
            background: rgba(255, 193, 7, 0.2);
            border-color: rgba(255, 193, 7, 0.5);
        }

        .meta-tag {
            background: rgba(255, 255, 255, 0.12);
        }

        .owner-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
        }

        .owner-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .owner-item:hover {
            background: #f8f9fa;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.15);
            transition: all 0.3s;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        /* ナビゲーションドロップダウン */
        .nav-dropdown {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .record-button {
            background: linear-gradient(135deg, var(--gold) 0%, #b8892d 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 6px 20px rgba(212, 168, 83, 0.5);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
        }

        .record-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 168, 83, 0.6);
            color: white;
        }

        .nav-dropdown-menu {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            min-width: 200px;
            overflow: hidden;
        }

        .nav-dropdown-menu .dropdown-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #333;
            transition: background 0.2s;
        }

        .nav-dropdown-menu .dropdown-item:hover {
            background: #f5f5f5;
        }

        .nav-dropdown-menu .dropdown-divider {
            margin: 0;
        }

        .notification-badge {
            background: #dc3545;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: auto;
        }
    </style>
</head>

<body>
    <!-- 右上のナビゲーションドロップダウン -->
    <div class="nav-dropdown dropdown">
        <button class="record-button dropdown-toggle" type="button" id="navDropdown" data-bs-toggle="dropdown"
            aria-expanded="false">
            📝 メニュー
        </button>
        <ul class="dropdown-menu nav-dropdown-menu dropdown-menu-end" aria-labelledby="navDropdown">
            <!-- JSでアコーディオンメニューに置き換えられます -->
        </ul>
    </div>

    <div class="container py-5">
        <!-- 戻るボタン -->
        <div class="mb-4">
            <a href="#" onclick="goBack(); return false;" class="back-button">
                ← 戻る
            </a>
        </div>

        <!-- メインカード -->
        <div class="badge-detail-card">
            <!-- バッジヘッダー -->
            <div class="badge-header">
                <div class="d-flex flex-column align-items-center">
                    <!-- 1行目: レアリティ / タイプ / ラベル -->
                    <div id="badge-top-meta" class="d-flex flex-wrap justify-content-center gap-2 mb-2">
                        <div id="badge-rarity-badge" class="badge rounded-pill"
                            style="font-size: 0.9rem; padding: 6px 15px; display: none;">Normal</div>
                        <div id="sales-type-badge" class="badge rounded-pill"
                            style="display: none; font-size: 0.8rem;"></div>
                        <div id="badge-label-wrap" class="badge-meta-item" style="display: none;">
                            <a class="meta-chip meta-label" id="badge-label" href="#" onclick="event.stopPropagation();"></a>
                        </div>
                    </div>

                    <!-- 2行目: 名称 -->
                    <h1 id="badge-name" class="badge-name">読み込み中...</h1>

                    <!-- 3行目: 画像 -->
                    <div id="badge-image-container" class="mutant-badge-container large">
                        <img id="badge-image" src="" alt="バッジ" class="badge-image-large">
                        <div id="mutant-shine" class="mutant-badge-shine" style="display: none;"></div>
                    </div>

                    <!-- 4行目: バッジナンバー -->
                    <div id="badge-number" class="text-white-50 small mb-2"
                        style="font-family: inherit; font-weight: bold; font-size: 0.9rem;"></div>

                    <!-- 5行目: タグ -->
                    <div id="badge-tags-wrap" class="badge-meta-item d-flex flex-wrap gap-2 mb-3" style="display: none;">
                        <!-- tags injected -->
                    </div>

                    <!-- 6行目: 説明 -->
                    <p id="badge-description" class="badge-description mb-4"></p>

                    <!-- 獲得条件と権利者 (横並び) -->
                    <div class="d-flex flex-wrap justify-content-center gap-4 w-100">
                        <div id="badge-requirements-section" class="badge-extra-info" style="display: none;">
                            <div class="small fw-bold mb-2" style="color: rgba(255,255,255,0.8);">🎯 獲得条件</div>
                            <p id="badge-requirements" class="badge-requirements m-0"></p>
                        </div>

                        <div id="badge-owner-section" class="badge-extra-info" style="display: none;">
                            <div class="small fw-bold mb-2" style="color: rgba(255,255,255,0.8);">🎨 権利者（出品者）</div>
                            <a id="badge-owner-link" href="#"
                                class="text-decoration-none d-inline-flex align-items-center bg-white bg-opacity-10 p-2 rounded-pill text-white transition-all"
                                style="padding-right: 20px !important;">
                                <img id="badge-owner-avatar" src="" class="rounded-circle me-2" width="32" height="32"
                                    style="border: 1px solid rgba(255,255,255,0.3);">
                                <span id="badge-owner-name" class="fw-bold"></span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- コンテンツ -->
            <div class="p-4">
                <!-- ミュータント切り替えボタン -->
                <div id="mutant-toggle-area" class="text-center mb-4" style="display: none;">
                    <div class="btn-group" role="group">
                        <button type="button" class="btn btn-outline-primary active" id="normal-btn"
                            onclick="toggleMutantView(false)">通常</button>
                        <button type="button" class="btn btn-outline-warning" id="mutant-btn"
                            onclick="toggleMutantView(true)">✨ ミュータント</button>
                    </div>
                </div>

                <!-- 統計 -->
                <div class="row g-3 mb-4">
                    <div class="col-6 col-md-3">
                        <div class="stat-card">
                            <div id="owner-count" class="stat-number">-</div>
                            <div class="stat-label">所持者数</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card">
                            <div id="circulation-count" class="stat-number">-</div>
                            <div class="stat-label">流通枚数</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card">
                            <div id="market-value" class="stat-number">-</div>
                            <div class="stat-label">市場価値</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card">
                            <div id="ownership-rate" class="stat-number">-</div>
                            <div class="stat-label">所持率</div>
                        </div>
                    </div>
                </div>

                <!-- 所持者一覧 -->
                <h3 class="mb-3" style="font-family: var(--font-title); color: var(--deep-purple);">
                    🏆 このバッジの所持者
                </h3>
                <div id="owner-list" class="mb-3">
                    <p class="text-center text-muted py-4">読み込み中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Supabase設定 -->
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/badge-utils.js"></script>
    <!-- 【一時的】アンケートモーダル（撤去時は下1行を削除） -->
    <script src="../js/survey-modal.js"></script>
    <script src="../js/navigation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            initAccordionNav('../');
        });
    </script>

    <script>
        function goBack() {
            if (document.referrer && document.referrer.includes(window.location.hostname)) {
                history.back();
            } else {
                window.location.href = '../mypage/index.html';
            }
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getBadgeTags(badge) {
            if (!badge) return [];
            const raw = badge.tags;
            if (Array.isArray(raw)) {
                return raw.map(t => (t || '').trim()).filter(Boolean);
            }
            if (typeof raw === 'string') {
                const trimmed = raw.trim();
                if (!trimmed) return [];
                try {
                    const parsed = JSON.parse(trimmed);
                    if (Array.isArray(parsed)) {
                        return parsed.map(t => (t || '').trim()).filter(Boolean);
                    }
                } catch (_) {
                    // ignore JSON parse errors
                }
                return trimmed
                    .split(/[,\s]+/g)
                    .map(t => t.trim())
                    .filter(Boolean);
            }
            return [];
        }

        async function initPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const badgeId = urlParams.get('id');

            if (!badgeId) {
                document.getElementById('badge-name').textContent = 'バッジが指定されていません';
                return;
            }

            try {
                // バッジ情報取得
                const { data: badge, error: badgeError } = await supabaseClient
                    .from('badges')
                    .select('*')
                    .eq('id', badgeId)
                    .maybeSingle();

                if (badgeError) throw badgeError;
                if (!badge) {
                    document.getElementById('badge-name').textContent = 'バッジが見つかりません';
                    return;
                }

                document.getElementById('badge-image').src = badge.image_url;
                document.getElementById('badge-name').textContent = badge.name;
                document.getElementById('badge-description').textContent = badge.description || '説明なし';

                // ラベル・タグ表示
                const labelWrap = document.getElementById('badge-label-wrap');
                const labelEl = document.getElementById('badge-label');
                const tagsWrap = document.getElementById('badge-tags-wrap');
                const tags = getBadgeTags(badge);
                const label = (badge.label || '').trim();

                if (label) {
                    if (labelEl) {
                        labelEl.textContent = label;
                        labelEl.href = `./list.html?label=${encodeURIComponent(label)}`;
                    }
                    if (labelWrap) labelWrap.style.display = 'block';
                } else if (labelWrap) {
                    labelWrap.style.display = 'none';
                }

                if (tagsWrap) {
                    if (tags.length) {
                        tagsWrap.innerHTML = tags.map(t => `<a class="meta-chip meta-tag" href="./list.html?tag=${encodeURIComponent(t)}" onclick="event.stopPropagation();">#${escapeHtml(t)}</a>`).join('');
                        tagsWrap.style.display = 'flex';
                    } else {
                        tagsWrap.innerHTML = '';
                        tagsWrap.style.display = 'none';
                    }
                }

                // バッジナンバー
                if (badge.sort_order !== null) {
                    document.getElementById('badge-number').textContent = `バッジナンバー: #${badge.sort_order}`;
                }

                // レアリティ閾値の取得
                const { data: thresholds } = await supabaseClient.from('rarity_thresholds').select('*').order('threshold_value', { ascending: true });

                // 流通数の取得
                const { count: circulationCount } = await supabaseClient
                    .from('user_badges_new')
                    .select('*', { count: 'exact', head: true })
                    .eq('badge_id', badgeId);

                // 新レアリティシステムで計算
                const badgeResult = BadgeUtils.calculateBadgeValues(badge, circulationCount || 0, thresholds);
                const rarity = badgeResult.rarityName;
                const assetValue = badgeResult.marketValue;

                const rBadge = document.getElementById('badge-rarity-badge');
                rBadge.textContent = rarity;
                rBadge.style.display = 'inline-block';

                // 新レアリティの背景色設定（★レベルに応じたグラデーション）
                const starLevel = badgeResult.starLevel;
                let bgColor = '#888';
                if (starLevel >= 46) bgColor = '#e74c3c';      // 伝説~
                else if (starLevel >= 41) bgColor = '#9b59b6'; // 英雄
                else if (starLevel >= 36) bgColor = '#3498db'; // 神秘
                else if (starLevel >= 31) bgColor = '#2ecc71'; // 秘宝
                else if (starLevel >= 26) bgColor = '#f1c40f'; // 国宝
                else if (starLevel >= 21) bgColor = '#e67e22'; // 至高
                else if (starLevel >= 16) bgColor = '#1abc9c'; // 絶品
                else if (starLevel >= 11) bgColor = '#34495e'; // 逸品
                else if (starLevel >= 6) bgColor = '#7f8c8d';  // 名品
                rBadge.style.backgroundColor = bgColor;

                // 獲得条件の表示
                if (badge.requirements) {
                    document.getElementById('badge-requirements').textContent = badge.requirements;
                    document.getElementById('badge-requirements-section').style.display = 'flex';
                }

                // 販売タイプバッジの表示
                const salesTypeBadge = document.getElementById('sales-type-badge');
                if (badge.sales_type) {
                    salesTypeBadge.textContent = badge.sales_type;
                    salesTypeBadge.style.display = 'inline-block';
                    if (badge.sales_type === '変動型') {
                        salesTypeBadge.style.backgroundColor = '#17a2b8';
                    } else if (badge.sales_type === '限定' || badge.sales_type === '限定型') {
                        salesTypeBadge.style.backgroundColor = '#dc3545';
                    } else {
                        salesTypeBadge.style.backgroundColor = '#6c757d';
                    }
                }

                // 流通枚数の表示
                document.getElementById('circulation-count').textContent = (circulationCount || 0).toLocaleString();

                // 市場価値の表示
                const marketValueEl = document.getElementById('market-value');
                marketValueEl.textContent = (assetValue || 0).toLocaleString() + ' M';
                if (badge.sales_type === '変動型') {
                    marketValueEl.title = '変動型のため、所持ユーザー数により価値が変動します';
                }

                // 権利者情報の表示
                if (badge.discord_user_id) {
                    const { data: ownerProfile } = await supabaseClient
                        .from('profiles')
                        .select('account_name, avatar_url, is_hidden')
                        .eq('discord_user_id', badge.discord_user_id)
                        .maybeSingle();

                    if (ownerProfile && !ownerProfile.is_hidden) {
                        document.getElementById('badge-owner-name').textContent = ownerProfile.account_name || '名称未設定';
                        document.getElementById('badge-owner-avatar').src = ownerProfile.avatar_url || 'https://ui-avatars.com/api/?name=?&background=1a4d8c&color=fff&size=32';
                        document.getElementById('badge-owner-link').href = `../mypage/index.html?user=${badge.discord_user_id}`;
                        document.getElementById('badge-owner-section').style.display = 'flex';
                    }
                }

                document.title = `${badge.name} - バッジ詳細`;

                // 所持者取得（通常+ミュータント）
                const { data: owners, error: ownerError } = await supabaseClient
                    .from('user_badges_new')
                    .select('user_id, is_mutant, profiles!user_id(discord_user_id, account_name, avatar_url, is_hidden, badges!equipped_badge_id(image_url, name), badges_right:badges!equipped_badge_id_right(image_url, name))')
                    .eq('badge_id', badgeId);

                if (ownerError) throw ownerError;

                // 全所持者とミュータントのみを保存
                const allOwners = (owners || []).filter(o => !o.profiles?.is_hidden);
                const mutantOwners = allOwners.filter(o => o.is_mutant);

                // オーナーたちの装備中バッジのミュータント情報を取得
                const ownerIds = allOwners.map(o => o.user_id);
                const equippedBadgeIds = [];

                allOwners.forEach(o => {
                    if (o.profiles?.badges) equippedBadgeIds.push(o.profiles.equipped_badge_id);
                    if (o.profiles?.badges_right) equippedBadgeIds.push(o.profiles.equipped_badge_id_right);
                });

                window.equippedMutantMap = {};
                if (ownerIds.length > 0 && equippedBadgeIds.length > 0) {
                    // ユニーク化
                    const uniqueOwnerIds = [...new Set(ownerIds)];
                    const uniqueBadgeIds = [...new Set(equippedBadgeIds)];

                    const { data: equippedMutants } = await supabaseClient
                        .from('user_badges_new')
                        .select('user_id, badge_id')
                        .in('user_id', uniqueOwnerIds)
                        .in('badge_id', uniqueBadgeIds)
                        .eq('is_mutant', true);

                    (equippedMutants || []).forEach(em => {
                        window.equippedMutantMap[`${em.user_id}_${em.badge_id}`] = true;
                    });
                }

                // ミュータントがいる場合は切り替えボタンを表示
                if (mutantOwners.length > 0) {
                    document.getElementById('mutant-toggle-area').style.display = 'block';
                }

                // グローバルに保存（通常表示は全員、ミュータント表示はミュータントのみ）
                window.badgeData = { badgeId, allOwners, mutantOwners, totalUsers: 0, assetValue };

                // 同じユーザーをグループ化
                function groupOwners(ownerList) {
                    let total = 0;
                    const grouped = ownerList.reduce((acc, o) => {
                        const uid = o.user_id;
                        if (!acc[uid]) {
                            acc[uid] = { ...o, count: 0 };
                        }
                        acc[uid].count++;
                        total++;
                        return acc;
                    }, {});
                    return { grouped: Object.values(grouped).sort((a, b) => b.count - a.count), total };
                }

                const { grouped: sortedOwners, total: totalInCirculation } = groupOwners(allOwners);

                // 全ユーザー数取得（所持率計算用）
                const { count: totalUsers, error: countError } = await supabaseClient
                    .from('profiles')
                    .select('*', { count: 'exact', head: true })
                    .neq('is_hidden', true);

                if (countError) throw countError;
                window.badgeData.totalUsers = totalUsers;

                const displayOwnerCount = sortedOwners.length;
                const ownershipRate = totalUsers > 0 ? ((displayOwnerCount / totalUsers) * 100).toFixed(1) : 0;

                document.getElementById('owner-count').textContent = displayOwnerCount.toLocaleString();
                document.getElementById('circulation-count').textContent = totalInCirculation.toLocaleString();
                document.getElementById('ownership-rate').textContent = ownershipRate + '%';

                // 所持者リスト表示
                renderOwnerList(sortedOwners, totalInCirculation);

                // URLパラメータ ?view=mutant がある場合は初期表示をミュータントにする
                const urlParams = new URLSearchParams(window.location.search);
                const viewMode = urlParams.get('view');
                if (viewMode === 'mutant') {
                    toggleMutantView(true);
                }

            } catch (err) {
                console.error('バッジ詳細取得エラー:', err);
                document.getElementById('badge-name').textContent = 'エラーが発生しました';
            }
        }

        function renderOwnerList(sortedOwners, totalInCirculation) {
            const listEl = document.getElementById('owner-list');
            if (sortedOwners.length === 0) {
                listEl.innerHTML = '<p class="text-center text-muted py-4">まだ誰もこのバッジを持っていません</p>';
            } else {
                listEl.innerHTML = sortedOwners.map(o => {
                    const profile = o.profiles;
                    if (!profile) return '';
                    const avatarUrl = profile.avatar_url || 'https://ui-avatars.com/api/?name=?&background=1a4d8c&color=fff&size=48';
                    const name = profile.account_name || '名称未設定';
                    const badgeIcon = profile.badges;
                    const badgeIconRight = profile.badges_right;

                    let badgeHtmlLeft = '';
                    if (badgeIcon) {
                        const isMutant = window.equippedMutantMap?.[`${profile.discord_user_id}_${profile.equipped_badge_id}`]; // profile has discord_user_id but table uses user_id (uuid) ?? 
                        // Wait, profiles table: id(uuid), discord_user_id(text). user_badges_new: user_id(text, discord_id linked).
                        // Let's check schema. profiles.discord_user_id IS the ID used in user_badges_new.user_id usually?
                        // Actually checking schema... 
                        // In loadRanking (ranking/index.html), I used `${item.discord_user_id}_${item.equipped_badge_id}` and matched against `user_badges_new` `user_id`.
                        // So `user_badges_new.user_id` stores the discord_user_id string.
                        // Here `o.user_id` from `user_badges_new` is likely the discord id string.
                        // Let's verify `o` comes from `user_badges_new`.
                        // `owners` query: .from('user_badges_new').select('user_id, ...')
                        // So `o.user_id` IS `user_badges_new.user_id`.
                        // And `profile.discord_user_id` should match it.

                        // Using o.user_id is safer as it is directly from the owner record.
                        const userId = o.user_id;

                        // But wait, the equipped badge might belong to `profile.discord_user_id`?
                        // `o.profiles` is joined on `user_id`.
                        // So `o.user_id` === `profile.discord_user_id` (if relation handles it correctly).
                        // Let's use `o.user_id`.

                        const isMutantLeft = window.equippedMutantMap?.[`${userId}_${profile.equipped_badge_id}`];
                        badgeHtmlLeft = `
                            <div class="mutant-badge-container mini ${isMutantLeft ? 'active' : ''}" style="margin-right: -4px;">
                                <img src="${badgeIcon.image_url}" title="${badgeIcon.name}" 
                                     style="width: 20px; height: 20px; object-fit: contain; border-radius: 4px;">
                                <div class="mutant-badge-shine" style="display: ${isMutantLeft ? 'block' : 'none'};"></div>
                            </div>
                        `;
                    }

                    let badgeHtmlRight = '';
                    if (badgeIconRight) {
                        const userId = o.user_id;
                        const isMutantRight = window.equippedMutantMap?.[`${userId}_${profile.equipped_badge_id_right}`];
                        badgeHtmlRight = `
                            <div class="mutant-badge-container mini ${isMutantRight ? 'active' : ''}" style="margin-left: -4px;">
                                <img src="${badgeIconRight.image_url}" title="${badgeIconRight.name}" 
                                     style="width: 20px; height: 20px; object-fit: contain; border-radius: 4px;">
                                <div class="mutant-badge-shine" style="display: ${isMutantRight ? 'block' : 'none'};"></div>
                            </div>
                        `;
                    }

                    const countText = `x${o.count}`;
                    const share = totalInCirculation > 0 ? ((o.count / totalInCirculation) * 100).toFixed(1) : 0;

                    return `
                        <a href="../mypage/index.html?user=${profile.discord_user_id}" class="owner-item text-decoration-none text-dark d-flex align-items-center" style="gap: 8px;">
                            <img src="${avatarUrl}" alt="${name}" class="owner-avatar" onerror="this.src='https://ui-avatars.com/api/?name=?&background=1a4d8c&color=fff&size=48'">
                            ${badgeHtmlLeft}
                            <span class="fw-bold fs-5">${name}</span>
                            ${badgeHtmlRight}
                            <span class="badge bg-dark rounded-pill" style="font-size: 0.85rem;">${countText}</span>
                            <span class="fw-bold" style="font-size: 0.9rem; color: #555;">(占有率: ${share}%)</span>
                        </a>
                    `;
                }).join('');
            }
        }

        function toggleMutantView(showMutant) {
            const normalBtn = document.getElementById('normal-btn');
            const mutantBtn = document.getElementById('mutant-btn');
            const listTitle = document.querySelector('#owner-list').previousElementSibling;

            normalBtn.classList.toggle('active', !showMutant);
            mutantBtn.classList.toggle('active', showMutant);

            const data = window.badgeData;
            if (!data) return;

            const ownerList = showMutant ? data.mutantOwners : data.allOwners;

            // グループ化
            let total = 0;
            const grouped = ownerList.reduce((acc, o) => {
                const uid = o.user_id;
                if (!acc[uid]) {
                    acc[uid] = { ...o, count: 0 };
                }
                acc[uid].count++;
                total++;
                return acc;
            }, {});
            const sortedOwners = Object.values(grouped).sort((a, b) => b.count - a.count);

            // 統計更新
            const uniqueOwnerCount = sortedOwners.length;
            const ownershipRate = data.totalUsers > 0 ? ((uniqueOwnerCount / data.totalUsers) * 100).toFixed(1) : 0;

            document.getElementById('owner-count').textContent = uniqueOwnerCount.toLocaleString();
            document.getElementById('circulation-count').textContent = total.toLocaleString();
            document.getElementById('ownership-rate').textContent = ownershipRate + '%';

            // 市場価値更新（ミュータントは3倍）
            if (data.assetValue) {
                const displayValue = showMutant ? data.assetValue * 3 : data.assetValue;
                document.getElementById('market-value').textContent = displayValue.toLocaleString() + ' M';
            }

            // オーラエフェクト切り替え
            const badgeContainer = document.getElementById('badge-image-container');
            if (badgeContainer) {
                badgeContainer.classList.toggle('active', showMutant);
            }

            // キラエフェクト切り替え
            const shineOverlay = document.getElementById('mutant-shine');
            if (shineOverlay) {
                shineOverlay.style.display = showMutant ? 'block' : 'none';
            }

            // タイトル更新
            if (listTitle) {
                listTitle.innerHTML = showMutant
                    ? '✨ このバッジのミュータント所持者'
                    : '🏆 このバッジの所持者';
            }

            renderOwnerList(sortedOwners, total);
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
    <!-- チーム通知バッジ -->
    <script>
        async function checkTeamNotifications() {
            const user = await getCurrentUser();
            if (!user) return;

            // なりすまし対応
            const impersonated = getImpersonatedUser();
            const discordId = impersonated ? impersonated.discord_user_id : user.user_metadata.provider_id;

            const { data: myTeams } = await supabaseClient
                .from('teams')
                .select('id')
                .eq('creator_discord_id', discordId);

            if (!myTeams || myTeams.length === 0) return;

            const teamIds = myTeams.map(t => t.id);

            const { data: pendingRequests } = await supabaseClient
                .from('team_join_requests')
                .select('id')
                .in('team_id', teamIds)
                .in('status', ['pending', 'leave_pending']);

            const count = pendingRequests?.length || 0;

            if (count > 0) {
                const badge = document.getElementById('team-notification-badge');
                if (badge) {
                    badge.textContent = count;
                    badge.style.display = 'inline';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', checkTeamNotifications);
    </script>
