<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第二回麻雀大会 | かにサーバー</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- Bootswatch Lux -->
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        :root {
            --primary-green: #2d8a5e;
            --deep-green: #1e6b47;
            --cream: #faf5e8;
            --gold: #d4a853;
            --font-title: 'Noto Serif JP', serif;
            --font-body: 'M PLUS Rounded 1c', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, #2d8a5e 0%, #256b4a 50%, #1e5538 100%);
            min-height: 100vh;
            background-attachment: fixed;
            color: #333;
        }

        .page-header {
            font-family: var(--font-title);
            color: var(--cream);
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 18px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--gold);
        }

        .record-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--gold) 0%, #b8892d 100%);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 6px 20px rgba(212, 168, 83, 0.5);
            transition: all 0.3s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
        }

        .record-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 168, 83, 0.6);
            color: white;
        }

        .nav-dropdown {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .nav-dropdown-menu {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            min-width: 200px;
            overflow: hidden;
        }

        .nav-dropdown-menu .dropdown-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #333;
            transition: background 0.2s;
        }

        .nav-dropdown-menu .dropdown-item:hover {
            background: #f5f5f5;
        }

        .nav-dropdown-menu .dropdown-divider {
            margin: 0;
        }

        .notification-badge {
            background: #dc3545;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: auto;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .ranking-nav .btn {
            border-radius: 20px;
            margin: 5px;
            padding: 8px 20px;
            font-weight: bold;
        }

        .ranking-table thead th {
            background-color: var(--deep-green);
            color: white;
            border: none;
        }

        .submit-section {
            background: var(--cream);
            border-radius: 15px;
            padding: 25px;
            border-left: 5px solid var(--gold);
        }

        .hover-underline:hover {
            text-decoration: underline;
        }

        .ranking-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        /* フィルターセクションスタイル */
        .filter-section {
            text-align: center;
        }

        .filter-label {
            color: var(--cream);
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        /* メインフィルターボタン（緑色のピル型 - 現状維持） */
        #main-filter-container .btn {
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        /* サブフィルターボタン（オレンジ/ゴールド系） */
        .sub-filter-btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--cream);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .sub-filter-btn:hover {
            background: rgba(212, 168, 83, 0.3);
            color: white;
            border-color: var(--gold);
        }

        .sub-filter-btn.active {
            background: linear-gradient(135deg, var(--gold) 0%, #b8892d 100%);
            color: white;
            border-color: var(--gold);
            box-shadow: 0 3px 10px rgba(212, 168, 83, 0.4);
        }

        .sub-filter-section {
            background: rgba(0, 0, 0, 0.15);
            padding: 15px;
            border-radius: 15px;
        }

        /* ハイライト表示用 */
        .highlight-row {
            animation: highlight-animation 3s ease-out;
        }

        @keyframes highlight-animation {
            0% {
                background-color: rgba(212, 168, 83, 0.4);
                box-shadow: 0 0 20px rgba(212, 168, 83, 0.6);
            }

            100% {
                background-color: transparent;
                box-shadow: none;
            }
        }


        /* モバイル向けテーブル調整 */
        @media (max-width: 768px) {
            .ranking-table thead {
                display: none;
            }

            .ranking-table,
            .ranking-table tbody,
            .ranking-table tr,
            .ranking-table td {
                display: block;
                width: 100%;
            }

            .ranking-table tr {
                background: white;
                margin-bottom: 12px;
                border: 1px solid #e0e0e0;
                border-radius: 12px;
                padding: 12px;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
                position: relative;
            }

            .ranking-table td {
                border: none !important;
                padding: 4px 0 !important;
                text-align: left !important;
            }

            /* 順位を左上に小さく表示 */
            .ranking-table td:first-child {
                font-weight: bold;
                color: var(--gold);
                font-size: 1.1rem;
                border-bottom: 1px solid #f0f0f0 !important;
                margin-bottom: 8px;
                padding-bottom: 8px !important;
            }

            .ranking-table td:first-child::before {
                content: "Rank ";
                font-size: 0.8rem;
                opacity: 0.7;
            }

            .ranking-table td:nth-child(3)::before {
                content: attr(data-label) ": ";
                color: #888;
                font-size: 0.8rem;
            }

            .ranking-table td:nth-child(4)::before {
                content: attr(data-label) ": ";
                color: #888;
                font-size: 0.8rem;
            }

        .ranking-table td:nth-child(5)::before {
            content: attr(data-label) ": ";
            color: #888;
            font-size: 0.8rem;
        }

        .delta-pos {
            color: #0d6efd;
            font-weight: 700;
        }

        .delta-neg {
            color: #dc3545;
            font-weight: 700;
        }

        .delta-zero {
            color: #6c757d;
            font-weight: 700;
        }

        .ranking-table .delta-pos {
            color: #0d6efd !important;
        }

        .ranking-table .delta-neg {
            color: #dc3545 !important;
        }

        .ranking-table .delta-zero {
            color: #6c757d !important;
        }

        .podium-stat-value.delta-pos {
            color: #0d6efd;
        }

        .podium-stat-value.delta-neg {
            color: #dc3545;
        }

        .podium-stat-value.delta-zero {
            color: #6c757d;
        }

            .ranking-table td:nth-child(3),
            .ranking-table td:nth-child(4),
            .ranking-table td:nth-child(5) {
                display: inline-block;
                width: auto;
                margin-right: 15px;
                font-size: 0.9rem;
            }

            .page-header {
                font-size: 1.8rem !important;
            }
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        .back-button:hover {
            color: var(--gold);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
        }

        /* カスタムドロップダウンのスタイル */
        .custom-dropdown-container {
            position: relative;
        }

        .custom-dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .dropdown-item-flex {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .dropdown-item-flex:hover {
            background: #f0f0f0;
        }

        .dropdown-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin-right: 10px;
        }

        /* 選択済みプレイヤーの表示 */
        .selected-player-badge {
            display: none;
            align-items: center;
            background: #fff;
            border: 1px solid #ced4da;
            border-radius: 4px;
            padding: 2px 8px;
            height: 31px;
            /* form-control-sm に合わせる */
        }

        .selected-player-badge img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .selected-player-badge .name {
            font-size: 0.85rem;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-clear {
            padding: 0 4px;
            cursor: pointer;
            color: #999;
            line-height: 1;
        }

        .btn-clear:hover {
            color: #d11;
        }
    </style>


</head>

<body>

    <!-- 右上のナビゲーションドロップダウン -->
    <div class="nav-dropdown dropdown">
        <button class="record-button dropdown-toggle" type="button" id="navDropdown" data-bs-toggle="dropdown"
            aria-expanded="false">
            📝 メニュー
        </button>
        <ul class="dropdown-menu nav-dropdown-menu dropdown-menu-end" aria-labelledby="navDropdown">
            <li><a class="dropdown-item" href="../index.html">🏠 ホームに戻る</a></li>
            <li><a class="dropdown-item" href="../mypage/index.html">👤 マイページ</a></li>
            <li>
                <hr class="dropdown-divider">
            </li>
            <li><a class="dropdown-item" href="./index.html">📊 ランキング</a></li>
            <li><a class="dropdown-item" href="./record.html">📝 記録する</a></li>
            <li><a class="dropdown-item" href="./users/index.html">👥 ユーザー一覧</a></li>
            <li><a class="dropdown-item" href="./team/index.html">🏅 チーム管理 <span id="team-notification-badge"
                        class="notification-badge" style="display:none;">0</span></a></li>
            <li><a class="dropdown-item" href="../badge/list.html">📛 バッジ一覧</a></li>
            <li><a class="dropdown-item" href="../badge/shop.html">🛒 バッジショップ</a></li>
            <li><a class="dropdown-item" href="../ranking/index.html">💰 資産ランキング</a></li>
            <li class="admin-only" style="display:none;"><a class="dropdown-item" href="../omikuji/index.html">🎋
                    おみくじ</a></li>
            <li class="admin-only" style="display:none;">
                <hr class="dropdown-divider">
            </li>
            <li class="admin-only" style="display:none;">
                <a class="dropdown-item" href="../admin/index.html">⚙️ 管理画面</a>
            </li>
        </ul>
    </div>

    <div class="container py-5 mt-4">
        <header class="text-center mb-4">
            <h1 id="season-title" class="page-header display-4 fw-bold mb-0">🀄 全シーズン記録</h1>
            <h1 id="page-main-title" class="page-header display-4 fw-bold mb-4">🀄 歴代ランキング</h1>

            <!-- 大会切り替え（JavaScriptにより動的に生成） -->
            <div id="tournament-filter-container" class="mb-3"></div>

            <!-- ランキング種別切り替え -->
            <div class="ranking-nav d-flex flex-column gap-3">
                <!-- メインフィルター（対戦形式） -->
                <div class="filter-section">
                    <div class="filter-label">📋 対戦形式</div>
                    <div id="main-filter-container" class="d-flex flex-wrap justify-content-center gap-2">
                        <!-- JSで動的に生成 -->
                    </div>
                </div>
                <!-- サブフィルター（ランキング指標） -->
                <div class="filter-section sub-filter-section">
                    <div class="filter-label">📊 ランキング指標</div>
                    <div id="sub-filter-nav" class="d-flex flex-wrap justify-content-center gap-2">
                        <button class="btn sub-filter-btn active" onclick="updateSubFilter('all')">合計スコア</button>
                        <button class="btn sub-filter-btn" onclick="updateSubFilter('avg_score')">平均スコア</button>
                        <button class="btn sub-filter-btn" onclick="updateSubFilter('max_score')">最大スコア</button>
                        <button class="btn sub-filter-btn" onclick="updateSubFilter('match_count')">試合数</button>
                        <button class="btn sub-filter-btn" onclick="updateSubFilter('win')">和了率</button>
                        <button class="btn sub-filter-btn" onclick="updateSubFilter('deal')">放銃率</button>
                        <button class="btn sub-filter-btn" onclick="updateSubFilter('skill')">バランス雀力</button>
                        <button class="btn sub-filter-btn" onclick="updateSubFilter('avg_rank')">平均順位</button>
                        <button class="btn sub-filter-btn" onclick="updateSubFilter('top')">トップ率</button>
                        <button class="btn sub-filter-btn" onclick="updateSubFilter('avoid')">ラス回避</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- ランキングセクション -->
        <div class="content-card">
            <h3 class="mb-4 d-flex align-items-center">
                📊 <span id="ranking-title" class="ms-2">総合個人ランキング</span>
            </h3>

            <!-- 表彰台（ポディウム）セクション -->
            <div id="ranking-podium" class="row g-4 mb-5 justify-content-center">
                <!-- JSで動的に生成 -->
            </div>

            <style>
                .podium-card {
                    border-radius: 20px;
                    padding: 15px 30px;
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    position: relative;
                    transition: transform 0.3s ease;
                    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
                    border: none;
                    margin-bottom: 20px;
                    width: 100%;
                }

                .podium-card:hover {
                    transform: scale(1.02);
                }

                .podium-first {
                    background: linear-gradient(90deg, #fff7ad 0%, #ffa700 100%);
                    border-left: 10px solid #ffd700;
                }

                .podium-second {
                    background: linear-gradient(90deg, #f0f0f0 0%, #a0a0a0 100%);
                    border-left: 10px solid #c0c0c0;
                }

                .podium-third {
                    background: linear-gradient(90deg, #f5d4b5 0%, #b87333 100%);
                    border-left: 10px solid #cd7f32;
                }

                .podium-card-left {
                    display: flex;
                    align-items: center;
                    gap: 30px;
                    flex: 1;
                }

                .podium-card-right {
                    text-align: right;
                    min-width: 150px;
                }

                .podium-rank-box {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    min-width: 60px;
                }

                .podium-rank {
                    font-size: 2.5rem;
                    font-weight: 900;
                    font-family: 'Inter', sans-serif;
                    line-height: 1;
                }

                .podium-avatar {
                    width: 64px;
                    height: 64px;
                    border-radius: 50%;
                    border: 3px solid #fff;
                    object-fit: cover;
                    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
                }

                .podium-player-info {
                    display: flex;
                    align-items: center;
                    gap: 25px;
                }

                .podium-avatar-wrapper {
                    width: 64px;
                    height: 64px;
                    flex-shrink: 0;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }

                .podium-identity-row {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                }

                /* バッジスタイル */
                .podium-badge-left,
                .podium-badge-right {
                    width: 40px;
                    height: 40px;
                    flex-shrink: 0;
                }

                .podium-badge-left img,
                .podium-badge-right img {
                    width: 40px;
                    height: 40px;
                    object-fit: contain;
                    border-radius: 6px;
                }

                .podium-name {
                    font-weight: 800;
                    font-size: 1.4rem;
                    color: #222;
                    margin: 0;
                    line-height: 1.2;
                }

                .podium-crown {
                    font-size: 1.5rem;
                    margin-top: -10px;
                }

                .podium-stat-grid {
                    display: flex;
                    gap: 40px;
                    justify-content: flex-end;
                    align-items: center;
                }

                .podium-stat-item {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    text-align: center;
                }

                .podium-stat-label {
                    font-size: 0.8rem;
                    color: rgba(0, 0, 0, 0.6);
                    font-weight: 700;
                    margin-bottom: 2px;
                    white-space: nowrap;
                }

                .podium-stat-value {
                    font-size: 1.6rem;
                    font-weight: 900;
                    color: #000;
                    line-height: 1;
                }

                .podium-match-count {
                    color: rgba(0, 0, 0, 0.7);
                    font-size: 1.4rem;
                }

                @media (max-width: 768px) {
                    .podium-card {
                        padding: 20px 15px;
                        flex-direction: column;
                        text-align: center;
                        gap: 15px;
                    }

                    .podium-card-left {
                        flex-direction: column;
                        gap: 10px;
                        width: 100%;
                    }

                    .podium-player-info {
                        flex-direction: column;
                        gap: 10px;
                        width: 100%;
                    }

                    /* アバターのみ中央配置 */
                    .podium-avatar-wrapper {
                        margin: 0 auto;
                    }

                    /* バッジ＋名前のレイアウト：名前の左右にバッジ */
                    .podium-identity-row {
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        width: 100%;
                        flex-wrap: nowrap;
                        gap: 8px;
                    }

                    .podium-name {
                        font-size: 1.2rem;
                    }

                    /* モバイルでのバッジサイズ調整 */
                    .podium-badge-left,
                    .podium-badge-right {
                        width: 28px;
                        height: 28px;
                    }

                    .podium-badge-left img,
                    .podium-badge-right img {
                        width: 28px;
                        height: 28px;
                    }

                    /* 統計情報をカード内に収める */
                    .podium-card-right {
                        text-align: center;
                        width: 100%;
                        background: rgba(255, 255, 255, 0.3);
                        border-radius: 12px;
                        padding: 12px;
                        margin-top: 5px;
                    }

                    .podium-stat-grid {
                        justify-content: center;
                        gap: 30px;
                    }

                    .podium-stat-label {
                        font-size: 0.75rem;
                    }

                    .podium-stat-value {
                        font-size: 1.3rem;
                    }
                }
            </style>

            <div class="table-responsive">
                <table class="table ranking-table align-middle text-center">
                    <thead>
                        <tr>
                            <th style="width: 80px;">順位</th>
                            <th id="name-header">名前</th>
                            <th id="stat-header" style="width: 180px;">指標</th>
                            <th style="width: 120px;">試合数</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body">
                        <!-- JSで生成 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ランク外セクション（10試合未満） -->
        <div id="rank-out-section" style="display: none;" class="mt-5">
            <div class="content-card border-warning">
                <div class="d-flex align-items-center justify-content-between mb-4">
                    <h3 class="mb-0 d-flex align-items-center text-warning">
                        ⚠️ <span class="ms-2">記録対象外 (10試合未満)</span>
                    </h3>
                    <span class="badge bg-warning text-dark">圏外</span>
                </div>
                <p class="text-muted small mb-4">※規定試合数（10試合）に満たないため、ランキング集計から除外されています。</p>
                <div class="table-responsive">
                    <table class="table ranking-table align-middle text-center mb-0">
                        <thead>
                            <tr id="rank-out-header">
                                <!-- JSで動的に生成（メインテーブルと同期） -->
                            </tr>
                        </thead>
                        <tbody id="rank-out-body">
                            <!-- JSで生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay"
        style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:9999; color:white;">
        <div class="text-center">
            <div class="spinner-border text-light mb-2"></div>
            <div>送信中...</div>
        </div>
    </div>

    <!-- チーム通知バッジ -->
    <script>
        async function checkTeamNotifications() {
            const user = await getCurrentUser();
            if (!user) return;

            // なりすまし中ならそのユーザーID
            const impersonated = getImpersonatedUser();
            const discordId = impersonated
                ? impersonated.discord_user_id
                : user.user_metadata.provider_id;

            // 自分がリーダーのチームを取得
            const { data: myTeams } = await supabaseClient
                .from('teams')
                .select('id')
                .eq('creator_discord_id', discordId);

            if (!myTeams || myTeams.length === 0) return;

            const teamIds = myTeams.map(t => t.id);

            // 保留中の申請（加入・脱退）をカウント
            const { data: pendingRequests } = await supabaseClient
                .from('team_join_requests')
                .select('id')
                .in('team_id', teamIds)
                .in('status', ['pending', 'leave_pending']);

            const count = pendingRequests?.length || 0;

            if (count > 0) {
                const badge = document.getElementById('team-notification-badge');
                if (badge) {
                    badge.textContent = count;
                    badge.style.display = 'inline';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', checkTeamNotifications);
    </script>
