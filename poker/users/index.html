<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー一覧 | ポーカー大会</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../styles.css">
    <style>
        :root {
            --primary-blue: #1a4d8c;
            --deep-blue: #0d2f5c;
            --cream: #faf5e8;
            --gold: #d4a853;
            --font-title: 'Noto Serif JP', serif;
            --font-body: 'M PLUS Rounded 1c', sans-serif;
        }
        * { box-sizing: border-box; }
        body { font-family: var(--font-body); background: linear-gradient(135deg, #0d2f5c 0%, #1a4d8c 50%, #153d70 100%); min-height: 100vh; background-attachment: fixed; text-transform: none !important; color: #fff; }
        h1,h2,h3,h4,h5,h6,.btn,.nav-link { text-transform: none !important; }
        .page-header { font-family: var(--font-title); color: white; text-shadow: 2px 4px 12px rgba(0,0,0,0.3); }
        .content-card { background: transparent; border: none; border-radius: 24px; padding: 30px; margin-bottom: 25px; }
        /* アコーディオン */
        .accordion-button { background: rgba(255,255,255,0.08); color: #fff; border-radius: 14px !important; }
        .accordion-button:not(.collapsed) { background: rgba(255,255,255,0.15); color: #fff; font-weight: bold; box-shadow: none; }
        .accordion-button:focus { box-shadow: none; }
        .accordion-button::after { filter: brightness(0) invert(1); }
        .accordion-item { background: transparent; border: 1px solid rgba(255,255,255,0.15); margin-bottom: 10px; border-radius: 14px !important; overflow: hidden; }
        .accordion-body { background: rgba(255,255,255,0.05); }
        .team-icon { width: 40px; height: 40px; object-fit: contain; margin-right: 12px; font-size: 1.8em; display: inline-flex; align-items: center; justify-content: center; }
        /* ユーザーカード */
        .user-card { display: flex; align-items: center; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin-bottom: 8px; transition: all 0.2s; }
        .user-card:hover { background: rgba(255,255,255,0.15); transform: translateX(4px); }
        .user-avatar { width: 44px; height: 44px; border-radius: 50%; margin-right: 12px; border: 2px solid var(--gold); flex-shrink: 0; }
        .user-name { font-weight: 600; color: #fff; }
        .leader-badge { font-size: 0.75rem; color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 12px; margin-left: 10px; }
        /* スコア */
        .user-score { margin-left: auto; font-weight: 700; font-size: 0.9rem; }
        .score-pos { color: #4ade80; }
        .score-neg { color: #f87171; }
    </style>
</head>
<body>
    <div class="nav-dropdown dropdown" style="position:fixed;top:20px;right:20px;z-index:1000;">
        <button class="btn dropdown-toggle" type="button" id="navDropdown" data-bs-toggle="dropdown"
            style="background:linear-gradient(135deg,var(--gold) 0%,#b8892d 100%);color:white;padding:12px 24px;border-radius:25px;font-weight:bold;">
            📝 メニュー
        </button>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navDropdown">
            <li><a class="dropdown-item" href="../../index.html">🏠 ホームに戻る</a></li>
            <li><a class="dropdown-item" href="../../mypage/index.html">👤 マイページ</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="../index.html">🃏 ランキング</a></li>
            <li><a class="dropdown-item" href="../record.html">📝 記録する</a></li>
            <li><a class="dropdown-item" href="./index.html">👥 ユーザー一覧</a></li>
            <li><a class="dropdown-item" href="../team/index.html">🏅 チーム管理</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="../../badge/list.html">📛 バッジ一覧</a></li>
            <li><a class="dropdown-item" href="../../badge/shop.html">🛒 バッジショップ</a></li>
            <li><a class="dropdown-item" href="../../ranking/index.html">💵 資産ランキング</a></li>
            <li class="admin-only" style="display:none;"><hr class="dropdown-divider"></li>
            <li class="admin-only" style="display:none;"><a class="dropdown-item" href="../../admin/index.html">⚙️ 管理画面</a></li>
        </ul>
    </div>

    <div class="container py-5" style="padding-top:80px!important;max-width:900px;">
        <header class="text-center mb-5">
            <h1 class="page-header display-4 fw-bold">👥 ユーザー一覧</h1>
            <p style="color:rgba(255,255,255,0.7);">第二回ポーカー大会</p>
        </header>

        <div class="content-card">
            <div id="users-loading" class="text-center py-5">
                <div class="spinner-border" style="color:var(--primary-blue);" role="status"></div>
            </div>
            <div id="users-content" style="display:none;">
                <div id="teams-container"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/auth-guard.js"></script>
    <script src="../../js/survey-modal.js"></script>
    <script src="../../js/navigation.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => { initAccordionNav('../../'); });
    document.addEventListener('DOMContentLoaded', loadUsersData);

    async function loadUsersData() {
        try {
            // ポーカー専用チーム取得
            const { data: teams } = await supabaseClient
                .from('poker_teams')
                .select('id, team_name, creator_discord_id, icon_url')
                .order('team_name');

            // ポーカープロフィール取得（チーム所属情報）
            const { data: pokerProfiles } = await supabaseClient
                .from('poker_profiles')
                .select('discord_user_id, team_id');
            const pokerMemberIds = new Set((pokerProfiles || []).map(p => p.discord_user_id));

            // 全サーバーメンバーのプロフィール取得
            const { data: allProfiles } = await supabaseClient
                .from('profiles')
                .select('discord_user_id, account_name, avatar_url, is_hidden, equipped_badge_id, equipped_badge_id_right, badges!equipped_badge_id(image_url), badges_right:badges!equipped_badge_id_right(image_url)')
                .order('account_name');
            const visibleProfiles = (allProfiles || []).filter(p => !p.is_hidden);
            const profileMap = {};
            visibleProfiles.forEach(p => { profileMap[p.discord_user_id] = p; });

            const allIds = visibleProfiles.map(p => p.discord_user_id).filter(Boolean);
            const mutantSet = new Set();
            if (allIds.length > 0) {
                const { data: mutantData } = await supabaseClient.from('user_badges_new').select('user_id,badge_id').in('user_id', allIds).eq('is_mutant', true);
                (mutantData || []).forEach(ub => mutantSet.add(`${ub.user_id}:${ub.badge_id}`));
            }
            function isMutant(uid, badgeId) { return badgeId ? mutantSet.has(`${uid}:${badgeId}`) : false; }

            // スコア集計（poker_results）※1000件上限を超える分もページ送りで全件取得
            let results = [];
            {
                let page = 0;
                const pageSize = 1000;
                while (true) {
                    const { data } = await supabaseClient
                        .from('poker_results')
                        .select('discord_user_id, final_score')
                        .range(page * pageSize, (page + 1) * pageSize - 1);
                    if (!data || data.length === 0) break;
                    results = results.concat(data);
                    if (data.length < pageSize) break;
                    page++;
                }
            }
            const scoreMap = {};
            (results || []).forEach(r => {
                if (!r.discord_user_id) return;
                scoreMap[r.discord_user_id] = (scoreMap[r.discord_user_id] || 0) + Number(r.final_score);
            });

            // チーム → メンバーマップ
            const teamMemberMap = {};
            (teams || []).forEach(t => { teamMemberMap[t.id] = []; });
            (pokerProfiles || []).forEach(pp => {
                if (!pp.team_id || !teamMemberMap[pp.team_id]) return;
                const profile = profileMap[pp.discord_user_id] || {};
                teamMemberMap[pp.team_id].push({
                    discord_user_id: pp.discord_user_id,
                    account_name: profile.account_name || pp.discord_user_id,
                    avatar_url: profile.avatar_url || null,
                    badge_left:  profile.badges?.image_url       || null,
                    badge_right: profile.badges_right?.image_url || null,
                    is_left_mutant:  isMutant(pp.discord_user_id, profile.equipped_badge_id),
                    is_right_mutant: isMutant(pp.discord_user_id, profile.equipped_badge_id_right),
                    score: scoreMap[pp.discord_user_id] || 0,
                });
            });

            // 未所属 = 全サーバーメンバーのうちポーカーチーム未所属の人
            const unaffiliated = visibleProfiles
                .filter(p => !pokerMemberIds.has(p.discord_user_id) ||
                    (pokerProfiles||[]).find(pp => pp.discord_user_id === p.discord_user_id && !pp.team_id))
                .map(p => ({
                    discord_user_id: p.discord_user_id,
                    account_name: p.account_name || p.discord_user_id,
                    avatar_url: p.avatar_url || null,
                    badge_left:  p.badges?.image_url       || null,
                    badge_right: p.badges_right?.image_url || null,
                    is_left_mutant:  isMutant(p.discord_user_id, p.equipped_badge_id),
                    is_right_mutant: isMutant(p.discord_user_id, p.equipped_badge_id_right),
                    score: scoreMap[p.discord_user_id] || 0,
                }));

            renderUsers(teams || [], teamMemberMap, unaffiliated);
            document.getElementById('users-loading').style.display = 'none';
            document.getElementById('users-content').style.display = 'block';
        } catch (err) {
            console.error(err);
            document.getElementById('users-loading').innerHTML = '<p class="text-danger">データの読み込みに失敗しました</p>';
        }
    }

    function renderUsers(teams, teamMemberMap, unaffiliated) {
        const container = document.getElementById('teams-container');
        const accordion = document.createElement('div');
        accordion.className = 'accordion';

        teams.forEach(team => {
            const members = (teamMemberMap[team.id] || []).sort((a,b) => b.score - a.score);
            const collapseId = `collapseTeam${team.id.replace(/-/g,'')}`;
            const item = document.createElement('div');
            item.className = 'accordion-item';
            item.innerHTML = `
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                        <div class="d-flex align-items-center">
                            ${team.icon_url
                                ? `<img src="${team.icon_url}" alt="" class="team-icon" style="width:36px;height:36px;object-fit:contain;border-radius:6px;">`
                                : `<span class="team-icon">🏅</span>`}
                            <span class="fw-bold fs-5">${team.team_name}</span>
                            <span class="badge bg-secondary ms-3 rounded-pill">${members.length}名</span>
                        </div>
                    </button>
                </h2>
                <div id="${collapseId}" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        ${members.length > 0 ? members.map(u => userCard(u, u.discord_user_id === team.creator_discord_id)).join('') : '<p class="text-muted">メンバーはいません</p>'}
                    </div>
                </div>`;
            accordion.appendChild(item);
        });

        // 未所属
        const sortedUnaffiliated = unaffiliated.sort((a,b) => b.score - a.score);
        const unaffItem = document.createElement('div');
        unaffItem.className = 'accordion-item';
        unaffItem.innerHTML = `
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseUnaffiliated">
                    <div class="d-flex align-items-center">
                        <span class="team-icon">🚫</span>
                        <span class="fw-bold fs-5">未所属</span>
                        <span class="badge bg-secondary ms-3 rounded-pill">${sortedUnaffiliated.length}名</span>
                    </div>
                </button>
            </h2>
            <div id="collapseUnaffiliated" class="accordion-collapse collapse">
                <div class="accordion-body">
                    ${sortedUnaffiliated.length > 0 ? sortedUnaffiliated.map(u => userCard(u, false)).join('') : '<p class="text-muted">未所属のプレイヤーはいません</p>'}
                </div>
            </div>`;
        accordion.appendChild(unaffItem);

        container.innerHTML = '';
        container.appendChild(accordion);
    }

    function _badgeHtml(src, isMutant) {
        if (!src) return '';
        return `<div class="mutant-badge-container mini${isMutant ? ' active' : ''}" style="display:inline-block;vertical-align:middle;margin:0 2px;">` +
               `<img src="${src}" style="width:22px;height:22px;object-fit:contain;">` +
               `<div class="mutant-badge-shine" style="display:${isMutant ? 'block' : 'none'};"></div></div>`;
    }

    function userCard(u, isLeader) {
        const avatar = u.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(u.account_name)}&background=1a4d8c&color=fff`;
        const bl = _badgeHtml(u.badge_left,  u.is_left_mutant  || false);
        const br = _badgeHtml(u.badge_right, u.is_right_mutant || false);
        const sc = u.score;
        const scoreCls = sc > 0 ? 'score-pos' : sc < 0 ? 'score-neg' : '';
        const scoreStr = sc > 0 ? `+${sc}` : `${sc}`;
        const href = u.discord_user_id ? `../../mypage/index.html?user=${u.discord_user_id}` : null;
        const tag = href ? `a href="${href}"` : 'div';
        const closeTag = href ? 'a' : 'div';
        return `<${tag} class="user-card" style="${href ? 'text-decoration:none;' : ''}">
            <img src="${avatar}" class="user-avatar" onerror="this.src='https://ui-avatars.com/api/?name=?&background=1a4d8c&color=fff'">
            ${bl}<span class="user-name">${u.account_name}</span>${br}
            ${isLeader ? '<span class="leader-badge">👑 リーダー</span>' : ''}
            <span class="user-score ${scoreCls}">${sc !== 0 ? scoreStr + ' pts' : '-'}</span>
        </${closeTag}>`;
    }
    </script>
</body>
</html>
