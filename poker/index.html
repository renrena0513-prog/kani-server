<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランキング | ポーカー大会</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        :root {
            --blue1: #0a1628;
            --blue2: #0d2f5c;
            --blue3: #1a4d8c;
            --gold: #d4a853;
            --gold2: #f0c060;
            --silver: #b0bec5;
            --bronze: #cd7f32;
            --fn: 'Noto Serif JP', serif;
            --fb: 'M PLUS Rounded 1c', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--fb);
            background: var(--blue1);
            min-height: 100vh;
            color: white;
            text-transform: none !important;
            overflow-x: hidden;
        }
        h1,h2,h3,h4,h5,h6,.btn { text-transform: none !important; }

        /* ── 背景 ── */
        .bg-felt {
            background:
                radial-gradient(ellipse at 20% 10%, rgba(26,77,140,.5) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(13,47,92,.6) 0%, transparent 60%),
                linear-gradient(160deg, #0a1628 0%, #0d2447 40%, #0a1628 100%);
            min-height: 100vh;
        }
        .bg-felt::before { display: none; }

        /* ── ヘッダー ── */
        .page-hero {
            position: relative; z-index: 1;
            text-align: center;
            padding: 36px 20px 32px;
        }
        .hero-eyebrow { font-size:.78rem; letter-spacing:.3em; color:var(--gold); margin-bottom:8px; }
        .hero-title {
            font-family: var(--fn);
            font-size: clamp(2.2rem,7vw,4rem);
            font-weight: 900;
            background: linear-gradient(135deg,#fff 20%,var(--gold2) 60%,var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1; margin-bottom: 6px;
        }
        .hero-suits { margin-top:12px; font-size:1.5rem; letter-spacing:.5em; }
        .hero-suits .h,.hero-suits .d { color:#e53e3e; }

        /* ── フィルター共通 ── */
        .filter-wrap {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center; gap: 10px;
            margin: 0 auto 32px;
            padding: 0 16px;
        }
        .filter-label { font-size:.72rem; letter-spacing:.2em; color:rgba(255,255,255,.35); margin-bottom:2px; text-align:center; }
        .filter-group { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }

        /* 大会フィルター（ゴールド系） */
        .tour-btn {
            padding: 7px 22px;
            border-radius: 50px;
            border: 2px solid rgba(212,168,83,.4);
            background: rgba(212,168,83,.06);
            color: rgba(255,255,255,.6);
            font-weight: 700; font-size:.88rem;
            cursor: pointer; transition: all .22s;
        }
        .tour-btn.active {
            background: linear-gradient(135deg,var(--gold) 0%,#b8892d 100%);
            border-color: var(--gold);
            color: white;
            box-shadow: 0 5px 20px rgba(212,168,83,.4);
        }
        .tour-btn:hover:not(.active) { border-color:rgba(212,168,83,.7); color:white; }

        /* 形式フィルター（青系） */
        .mode-btn {
            padding: 7px 22px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,.18);
            background: rgba(255,255,255,.05);
            color: rgba(255,255,255,.55);
            font-weight: 700; font-size:.88rem;
            cursor: pointer; transition: all .22s;
        }
        .mode-btn.active {
            background: linear-gradient(135deg,var(--blue3) 0%,var(--blue2) 100%);
            border-color: rgba(100,160,255,.6);
            color: white;
            box-shadow: 0 5px 20px rgba(26,77,140,.5);
        }
        .mode-btn:hover:not(.active) { border-color:rgba(255,255,255,.4); color:white; }

        /* ── コンテナ ── */
        .main-wrap { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:0 16px 80px; }

        /* ── ポジウム TOP3（縦並び帯スタイル） ── */
        .podium-list { display:flex; flex-direction:column; gap:12px; margin-bottom:28px; }

        .podium-row {
            display: flex; align-items: center; gap: 14px;
            border-radius: 18px; padding: 16px 20px;
            position: relative; overflow: hidden;
            transition: transform .2s;
        }
        .podium-row:hover { transform: translateX(4px); }
        .podium-row.r1 {
            background: linear-gradient(90deg,rgba(212,168,83,.38) 0%,rgba(180,120,20,.15) 100%);
            border: 2px solid rgba(212,168,83,.65);
            box-shadow: 0 0 28px rgba(212,168,83,.3), 0 0 6px rgba(212,168,83,.15) inset;
        }
        .podium-row.r2 {
            background: linear-gradient(90deg,rgba(200,210,220,.28) 0%,rgba(176,190,197,.08) 100%);
            border: 2px solid rgba(200,215,230,.5);
            box-shadow: 0 0 18px rgba(176,190,197,.2);
        }
        .podium-row.r3 {
            background: linear-gradient(90deg,rgba(205,127,50,.28) 0%,rgba(180,90,20,.08) 100%);
            border: 2px solid rgba(205,127,50,.45);
            box-shadow: 0 0 16px rgba(205,127,50,.18);
        }
        .podium-medal { font-size:2rem; min-width:40px; text-align:center; }
        .podium-avatar {
            border-radius: 50%; object-fit: cover;
            border: 3px solid rgba(255,255,255,.2);
            flex-shrink: 0;
        }
        .r1 .podium-avatar { width:64px;height:64px;border-color:var(--gold); box-shadow:0 0 0 4px rgba(212,168,83,.3), 0 0 14px rgba(212,168,83,.25); }
        .r2 .podium-avatar { width:56px;height:56px;border-color:var(--silver); box-shadow:0 0 0 3px rgba(200,215,230,.2); }
        .r3 .podium-avatar { width:50px;height:50px;border-color:var(--bronze); box-shadow:0 0 0 3px rgba(205,127,50,.2); }
        .r1 .podium-medal { font-size:2.4rem; filter:drop-shadow(0 0 6px rgba(212,168,83,.7)); }
        .r2 .podium-medal { font-size:2.1rem; filter:drop-shadow(0 0 4px rgba(200,215,230,.5)); }
        .podium-info { flex:1; min-width:0; }
        .podium-name { font-weight:700; font-size:1.05rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .r1 .podium-name { font-size:1.15rem; color:#ffe08a; }
        .r2 .podium-name { color:#d8e8f0; }
        .r3 .podium-name { color:#e8b070; }
        .podium-sub { font-size:.75rem; color:rgba(255,255,255,.4); margin-top:2px; }
        .podium-score { font-family:var(--fn); font-weight:900; text-align:right; }
        .r1 .podium-score { font-size:2rem; color:var(--gold2); text-shadow:0 0 12px rgba(212,168,83,.6); }
        .r2 .podium-score { font-size:1.7rem; color:var(--silver); text-shadow:0 0 8px rgba(200,215,230,.4); }
        .r3 .podium-score { font-size:1.45rem; color:var(--bronze); text-shadow:0 0 6px rgba(205,127,50,.35); }
        .podium-cnt { font-size:.7rem; color:rgba(255,255,255,.35); text-align:right; }
        /* 個人1位シマー */
        .podium-row.r1::after { content:''; position:absolute; inset:0; background:linear-gradient(105deg,transparent 40%,rgba(255,220,100,.07) 50%,transparent 60%); pointer-events:none; animation:shimmer 2.8s ease-in-out infinite; }

        /* ── ランキングリスト ── */
        .rank-list { display:flex; flex-direction:column; gap:7px; }
        .rank-row {
            display:flex; align-items:center; gap:14px;
            background:rgba(255,255,255,.05);
            border:1px solid rgba(255,255,255,.08);
            border-radius:14px; padding:12px 18px;
            transition: all .18s;
        }
        .rank-row:hover { background:rgba(255,255,255,.09); transform:translateX(4px); }
        .rank-no { font-family:var(--fn); font-weight:900; font-size:1rem; min-width:28px; text-align:center; color:rgba(255,255,255,.35); }
        .rank-avatar { width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.12);flex-shrink:0; }
        .rank-info { flex:1; min-width:0; }
        .rank-name { font-weight:700; font-size:.9rem; white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
        .rank-team { font-size:.73rem; color:rgba(255,255,255,.38); margin-top:1px; }
        .rank-score { font-family:var(--fn); font-weight:700; font-size:1.1rem; text-align:right; min-width:55px; }
        .rank-games { font-size:.7rem; color:rgba(255,255,255,.32); text-align:right; }

        .score-pos { color:#4ade80; }
        .score-neg { color:#f87171; }
        .score-zero { color:rgba(255,255,255,.4); }

        /* ── チームカード ── */
        .team-list { display:flex; flex-direction:column; gap:10px; }
        .team-card { border-radius:16px; overflow:hidden; cursor:pointer; transition:transform .2s, box-shadow .2s; }
        .team-card:hover { transform:translateY(-2px); }
        .team-card.r1 { background:linear-gradient(135deg,rgba(212,168,83,.38) 0%,rgba(180,120,20,.15) 100%); border:2px solid rgba(212,168,83,.7); box-shadow:0 0 32px rgba(212,168,83,.35), 0 0 8px rgba(212,168,83,.2) inset; }
        .team-card.r2 { background:linear-gradient(135deg,rgba(200,210,220,.30) 0%,rgba(176,190,197,.10) 100%); border:2px solid rgba(200,215,230,.55); box-shadow:0 0 22px rgba(176,190,197,.25), 0 0 6px rgba(200,215,230,.12) inset; }
        .team-card.r3 { background:linear-gradient(135deg,rgba(205,127,50,.30) 0%,rgba(180,90,20,.10) 100%); border:2px solid rgba(205,127,50,.5); box-shadow:0 0 20px rgba(205,127,50,.22), 0 0 5px rgba(205,127,50,.1) inset; }
        .team-card.rf { background:linear-gradient(135deg,rgba(150,100,255,.22) 0%,rgba(100,60,200,.08) 100%); border:1px solid rgba(150,100,255,.45); box-shadow:0 0 14px rgba(150,100,255,.18); }
        .team-card.rn { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); }
        /* カードヘッダー */
        .tc-header { display:flex; align-items:center; gap:12px; padding:14px 16px 8px; }
        .tc-medal { font-size:1.9rem; min-width:36px; text-align:center; line-height:1; }
        .tc-icon { width:72px; height:72px; object-fit:contain; flex-shrink:0; border:none; background:none; border-radius:0; }
        .tc-icon-placeholder { width:72px; height:72px; display:flex; align-items:center; justify-content:center; font-size:2.4rem; flex-shrink:0; }
        .tc-info { flex:1; min-width:0; }
        .tc-name { font-weight:700; font-size:1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .tc-score { font-family:var(--fn); font-weight:900; text-align:right; }
        .team-card.r1 .tc-score { font-size:2rem; color:var(--gold2); text-shadow:0 0 12px rgba(212,168,83,.6); }
        .team-card.r2 .tc-score { font-size:1.7rem; color:var(--silver); text-shadow:0 0 8px rgba(200,215,230,.4); }
        .team-card.r3 .tc-score { font-size:1.45rem; color:var(--bronze); text-shadow:0 0 6px rgba(205,127,50,.4); }
        .team-card.rf .tc-score { font-size:1.2rem; color:rgba(170,130,255,.95); }
        .team-card.r1 .tc-medal { font-size:2.4rem; filter:drop-shadow(0 0 6px rgba(212,168,83,.7)); }
        .team-card.r2 .tc-medal { font-size:2.1rem; filter:drop-shadow(0 0 4px rgba(200,215,230,.5)); }
        .team-card.r3 .tc-medal { font-size:1.9rem; filter:drop-shadow(0 0 4px rgba(205,127,50,.5)); }
        .team-card.r1 .tc-name { font-size:1.15rem; color:#ffe08a; }
        .team-card.r2 .tc-name { font-size:1.05rem; color:#d8e8f0; }
        .team-card.r3 .tc-name { color:#e8b070; }
        .finalist-badge { display:inline-block; font-size:.6rem; font-weight:800; letter-spacing:.1em; padding:2px 8px; border-radius:50px; background:rgba(150,100,255,.25); border:1px solid rgba(150,100,255,.5); color:rgba(200,170,255,.9); }
        .team-card.rn .tc-score { font-size:1.1rem; color:rgba(255,255,255,.7); }
        /* 1位シマーアニメ */
        @keyframes shimmer { 0%,100%{opacity:.55} 50%{opacity:1} }
        .team-card.r1::after { content:''; position:absolute; inset:0; background:linear-gradient(105deg,transparent 40%,rgba(255,220,100,.08) 50%,transparent 60%); pointer-events:none; animation:shimmer 2.8s ease-in-out infinite; }
        /* スクロールフェードイン */
        @keyframes fadeSlideUp { from { opacity:0; transform:translateY(52px); } to { opacity:1; transform:translateY(0); } }
        .scroll-hidden { opacity:0; transform:translateY(52px); }
        .scroll-visible { animation:fadeSlideUp 1.2s cubic-bezier(.08,.82,.17,1) both; }
        .tc-arrow { font-size:.8rem; color:rgba(255,255,255,.3); margin-left:4px; transition:transform .2s; }
        .team-card.open .tc-arrow { transform:rotate(180deg); }
        /* 統計行 */
        .tc-stats { display:flex; padding:0 16px 12px; gap:0; }
        .tc-stat { flex:1; text-align:center; }
        .tc-stat-label { font-size:.68rem; color:rgba(255,255,255,.38); }
        .tc-stat-val { font-size:.9rem; font-weight:700; color:rgba(255,255,255,.8); }
        /* メンバー展開 */
        .tc-members { display:none; padding:10px 16px 14px; border-top:1px solid rgba(255,255,255,.1); }
        .team-card.open .tc-members { display:block; }
        .tc-member-row { display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,.05); }
        .tc-member-row:last-child { border-bottom:none; }
        .tc-member-avatar { width:30px; height:30px; border-radius:50%; border:2px solid rgba(255,255,255,.15); flex-shrink:0; }
        .tc-member-name { flex:1; font-size:.88rem; font-weight:600; }
        .tc-member-chip { font-size:.8rem; color:#d4a853; white-space:nowrap; flex-shrink:0; margin-right:8px; }
        .tc-member-score { font-family:var(--fn); font-size:.88rem; font-weight:700; }
        /* 決勝ライン区切り */
        .finalist-sep { display:flex; align-items:center; gap:10px; margin:14px 0 6px; }
        .finalist-sep span { font-size:.72rem; font-weight:700; color:rgba(255,255,255,.35); white-space:nowrap; }
        .finalist-sep::before, .finalist-sep::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.15); }
        .finalist-banner { display:flex; align-items:center; justify-content:center; gap:8px; padding:10px 16px; background:linear-gradient(90deg,rgba(150,100,255,.18) 0%,rgba(100,60,200,.1) 100%); border:1px solid rgba(150,100,255,.4); border-radius:14px; font-size:.78rem; font-weight:800; color:rgba(200,170,255,.95); letter-spacing:.1em; margin-bottom:10px; box-shadow:0 0 12px rgba(150,100,255,.12); }

        /* ── セクション区切り ── */
        .section-label {
            display:flex; align-items:center; gap:10px;
            margin:4px 0 16px;
        }
        .section-label span { font-size:.72rem; letter-spacing:.18em; color:rgba(255,255,255,.32); }
        .section-label::before,.section-label::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.09); }

        /* ── 空状態 ── */
        .empty-state { text-align:center; padding:60px 20px; color:rgba(255,255,255,.3); font-size:.9rem; }

        /* ── ローディング ── */
        #loading-state { text-align:center; padding:80px 20px; position:relative; z-index:1; }
        .spinner-ring {
            width:48px; height:48px;
            border:4px solid rgba(255,255,255,.1);
            border-top-color:var(--gold);
            border-radius:50%;
            animation:spin .8s linear infinite;
            margin:0 auto 14px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* サブフィルター */
        .sub-btn {
            padding:5px 16px; border-radius:50px;
            border:1.5px solid rgba(255,255,255,.18);
            background:rgba(255,255,255,.04);
            color:rgba(255,255,255,.5);
            font-size:.8rem; font-weight:600;
            cursor:pointer; transition:all .2s;
        }
        .sub-btn.active {
            background:rgba(255,255,255,.15);
            border-color:rgba(255,255,255,.4);
            color:white;
        }
        .sub-btn:hover:not(.active) { border-color:rgba(255,255,255,.3); color:rgba(255,255,255,.8); }

        @media (max-width:600px) {
            .r1 .podium-avatar { width:52px;height:52px; }
            .r2 .podium-avatar { width:46px;height:46px; }
            .r3 .podium-avatar { width:42px;height:42px; }
            .r1 .podium-score { font-size:1.5rem; }
        }
    </style>
</head>

    <script src="../js/navigation.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => { initAccordionNav('../'); });

    // ── 状態 ──
    let allResults = [];
    let profileMap = {};
    let chipMap = {}; // discord_user_id -> chips
    let mutantMap = {}; // discord_user_id -> { left: bool, right: bool }
    let allTeamNames = new Set();
    let teamIconMap = {};
    let currentTour = 'all';
    let currentMode = 'individual';
    let currentSub  = 'score';

    // 大会名インデックス（onclick用）
    let tourList = [];

    document.addEventListener('DOMContentLoaded', loadRanking);

    async function loadRanking() {
        const { data: results, error } = await supabaseClient
            .from('poker_results')
            .select('discord_user_id,account_name,final_score,rank,team_name,tournament_type,match_mode,event_datetime');
        if (error) { console.error(error); return; }
        allResults = results || [];

        const ids = [...new Set(allResults.map(r => r.discord_user_id).filter(Boolean))];
        if (ids.length > 0) {
            const { data: profiles } = await supabaseClient
                .from('profiles').select('discord_user_id,account_name,avatar_url,equipped_badge_id,equipped_badge_id_right,badges!equipped_badge_id(image_url),badges_right:badges!equipped_badge_id_right(image_url)').in('discord_user_id', ids);
            (profiles || []).forEach(p => { profileMap[p.discord_user_id] = p; });
            const { data: mutantData } = await supabaseClient.from('user_badges_new').select('user_id,badge_id').in('user_id', ids).eq('is_mutant', true);
            const mutantSet = new Set((mutantData || []).map(ub => `${ub.user_id}:${ub.badge_id}`));
            ids.forEach(uid => {
                const p = profileMap[uid] || {};
                mutantMap[uid] = {
                    left:  p.equipped_badge_id       ? mutantSet.has(`${uid}:${p.equipped_badge_id}`)       : false,
                    right: p.equipped_badge_id_right ? mutantSet.has(`${uid}:${p.equipped_badge_id_right}`) : false,
                };
            });
        }

        const { data: teams } = await supabaseClient.from('poker_teams').select('id,team_name,icon_url');
        allTeamNames = new Set((teams || []).map(t => t.team_name));
        teamIconMap = {};
        (teams || []).forEach(t => { if (t.icon_url) teamIconMap[t.team_name] = t.icon_url; });

        const { data: tipProfiles } = await supabaseClient.from('profiles').select('discord_user_id,tip').gt('tip', 0);
        chipMap = {};
        (tipProfiles || []).forEach(p => { chipMap[p.discord_user_id] = p.tip || 0; });

        buildTourFilter();

        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('main-content').style.display = '';
        render();
    }

    function buildTourFilter() {
        tourList = [...new Set(allResults.map(r => r.tournament_type).filter(Boolean))].sort();
        const container = document.getElementById('tour-filter');
        let html = `<button class="tour-btn active" onclick="setTour(-1,this)">全期間</button>`;
        tourList.forEach((t, i) => {
            html += `<button class="tour-btn" onclick="setTour(${i},this)">${t}</button>`;
        });
        container.innerHTML = html;
    }

    function setTour(idx, btn) {
        currentTour = idx === -1 ? 'all' : tourList[idx];
        document.querySelectorAll('.tour-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('hero-sub-text').textContent = currentTour === 'all' ? '全期間' : currentTour;
        render();
    }

    function setMode(val, btn) {
        currentMode = val;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('sub-filter-wrap').style.display = val === 'individual' ? '' : 'none';
        // チームモードに切り替えたとき、大会フィルターを最初の大会に自動セット
        if (val === 'team' && tourList.length > 0) {
            const tourBtns = document.querySelectorAll('.tour-btn');
            tourBtns.forEach(b => b.classList.remove('active'));
            // インデックス1が最初の大会（0は全期間）
            if (tourBtns[1]) tourBtns[1].classList.add('active');
            currentTour = tourList[0];
            document.getElementById('hero-sub-text').textContent = tourList[0];
        }
        render();
    }

    function setSub(val, btn) {
        currentSub = val;
        document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function filtered() {
        if (currentTour === 'all') return allResults;
        return allResults.filter(r => r.tournament_type === currentTour);
    }

    function _badgeHtml(src, isMutant) {
        if (!src) return '';
        return `<div class="mutant-badge-container mini${isMutant ? ' active' : ''}" style="display:inline-block;vertical-align:middle;margin:0 2px;">` +
               `<img src="${src}" style="width:22px;height:22px;object-fit:contain;">` +
               `<div class="mutant-badge-shine" style="display:${isMutant ? 'block' : 'none'};"></div></div>`;
    }

    function playerNameHtml(p) {
        const m = mutantMap[p.id] || {};
        const bl = _badgeHtml(p.badge_left,  m.left  || false);
        const br = _badgeHtml(p.badge_right, m.right || false);
        const href = p.id ? `../mypage/index.html?user=${p.id}` : '#';
        const nameLink = p.id ? `<a href="${href}" style="color:inherit;text-decoration:none;">${p.name}</a>` : p.name;
        return `${bl}${nameLink}${br}`;
    }

    function aggregateIndividual(rows) {
        const map = {};
        rows.forEach(r => {
            const key = r.discord_user_id || r.account_name;
            if (!map[key]) {
                const p = profileMap[r.discord_user_id] || {};
                map[key] = { id: r.discord_user_id, name: p.account_name || r.account_name,
                    avatar: p.avatar_url || null, team: r.team_name || '',
                    badge_left:  p.badges?.image_url       || null,
                    badge_right: p.badges_right?.image_url || null,
                    score: 0, count: 0, wins: 0, positives: 0,
                    chips: chipMap[r.discord_user_id] || 0 };
            }
            map[key].score += Number(r.final_score);
            map[key].count++;
            if (Number(r.rank) === 1) map[key].wins++;
            if (Number(r.final_score) > 0) map[key].positives++;
        });
        // chipモードはpoker_profilesの全員が対象（試合未参加でもchips>0なら表示）
        if (currentSub === 'chip') {
            Object.entries(chipMap).forEach(([uid, chips]) => {
                if (!map[uid]) {
                    const p = profileMap[uid] || {};
                    map[uid] = { id: uid, name: p.account_name || uid,
                        avatar: p.avatar_url || null, team: '',
                        badge_left:  p.badges?.image_url       || null,
                        badge_right: p.badges_right?.image_url || null,
                        score: 0, count: 0, wins: 0, positives: 0, chips };
                }
            });
        }
        const arr = Object.values(map);
        const sorters = {
            score:  (a,b) => b.score - a.score,
            count:  (a,b) => b.count - a.count || b.score - a.score,
            win:    (a,b) => (b.wins/b.count) - (a.wins/a.count) || b.count - a.count,
            plus:   (a,b) => (b.positives/b.count) - (a.positives/a.count) || b.count - a.count,
            chip:   (a,b) => b.chips - a.chips,
        };
        return arr.sort(sorters[currentSub] || sorters.score);
    }

    function aggregateTeam(rows) {
        const map = {};
        const memberMap = {};
        rows.forEach(r => {
            if (!r.team_name || !allTeamNames.has(r.team_name)) return;
            const tn = r.team_name;
            if (!map[tn]) map[tn] = { name: tn, score: 0, count: 0, wins: 0, positives: 0, memberIds: new Set() };
            map[tn].score += Number(r.final_score);
            map[tn].count++;
            if (Number(r.rank) === 1) map[tn].wins++;
            if (Number(r.final_score) > 0) map[tn].positives++;
            if (r.discord_user_id) map[tn].memberIds.add(r.discord_user_id);
            const uid = r.discord_user_id || r.account_name;
            if (!memberMap[tn]) memberMap[tn] = {};
            if (!memberMap[tn][uid]) {
                const p = profileMap[r.discord_user_id] || {};
                memberMap[tn][uid] = {
                    id: r.discord_user_id || null,
                    name: p.account_name || r.account_name || r.discord_user_id || uid,
                    avatar: p.avatar_url || null,
                    badge_left:  p.badges?.image_url       || null,
                    badge_right: p.badges_right?.image_url || null,
                    score: 0,
                    chips: chipMap[r.discord_user_id] || 0,
                };
            }
            memberMap[tn][uid].score += Number(r.final_score);
        });
        allTeamNames.forEach(n => { if (!map[n]) map[n] = { name: n, score: 0, count: 0, wins: 0, positives: 0, memberIds: new Set() }; });
        const arr = Object.values(map).filter(t => t.count > 0).sort((a,b) => b.score - a.score);
        arr.forEach(t => {
            t.members = Object.values(memberMap[t.name] || {}).sort((a,b) => b.score - a.score);
            t.chipSum = [...t.memberIds].reduce((s, uid) => s + (chipMap[uid] || 0), 0);
        });
        return arr;
    }

    function render() {
        const rows = filtered();
        if (currentMode === 'individual') {
            document.getElementById('view-individual').style.display = '';
            document.getElementById('view-team').style.display = 'none';
            renderIndividual(aggregateIndividual(rows));
        } else {
            document.getElementById('view-individual').style.display = 'none';
            document.getElementById('view-team').style.display = '';
            renderTeam(aggregateTeam(rows));
        }
    }

    function av(url, name) {
        return url || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=1a4d8c&color=fff`;
    }
    function sc(v) { return v > 0 ? '+' + v : String(v); }
    function scCls(v) { return v > 0 ? 'score-pos' : v < 0 ? 'score-neg' : 'score-zero'; }
    function pct(n, d) { return d === 0 ? '-%' : Math.round(n/d*100) + '%'; }

    const MEDALS = ['🥇','🥈','🥉'];
    const RCLS   = ['r1','r2','r3'];

    function subVal(p) {
        if (currentSub === 'count') return { main: p.count + '試合', sub: sc(p.score) + 'pt' };
        if (currentSub === 'win')   return { main: pct(p.wins, p.count), sub: p.wins + '回優勝 / ' + p.count + '試合' };
        if (currentSub === 'plus')  return { main: pct(p.positives, p.count), sub: p.positives + '回入賞 / ' + p.count + '試合' };
        if (currentSub === 'chip')  return { main: '🪙' + (p.chips || 0).toLocaleString(), sub: p.count + '試合' };
        return { main: sc(p.score), sub: p.count + '試合' };
    }

    function getSortValue(p) {
        if (currentSub === 'count') return p.count;
        if (currentSub === 'win')   return p.count > 0 ? p.wins / p.count : 0;
        if (currentSub === 'plus')  return p.count > 0 ? p.positives / p.count : 0;
        if (currentSub === 'chip')  return p.chips || 0;
        return p.score;
    }

    function assignRanks(players) {
        players.forEach((p, i) => {
            if (i === 0) { p.rankNo = 1; }
            else if (getSortValue(p) === getSortValue(players[i - 1])) { p.rankNo = players[i - 1].rankNo; }
            else { p.rankNo = i + 1; }
        });
    }

    function renderIndividual(players) {
        const podiumEl  = document.getElementById('podium-list');
        const listEl    = document.getElementById('rank-list');
        const restLabel = document.getElementById('rest-label');

        if (players.length === 0) {
            podiumEl.innerHTML = '<div class="empty-state">データがありません</div>';
            listEl.innerHTML = ''; restLabel.style.display = 'none'; return;
        }

        assignRanks(players);

        const podium = players.filter(p => p.rankNo <= 3);
        const rest   = players.filter(p => p.rankNo > 3);

        podiumEl.innerHTML = podium.map(p => {
            const v = subVal(p);
            const mainCls = currentSub === 'score' ? scCls(p.score) : '';
            const rcls = RCLS[p.rankNo - 1] || 'rn';
            const medal = MEDALS[p.rankNo - 1] || p.rankNo;
            return `<div class="podium-row ${rcls}">
                <span class="podium-medal">${medal}</span>
                <img src="${av(p.avatar,p.name)}" class="podium-avatar"
                    onerror="this.src='https://ui-avatars.com/api/?name=?&background=1a4d8c&color=fff'">
                <div class="podium-info">
                    <div class="podium-name">${playerNameHtml(p)}</div>
                    <div class="podium-sub">${p.team || '　'}</div>
                </div>
                <div>
                    <div class="podium-score ${mainCls}">${v.main}</div>
                    <div class="podium-cnt">${v.sub}</div>
                </div>
            </div>`;
        }).join('');

        // ポジウムフェードイン
        applyScrollAnim(podiumEl.querySelectorAll('.podium-row'), 100);

        restLabel.style.display = rest.length ? '' : 'none';
        listEl.innerHTML = rest.map(p => {
            const v = subVal(p);
            const mainCls = currentSub === 'score' ? scCls(p.score) : '';
            return `<div class="rank-row">
                <span class="rank-no">${p.rankNo}</span>
                <img src="${av(p.avatar,p.name)}" class="rank-avatar"
                    onerror="this.src='https://ui-avatars.com/api/?name=?&background=1a4d8c&color=fff'">
                <div class="rank-info">
                    <div class="rank-name">${playerNameHtml(p)}</div>
                    <div class="rank-team">${p.team || '　'}</div>
                </div>
                <div>
                    <div class="rank-score ${mainCls}">${v.main}</div>
                    <div class="rank-games">${v.sub}</div>
                </div>
            </div>`;
        }).join('');

        applyScrollAnim(listEl.querySelectorAll('.rank-row'), 50);
    }

    function toggleTeamCard(el) {
        el.classList.toggle('open');
    }

    function renderTeam(teamList) {
        const el = document.getElementById('team-list');
        if (teamList.length === 0) { el.innerHTML = '<div class="empty-state">データがありません</div>'; return; }

        // 同スコアは同順位
        teamList.forEach((t, i) => {
            if (i === 0) { t.rankNo = 1; }
            else if (t.score === teamList[i-1].score) { t.rankNo = teamList[i-1].rankNo; }
            else { t.rankNo = i + 1; }
        });

        const FINALIST_RANK = 6;
        let html = '';
        let sepInserted = false;

        html += `<div class="finalist-banner">🏆&nbsp; 決勝卓進出チーム &nbsp;— TOP ${FINALIST_RANK} &nbsp;🏆</div>`;

        teamList.forEach((t, idx) => {
            // 決勝ライン区切り
            if (!sepInserted && t.rankNo > FINALIST_RANK) {
                sepInserted = true;
                html += `<div class="finalist-sep"><span>── 決勝卓進出ライン ──</span></div>`;
            }

            const isFinalist = t.rankNo <= FINALIST_RANK;
            const cls = t.rankNo === 1 ? 'r1' : t.rankNo === 2 ? 'r2' : t.rankNo === 3 ? 'r3' : isFinalist ? 'rf' : 'rn';
            const finalistBadge = (isFinalist && t.rankNo > 3) ? `<div style="margin-top:4px;"><span class="finalist-badge">FINALIST</span></div>` : '';
            const medal = t.rankNo <= 3 ? MEDALS[t.rankNo - 1] : `<span style="font-size:1rem;font-weight:900;color:${isFinalist ? 'rgba(180,150,255,.9)' : 'rgba(255,255,255,.4)'};">${t.rankNo}</span>`;
            const iconHtml = teamIconMap[t.name]
                ? `<img src="${teamIconMap[t.name]}" class="tc-icon" alt="">`
                : `<div class="tc-icon-placeholder">🏅</div>`;
            const winRate  = t.count > 0 ? Math.round(t.wins / t.count * 100) + '%' : '-%';
            const posRate  = t.count > 0 ? Math.round(t.positives / t.count * 100) + '%' : '-%';


            const memberRows = t.members.length > 0
                ? t.members.map(m => {
                    const mavatar = m.avatar
                        ? `<img src="${m.avatar}" class="tc-member-avatar" onerror="this.src='https://ui-avatars.com/api/?name=?&background=1a4d8c&color=fff'">`
                        : `<img src="https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}&background=1a4d8c&color=fff" class="tc-member-avatar">`;
                    const mm = mutantMap[m.id] || {};
                    const bl = _badgeHtml(m.badge_left,  mm.left  || false);
                    const br = _badgeHtml(m.badge_right, mm.right || false);
                    const href = m.id ? `../mypage/index.html?user=${m.id}` : '#';
                    const nameHtml = m.id ? `<a href="${href}" style="color:inherit;text-decoration:none;">${m.name}</a>` : m.name;
                    const sc2 = m.score > 0 ? `+${m.score}` : String(m.score);
                    const mcls = m.score > 0 ? 'score-pos' : m.score < 0 ? 'score-neg' : 'score-zero';
                    const chipHtml = m.chips > 0 ? `<span class="tc-member-chip">🪙${m.chips.toLocaleString()}</span>` : '';
                    return `<div class="tc-member-row">${mavatar}<span class="tc-member-name">${bl}${nameHtml}${br}</span>${chipHtml}<span class="tc-member-score ${mcls}">${sc2} pt</span></div>`;
                }).join('')
                : '<div style="font-size:.8rem;color:rgba(255,255,255,.3);padding:6px 0;">記録なし</div>';

            html += `
            <div class="team-card ${cls}" onclick="toggleTeamCard(this)">
                <div class="tc-header">
                    <span class="tc-medal">${medal}</span>
                    ${iconHtml}
                    <div class="tc-info">
                        <div class="tc-name">${t.name}</div>
                        ${finalistBadge}
                    </div>
                    <div style="text-align:right;">
                        <div class="tc-score ${scCls(t.score)}">${sc(t.score)}</div>
                    </div>
                    <span class="tc-arrow">▼</span>
                </div>
                <div class="tc-stats">
                    <div class="tc-stat"><div class="tc-stat-label">試合数</div><div class="tc-stat-val">${t.count}</div></div>
                    <div class="tc-stat"><div class="tc-stat-label">優勝率</div><div class="tc-stat-val">${winRate}</div></div>
                    <div class="tc-stat"><div class="tc-stat-label">入賞率</div><div class="tc-stat-val">${posRate}</div></div>
                    <div class="tc-stat"><div class="tc-stat-label">🪙 チップ</div><div class="tc-stat-val">${(t.chipSum||0).toLocaleString()}</div></div>
                </div>
                <div class="tc-members">${memberRows}</div>
            </div>`;
        });

        el.innerHTML = html;
        applyScrollAnim(el.querySelectorAll('.team-card, .finalist-banner, .finalist-sep'), 70);
    }

    function applyScrollAnim(els, stagger = 80) {
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                const t = entry.target;
                setTimeout(() => {
                    t.classList.remove('scroll-hidden');
                    t.classList.add('scroll-visible');
                }, Number(t.dataset.delay) || 0);
                obs.unobserve(t);
            });
        }, { threshold: 0.06 });
        Array.from(els).forEach((el, i) => {
            el.classList.add('scroll-hidden');
            el.dataset.delay = i * stagger;
            obs.observe(el);
        });
    }
    </script>
</body>
