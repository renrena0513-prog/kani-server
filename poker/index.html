<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランキング | ポーカー大会</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        :root {
            --primary-blue: #1a4d8c;
            --deep-blue: #0d2f5c;
            --cream: #faf5e8;
            --gold: #d4a853;
            --font-title: 'Noto Serif JP', serif;
            --font-body: 'M PLUS Rounded 1c', sans-serif;
        }
        * { box-sizing: border-box; }
        body { font-family: var(--font-body); background: linear-gradient(135deg, #0d2f5c 0%, #1a4d8c 50%, #153d70 100%); min-height: 100vh; background-attachment: fixed; text-transform: none !important; }
        h1,h2,h3,h4,h5,h6,.btn { text-transform: none !important; }
        .page-header { font-family: var(--font-title); color: white; text-shadow: 2px 4px 12px rgba(0,0,0,0.3); }
        .section-card { background: rgba(255,255,255,0.97); border-radius: 24px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); margin-bottom: 30px; }
        .section-title { font-family: var(--font-title); color: var(--deep-blue); border-bottom: 3px solid var(--gold); padding-bottom: 10px; margin-bottom: 24px; font-size: 1.3rem; font-weight: 700; }
        /* タブ */
        .tab-bar { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .tab-btn { padding: 8px 20px; border-radius: 20px; border: 2px solid #dee2e6; background: white; color: #555; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
        .tab-btn.active { background: var(--deep-blue); border-color: var(--deep-blue); color: white; }
        .tab-btn:hover:not(.active) { border-color: var(--primary-blue); color: var(--primary-blue); }
        /* ランキングテーブル */
        .rank-table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
        .rank-table thead th { background: var(--deep-blue); color: white; padding: 12px 16px; font-size: 0.85rem; font-weight: 600; }
        .rank-table thead th:first-child { border-radius: 10px 0 0 10px; }
        .rank-table thead th:last-child { border-radius: 0 10px 10px 0; }
        .rank-table tbody tr { background: #f8f9fa; transition: all 0.2s; }
        .rank-table tbody tr:hover { background: #e9f0fb; transform: translateX(3px); }
        .rank-table td { padding: 12px 16px; vertical-align: middle; }
        .rank-table td:first-child { border-radius: 10px 0 0 10px; }
        .rank-table td:last-child { border-radius: 0 10px 10px 0; }
        /* 1〜3位 */
        .rank-table tr.gold { background: linear-gradient(135deg, #fff7ad 0%, #ffe066 100%); }
        .rank-table tr.silver { background: linear-gradient(135deg, #f0f0f0 0%, #c0c0c0 100%); }
        .rank-table tr.bronze { background: linear-gradient(135deg, #f5d4b5 0%, #cd7f32 100%); }
        .rank-table tr.gold td, .rank-table tr.silver td, .rank-table tr.bronze td { background: transparent; }
        /* 順位バッジ */
        .rank-num { font-weight: 700; font-size: 1rem; min-width: 32px; display: inline-block; text-align: center; }
        /* アバター */
        .player-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--gold); margin-right: 10px; flex-shrink: 0; }
        /* スコア */
        .score-pos { color: #1a6e2e; font-weight: 700; }
        .score-neg { color: #b31d1d; font-weight: 700; }
        .score-zero { color: #888; }
        /* ローディング */
        #loading-state { text-align: center; padding: 60px; color: white; }
    </style>
</head>
<body>
    <div class="nav-dropdown dropdown" style="position:fixed;top:20px;right:20px;z-index:1000;">
        <button class="btn dropdown-toggle" type="button" id="navDropdown" data-bs-toggle="dropdown"
            style="background:linear-gradient(135deg,var(--gold) 0%,#b8892d 100%);color:white;padding:12px 24px;border-radius:25px;font-weight:bold;">
            📝 メニュー
        </button>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navDropdown">
            <li><a class="dropdown-item" href="../index.html">🏠 ホームに戻る</a></li>
            <li><a class="dropdown-item" href="../mypage/index.html">👤 マイページ</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="./index.html">🃏 ランキング</a></li>
            <li><a class="dropdown-item" href="./record.html">📝 記録する</a></li>
            <li><a class="dropdown-item" href="./users/index.html">👥 ユーザー一覧</a></li>
            <li><a class="dropdown-item" href="./team/index.html">🏅 チーム管理</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="../badge/list.html">📛 バッジ一覧</a></li>
            <li><a class="dropdown-item" href="../badge/shop.html">🛒 バッジショップ</a></li>
            <li><a class="dropdown-item" href="../ranking/index.html">💰 資産ランキング</a></li>
            <li class="admin-only" style="display:none;"><hr class="dropdown-divider"></li>
            <li class="admin-only" style="display:none;"><a class="dropdown-item" href="../admin/index.html">⚙️ 管理画面</a></li>
        </ul>
    </div>

    <div class="container py-5" style="padding-top:80px!important;max-width:900px;">
        <header class="text-center mb-5">
            <h1 class="page-header display-4 fw-bold">🃏 ポーカー大会</h1>
            <p style="color:rgba(255,255,255,0.8);font-size:1.1rem;">第二回ポーカー大会</p>
        </header>

        <div id="loading-state">
            <div class="spinner-border text-light mb-3" style="width:3rem;height:3rem;"></div>
            <div style="font-size:1rem;opacity:0.8;">読み込み中...</div>
        </div>

        <div id="main-content" style="display:none;">
            <!-- 個人ランキング -->
            <div class="section-card">
                <h3 class="section-title">👤 個人合計ポイント</h3>
                <table class="rank-table">
                    <thead>
                        <tr>
                            <th style="width:50px;">#</th>
                            <th>プレイヤー</th>
                            <th>チーム</th>
                            <th style="text-align:right;">合計</th>
                            <th style="text-align:right;">試合数</th>
                        </tr>
                    </thead>
                    <tbody id="individual-body"></tbody>
                </table>
            </div>

            <!-- チームランキング -->
            <div class="section-card">
                <h3 class="section-title">🏅 チーム合計ポイント</h3>
                <table class="rank-table">
                    <thead>
                        <tr>
                            <th style="width:50px;">#</th>
                            <th>チーム</th>
                            <th style="text-align:right;">合計</th>
                            <th style="text-align:right;">試合数</th>
                            <th style="text-align:right;">メンバー</th>
                        </tr>
                    </thead>
                    <tbody id="team-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/survey-modal.js"></script>
    <script src="../js/navigation.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => { initAccordionNav('../'); });
    document.addEventListener('DOMContentLoaded', loadRanking);

    const MEDALS = ['🥇', '🥈', '🥉'];
    const ROW_CLS = ['gold', 'silver', 'bronze'];

    async function loadRanking() {
        // 全試合結果
        const { data: results, error } = await supabaseClient
            .from('poker_results')
            .select('discord_user_id, account_name, final_score, team_name');
        if (error) { console.error(error); return; }

        // プロフィール（アバター用）
        const ids = [...new Set((results||[]).map(r=>r.discord_user_id).filter(Boolean))];
        let profileMap = {};
        if (ids.length > 0) {
            const { data: profiles } = await supabaseClient
                .from('profiles')
                .select('discord_user_id, account_name, avatar_url')
                .in('discord_user_id', ids);
            (profiles||[]).forEach(p => { profileMap[p.discord_user_id] = p; });
        }

        // ポーカーチーム（チーム名一覧）
        const { data: teams } = await supabaseClient.from('poker_teams').select('id, team_name');
        const teamNames = new Set((teams||[]).map(t => t.team_name));

        // --- 個人集計 ---
        const playerMap = {};
        (results||[]).forEach(r => {
            const key = r.discord_user_id || r.account_name;
            if (!playerMap[key]) {
                const p = profileMap[r.discord_user_id] || {};
                playerMap[key] = {
                    id: r.discord_user_id,
                    name: p.account_name || r.account_name,
                    avatar: p.avatar_url || null,
                    team: r.team_name || '',
                    score: 0,
                    count: 0,
                };
            }
            playerMap[key].score += Number(r.final_score);
            playerMap[key].count++;
        });
        const players = Object.values(playerMap).sort((a,b) => b.score - a.score);

        // --- チーム集計 ---
        const teamMap = {};
        (results||[]).forEach(r => {
            if (!r.team_name || !teamNames.has(r.team_name)) return;
            if (!teamMap[r.team_name]) {
                teamMap[r.team_name] = { name: r.team_name, score: 0, count: 0, members: new Set() };
            }
            teamMap[r.team_name].score += Number(r.final_score);
            teamMap[r.team_name].count++;
            if (r.discord_user_id) teamMap[r.team_name].members.add(r.discord_user_id);
        });
        // poker_teamsにあるがresultsにないチームも0点で追加
        (teams||[]).forEach(t => {
            if (!teamMap[t.team_name]) {
                teamMap[t.team_name] = { name: t.team_name, score: 0, count: 0, members: new Set() };
            }
        });
        const teamList = Object.values(teamMap).sort((a,b) => b.score - a.score);

        // 個人テーブル描画
        document.getElementById('individual-body').innerHTML = players.map((p, i) => {
            const rankLabel = i < 3 ? MEDALS[i] : `<span class="rank-num">${i+1}</span>`;
            const rowCls = i < 3 ? ROW_CLS[i] : '';
            const avatar = p.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=1a4d8c&color=fff`;
            const sc = p.score;
            const scoreCls = sc > 0 ? 'score-pos' : sc < 0 ? 'score-neg' : 'score-zero';
            return `<tr class="${rowCls}">
                <td>${rankLabel}</td>
                <td><div class="d-flex align-items-center">
                    <img src="${avatar}" class="player-avatar" onerror="this.src='https://ui-avatars.com/api/?name=?&background=1a4d8c&color=fff'">
                    <span class="fw-bold">${p.name}</span>
                </div></td>
                <td><span style="font-size:0.85rem;color:#666;">${p.team || '-'}</span></td>
                <td style="text-align:right;" class="${scoreCls}">${sc>0?'+':''}${sc}</td>
                <td style="text-align:right;color:#888;">${p.count}</td>
            </tr>`;
        }).join('') || '<tr><td colspan="5" class="text-center text-muted py-4">データがありません</td></tr>';

        // チームテーブル描画
        document.getElementById('team-body').innerHTML = teamList.map((t, i) => {
            const rankLabel = i < 3 ? MEDALS[i] : `<span class="rank-num">${i+1}</span>`;
            const rowCls = i < 3 ? ROW_CLS[i] : '';
            const sc = t.score;
            const scoreCls = sc > 0 ? 'score-pos' : sc < 0 ? 'score-neg' : 'score-zero';
            return `<tr class="${rowCls}">
                <td>${rankLabel}</td>
                <td><span class="fw-bold">🏅 ${t.name}</span></td>
                <td style="text-align:right;" class="${scoreCls}">${sc>0?'+':''}${sc}</td>
                <td style="text-align:right;color:#888;">${t.count}</td>
                <td style="text-align:right;color:#888;">${t.members.size}人</td>
            </tr>`;
        }).join('') || '<tr><td colspan="5" class="text-center text-muted py-4">データがありません</td></tr>';

        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('main-content').style.display = '';
    }
    </script>
</body>
</html>
