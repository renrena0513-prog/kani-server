<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資産ランキング - かに鯖</title>
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        :root {
            --deep-purple: #5a4a7a;
            --gold: #d4a574;
            --font-title: 'Kosugi Maru', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .page-header {
            color: #fff;
            font-family: var(--font-title);
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .ranking-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .ranking-table {
            width: 100%;
        }

        .ranking-table th {
            background: var(--deep-purple);
            color: white;
            padding: 15px 10px;
            font-weight: 600;
            text-align: center;
        }

        .ranking-table td {
            padding: 15px 10px;
            text-align: center;
            vertical-align: middle;
            border-bottom: 1px solid #eee;
        }

        .ranking-table tr:hover {
            background: #f8f9fa;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .rank-1 {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #333;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.5);
        }

        .rank-2 {
            background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
            color: #333;
        }

        .rank-3 {
            background: linear-gradient(135deg, #cd7f32, #b87333);
            color: white;
        }

        .rank-other {
            background: #e9ecef;
            color: #666;
        }

        .user-cell {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }

        .user-main {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
            min-width: 0;
            white-space: nowrap;
        }

        .user-main .user-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }

        .user-meta {
            font-size: 0.8rem;
            color: #6c757d;
            display: none;
            flex-wrap: wrap;
            gap: 10px;
        }

        .user-meta .meta-main {
            font-weight: 700;
            color: #9b59b6;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-badge {
            width: 24px;
            height: 24px;
            object-fit: contain;
            flex-shrink: 0;
        }

        /* ナビゲーションドロップダウン */
        .nav-dropdown {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .record-button {
            background: linear-gradient(135deg, var(--gold) 0%, #b8892d 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 6px 20px rgba(212, 168, 83, 0.5);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
        }

        .record-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 168, 83, 0.6);
            color: white;
        }

        .nav-dropdown-menu {
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            min-width: 200px;
            overflow: hidden;
            border: none;
        }

        .dropdown-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #333;
            transition: background 0.2s;
        }

        .notification-badge {
            background: #dc3545;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: auto;
        }

        @media (max-width: 768px) {

            .ranking-table th,
            .ranking-table td {
                padding: 10px 5px;
                font-size: 0.85rem;
            }

            .ranking-table th:nth-child(n+3),
            .ranking-table td:nth-child(n+3) {
                display: none;
            }

            .rank-badge {
                width: 32px;
                height: 32px;
                font-size: 0.95rem;
            }

            .user-main .user-name {
                max-width: 140px;
            }

            .user-meta {
                display: flex;
            }

            .creator-meta .meta-main {
                color: #e67e22;
            }
        }
    </style>
</head>

<body>
    <!-- 右上のナビゲーションドロップダウン -->
    <div class="nav-dropdown dropdown">
        <button class="record-button dropdown-toggle" type="button" id="navDropdown" data-bs-toggle="dropdown"
            aria-expanded="false">
            📝 メニュー
        </button>
        <ul class="dropdown-menu nav-dropdown-menu dropdown-menu-end" aria-labelledby="navDropdown">
            <li><a class="dropdown-item" href="../index.html">🏠 ホームに戻る</a></li>
            <li><a class="dropdown-item" href="../mypage/index.html">👤 マイページ</a></li>
            <li>
                <hr class="dropdown-divider">
            </li>
            <li><a class="dropdown-item" href="../mahjong/index.html">📊 ランキング</a></li>
            <li><a class="dropdown-item" href="../mahjong/record.html">📝 記録する</a></li>
            <li><a class="dropdown-item" href="../mahjong/users/index.html">👥 ユーザー一覧</a></li>
            <li><a class="dropdown-item" href="../mahjong/team/index.html">🏅 チーム管理</a></li>
            <li><a class="dropdown-item" href="../badge/list.html">📛 バッジ一覧</a></li>
            <li><a class="dropdown-item" href="../badge/shop.html">🛒 バッジショップ</a></li>
            <li class="admin-only" style="display:none;">
                <hr class="dropdown-divider">
            </li>
            <li class="admin-only" style="display:none;">
                <a class="dropdown-item" href="../admin/index.html">⚙️ 管理画面</a>
            </li>
        </ul>
    </div>

    <div class="container py-5">
        <header class="text-center">
            <h1 class="page-header display-4 fw-bold">💵 資産ランキング</h1>

            <div class="d-flex justify-content-center mb-4">
                <div class="btn-group ranking-tabs" role="group">
                    <button type="button" class="btn btn-outline-light active" id="tab-networth"
                        onclick="switchRanking('networth')">
                        💎 純資産ランキング
                    </button>
                    <button type="button" class="btn btn-outline-light" id="tab-totalassets"
                        onclick="switchRanking('totalassets')">
                        📊 累計資産ランキング
                    </button>
                    <button type="button" class="btn btn-outline-light" id="tab-creator"
                        onclick="switchRanking('creator')">
                        🏷️ クリエイターランキング
                    </button>
                </div>
            </div>

            <p id="ranking-description" class="text-white-50">「手持ちコイン ＋ 所持バッジの現在価値」の合計順</p>
        </header>

        <div class="ranking-card">
            <div class="table-responsive">
                <table class="ranking-table">
                    <thead>
                        <tr id="table-header">
                            <th style="width: 60px;">順位</th>
                            <th>名前</th>
                            <th id="main-stat-header">純資産</th>
                            <th>資金（手持ち）</th>
                            <th>バッジ価値</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body">
                        <tr>
                            <td colspan="5" class="text-center py-4">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">読み込み中...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- スタイル追加 -->
    <style>
        .ranking-tabs .btn {
            border-width: 2px;
            font-weight: bold;
            padding: 10px 20px;
        }

        .ranking-tabs .btn.active {
            background-color: white !important;
            color: var(--deep-purple) !important;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/badge-utils.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/navigation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            initAccordionNav('../');
        });

        let currentMode = 'networth';
        const EXCLUDED_RANKING_USERS = new Set(['1184908452959621233']);

        function switchRanking(mode) {
            if (currentMode === mode) return;
            currentMode = mode;

            // UI更新
            document.getElementById('tab-networth').classList.toggle('active', mode === 'networth');
            document.getElementById('tab-totalassets').classList.toggle('active', mode === 'totalassets');
            document.getElementById('tab-creator').classList.toggle('active', mode === 'creator');

            const desc = document.getElementById('ranking-description');
            const mainHeader = document.getElementById('main-stat-header');

            if (mode === 'networth') {
                desc.textContent = '「手持ちコイン ＋ 所持バッジの現在価値」の合計順';
                mainHeader.textContent = '純資産';
            } else if (mode === 'totalassets') {
                desc.textContent = '「生涯で獲得した累計金額（売却益・賞金含む）」の合計順';
                mainHeader.textContent = '累計資産';
            } else {
                desc.textContent = '「バッジ販売で得た累計収益」の合計順';
                mainHeader.textContent = '累計収益';
            }

            loadRanking();
        }

        function setTableHeader(mode) {
            const header = document.getElementById('table-header');
            if (!header) return;
            if (mode === 'creator') {
                header.innerHTML = `
                    <th style="width: 60px;">順位</th>
                    <th>クリエイター</th>
                    <th id="main-stat-header">累計収益</th>
                    <th>出品数</th>
                    <th>販売回数</th>
                `;
            } else {
                header.innerHTML = `
                    <th style="width: 60px;">順位</th>
                    <th>名前</th>
                    <th id="main-stat-header">${mode === 'totalassets' ? '累計資産' : '純資産'}</th>
                    <th>資金（手持ち）</th>
                    <th>バッジ価値</th>
                `;
            }
        }

        async function loadRanking() {
            const tbody = document.getElementById('ranking-body');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>';

            try {
                setTableHeader(currentMode);

                const fetchAllRows = async (table, select, orderCol) => {
                    const batchSize = 1000;
                    let all = [];
                    let from = 0;
                    while (true) {
                        let query = supabaseClient
                            .from(table)
                            .select(select)
                            .order(orderCol, { ascending: true })
                            .range(from, from + batchSize - 1);
                        const { data, error } = await query;
                        if (error) throw error;
                        all = all.concat(data || []);
                        if (!data || data.length < batchSize) break;
                        from += batchSize;
                    }
                    return all;
                };

                if (currentMode === 'creator') {
                    const { data: badges, error: bError } = await supabaseClient
                        .from('badges')
                        .select('id, discord_user_id');
                    if (bError) throw bError;

                    const badgeIds = (badges || []).map(b => b.id);
                    const creatorCounts = {};
                    const badgeToCreator = {};
                    (badges || []).forEach(b => {
                        if (!b.discord_user_id) return;
                        badgeToCreator[b.id] = b.discord_user_id;
                        creatorCounts[b.discord_user_id] = (creatorCounts[b.discord_user_id] || 0) + 1;
                    });

                    const fetchActivityLogs = async () => {
                        const batchSize = 1000;
                        let allLogs = [];
                        let from = 0;
                        while (true) {
                            const { data, error } = await supabaseClient
                                .from('activity_logs')
                                .select('action_type, badge_id, amount, user_id, created_at')
                                .in('action_type', ['badge_purchase', 'royalty_receive'])
                                .order('created_at', { ascending: true })
                                .range(from, from + batchSize - 1);
                            if (error) throw error;
                            allLogs = allLogs.concat(data || []);
                            if (!data || data.length < batchSize) break;
                            from += batchSize;
                        }
                        return allLogs;
                    };

                    const logs = await fetchActivityLogs();

                    const revenueMap = {};
                    const salesMap = {};
                    (logs || []).forEach(log => {
                        if (log.action_type === 'badge_purchase') {
                            const creatorId = badgeToCreator[log.badge_id];
                            if (!creatorId) return;
                            salesMap[creatorId] = (salesMap[creatorId] || 0) + 1;
                        } else if (log.action_type === 'royalty_receive') {
                            const creatorId = log.user_id;
                            if (!creatorId) return;
                            revenueMap[creatorId] = (revenueMap[creatorId] || 0) + (log.amount || 0);
                        }
                    });

                    const creatorIds = Object.keys(creatorCounts);
                    const filteredCreatorIds = creatorIds.filter(id => !EXCLUDED_RANKING_USERS.has(id));
                    const { data: profiles, error: pError } = await supabaseClient
                        .from('profiles')
                        .select('discord_user_id, account_name, avatar_url, is_hidden')
                        .in('discord_user_id', filteredCreatorIds);
                    if (pError) throw pError;

                    const visibleProfiles = (profiles || []).filter(p => !p.is_hidden);
                    const visibleCreatorIds = filteredCreatorIds.filter(id => visibleProfiles.some(p => p.discord_user_id === id));

                    const rankingData = visibleCreatorIds.map(id => {
                        const profile = visibleProfiles.find(p => p.discord_user_id === id) || {};
                        return {
                            discord_user_id: id,
                            account_name: profile.account_name || id,
                            avatar_url: profile.avatar_url || 'https://ui-avatars.com/api/?name=?&background=1a4d8c&color=fff&size=40',
                            revenue: revenueMap[id] || 0,
                            listings: creatorCounts[id] || 0,
                            sales: salesMap[id] || 0
                        };
                    });

                    rankingData.sort((a, b) => b.revenue - a.revenue);

                    if (rankingData.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">データがありません</td></tr>';
                        return;
                    }

                    tbody.innerHTML = rankingData.map((item, index) => {
                        const rank = index + 1;
                        const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
                        const displayStat = `💵 ${item.revenue.toLocaleString()}`;

                        return `
                            <tr>
                                <td><span class="rank-badge ${rankClass}">${rank}</span></td>
                                <td>
                                    <div class="user-cell">
                                        <div class="user-main">
                                            <img src="${item.avatar_url}" class="user-avatar" onerror="this.src='https://ui-avatars.com/api/?name=?&background=1a4d8c&color=fff&size=40'">
                                            <a href="../mypage/index.html?user=${item.discord_user_id}" class="text-decoration-none text-dark fw-bold user-name">
                                                ${item.account_name || '名称未設定'}
                                            </a>
                                        </div>
                                    <div class="user-meta creator-meta">
                                        <span class="meta-main">累計収益: ${displayStat}</span>
                                        <span>出品数: ${item.listings}件</span>
                                        <span>販売回数: ${item.sales}回</span>
                                    </div>
                                </div>
                            </td>
                                <td class="fw-bold" style="color: #e67e22; font-size: 1.1rem;">${displayStat}</td>
                                <td>${item.listings}</td>
                                <td>${item.sales}</td>
                            </tr>
                        `;
                    }).join('');

                    return;
                }

                // 1. プロフィール情報を取得
                const profiles = await fetchAllRows(
                    'profiles',
                    'discord_user_id, account_name, avatar_url, coins, total_assets, is_hidden, equipped_badge_id, equipped_badge_id_right, badges!equipped_badge_id(image_url, name), badges_right:badges!equipped_badge_id_right(image_url, name)',
                    'discord_user_id'
                );
                const filteredProfiles = (profiles || []).filter(p => !EXCLUDED_RANKING_USERS.has(p.discord_user_id) && !p.is_hidden);

                // 2. 全バッジ個体データを取得（資産価値計算用）
                const userBadges = await fetchAllRows(
                    'user_badges_new',
                    'uuid, user_id, badge_id, is_mutant, badges(price, sales_type, fixed_rarity_name)',
                    'uuid'
                );

                // 3. バッジマスター情報を取得（固定価格対応）
                const masterBadges = await fetchAllRows(
                    'badges',
                    'id, price, sales_type, fixed_rarity_name',
                    'id'
                );

                // 4. レアリティ閾値データを取得（エラー修正：これが不足していた）
                const { data: thresholds } = await supabaseClient.from('rarity_thresholds').select('*').order('threshold_value', { ascending: true });


                // UUID -> discord_user_id のルックアップマップを作成
                const uuidToDiscordMap = {};
                profiles.forEach(p => {
                    // profiles テーブルには id (UUID) と discord_user_id の両方があるはず
                    // ただしここでは id を取得していないので、後で取得するか別の方法を取る
                    // 実際には user_badges_new.user_id は discord_user_id を格納している可能性がある
                    // 確認のため、一旦 discord_user_id をそのまま使う
                });

                // バッジごとの流通数をカウント & ユーザーごとのミュータント所有表を構築
                const marketCounts = {};
                const userMutantMap = {}; // (discordUserId_badgeId) -> boolean

                (userBadges || []).forEach(ub => {
                    marketCounts[ub.badge_id] = (marketCounts[ub.badge_id] || 0) + 1;
                    if (ub.is_mutant) {
                        // user_badges_new.user_id は discord_user_id 文字列であると仮定
                        userMutantMap[`${ub.user_id}_${ub.badge_id}`] = true;
                    }
                });

                // バッジマップ（フォールバック用）
                const badgeMap = {};
                masterBadges.forEach(mb => {
                    badgeMap[mb.id] = mb;
                });

                // 各バッジの「現在価値(P_value)」を事前に計算
                const badgeValues = {};
                masterBadges.forEach(mb => {
                    const n = marketCounts[mb.id] || 0;
                    const result = BadgeUtils.calculateBadgeValues(mb, n, thresholds);
                    badgeValues[mb.id] = result.marketValue;
                });

                // 各ユーザーのバッジ価値合計と個数を計算
                const userFinances = {};
                filteredProfiles.forEach(p => {
                    userFinances[p.discord_user_id] = { badgeCount: 0, badgeValue: 0 };
                });

                userBadges.forEach(ub => {
                    const badge = ub.badges || badgeMap[ub.badge_id];
                    if (!badge) return;
                    const n = marketCounts[ub.badge_id] || 0;
                    const baseValue = badgeValues[ub.badge_id] ?? BadgeUtils.calculateBadgeValues(badge, n, thresholds).marketValue;
                    // ミュータントは資産価値3倍
                    const value = baseValue * (ub.is_mutant ? 3 : 1);

                    if (userFinances[ub.user_id]) {
                        userFinances[ub.user_id].badgeCount++;
                        userFinances[ub.user_id].badgeValue += value;
                    }
                });

                // ランキング用データ構築
                const rankingData = filteredProfiles.map(p => {
                    const finances = userFinances[p.discord_user_id] || { badgeCount: 0, badgeValue: 0 };
                    return {
                        ...p,
                        badgeCount: finances.badgeCount,
                        badgeValue: finances.badgeValue,
                        netWorth: p.coins + finances.badgeValue
                    };
                });

                // ソート
                if (currentMode === 'networth') {
                    rankingData.sort((a, b) => b.netWorth - a.netWorth);
                } else {
                    rankingData.sort((a, b) => (b.total_assets || 0) - (a.total_assets || 0));
                }

                if (rankingData.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">データがありません</td></tr>';
                    return;
                }

                tbody.innerHTML = rankingData.map((item, index) => {
                    const rank = index + 1;
                    const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
                    const avatar = item.avatar_url || 'https://ui-avatars.com/api/?name=?&background=1a4d8c&color=fff&size=40';

                    // 左バッジのミュータント判定とHTML生成
                    let badgeImgLeft = '';
                    if (item.badges) {
                        const isMutant = userMutantMap[`${item.discord_user_id}_${item.equipped_badge_id}`];
                        badgeImgLeft = `
                            <div class="mutant-badge-container mini ${isMutant ? 'active' : ''}">
                                <img src="${item.badges.image_url}" class="user-badge" title="${item.badges.name}">
                                <div class="mutant-badge-shine" style="display: ${isMutant ? 'block' : 'none'};"></div>
                            </div>`;
                    }

                    // 右バッジのミュータント判定とHTML生成
                    let badgeImgRight = '';
                    if (item.badges_right) {
                        const isMutant = userMutantMap[`${item.discord_user_id}_${item.equipped_badge_id_right}`];
                        badgeImgRight = `
                            <div class="mutant-badge-container mini ${isMutant ? 'active' : ''}">
                                <img src="${item.badges_right.image_url}" class="user-badge" title="${item.badges_right.name}">
                                <div class="mutant-badge-shine" style="display: ${isMutant ? 'block' : 'none'};"></div>
                            </div>`;
                    }

                    const displayStat = currentMode === 'networth'
                        ? `💎 ${item.netWorth.toLocaleString()}`
                        : `📊 ${(item.total_assets || 0).toLocaleString()}`;

                    const statColor = currentMode === 'networth' ? '#9b59b6' : '#e67e22';

                    return `
                        <tr>
                            <td><span class="rank-badge ${rankClass}">${rank}</span></td>
                            <td>
                                <div class="user-cell">
                                    <div class="user-main">
                                        <img src="${avatar}" class="user-avatar" onerror="this.src='https://ui-avatars.com/api/?name=?&background=1a4d8c&color=fff&size=40'">
                                        ${badgeImgLeft}
                                        <a href="../mypage/index.html?user=${item.discord_user_id}" class="text-decoration-none text-dark fw-bold user-name">
                                            ${item.account_name || '名称未設定'}
                                        </a>
                                        ${badgeImgRight}
                                    </div>
                                    <div class="user-meta">
                                        ${currentMode === 'networth'
                            ? `
                                            <span class="meta-main">純資産: ${displayStat}</span>
                                            <span>所持金: 💵 ${item.coins.toLocaleString()}</span>
                                            <span>所持バッジ: 📛 ${item.badgeCount}個</span>
                                            <span>バッジ価値: 📈 ${item.badgeValue.toLocaleString()}</span>
                                        `
                            : `
                                            <span class="meta-main">累計資産: ${displayStat}</span>
                                            <span>所持金: 💵 ${item.coins.toLocaleString()}</span>
                                            <span>所持バッジ: 📛 ${item.badgeCount}個</span>
                                            <span>バッジ価値: 📈 ${item.badgeValue.toLocaleString()}</span>
                                        `}
                                    </div>
                                </div>
                            </td>
                            <td class="fw-bold" style="color: ${statColor}; font-size: 1.1rem;">${displayStat}</td>
                            <td>💵 ${item.coins.toLocaleString()}</td>
                            <td class="text-muted small">📛 ${item.badgeCount}個 / 📈 ${item.badgeValue.toLocaleString()}</td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error('Error loading ranking:', err);
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4">読み込みエラーが発生しました</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadRanking);
    </script>
</body>

</html>
